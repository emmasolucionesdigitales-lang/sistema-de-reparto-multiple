name: Enviar notificaciones

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos (GitHub puede demorarse unos minutos)
  workflow_dispatch:         # botón para ejecutarlo a mano (para probar)

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install firebase-admin web-push
      - run: node enviar-scripts/enviar-notif.js
        env:
          FIREBASE_SA:   ${{ secrets.FIREBASE_SA }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE_KEY }}
