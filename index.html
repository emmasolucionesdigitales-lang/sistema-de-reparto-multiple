  const fiadoNeto      = cobFiado - cobSaldos;

  const [datos,setDatos] = useState(()=>({
    ...planilla,
    peso:        planilla.peso        || (pesoAuto>0 ? String(pesoAuto) : ""),
    efectivo:    planilla.efectivo    || (cobEfectivo>0   ? String(Math.round(cobEfectivo))   : ""),
    fiado:       planilla.fiado       || (cobFiado>0      ? String(Math.round(cobFiado))      : ""),
    retenciones: planilla.retenciones || (cobTransDesc>0  ? String(cobTransDesc)              : ""),
  }));
  const set = (k,v) => setDatos(d=>({...d,[k]:v}));
  const setProd=(pid,campo,v)=>setDatos(d=>({...d,productos:{...d.productos,[pid]:{...d.productos[pid],[campo]:v}}}));
  const setGasto=(i,campo,v)=>{const g=[...(datos.gastos||[])];g[i]={...g[i],[campo]:v};setDatos(d=>({...d,gastos:g}));};
  const addGasto=()=>setDatos(d=>({...d,gastos:[...(d.gastos||[]),{cat:"propina",monto:""}]}));
  const delGasto=(i)=>setDatos(d=>({...d,gastos:d.gastos.filter((_,j)=>j!==i)}));

  const totalGastos=(datos.gastos||[]).reduce((a,g)=>a+num(g.monto),0);
  const efectivo=num(datos.efectivo), fiado=num(datos.fiado), retenciones=num(datos.retenciones);
  const sobrante=efectivo-(totalVentaPlata-fiado);
  const ganancia=(cobEfectivo+cobTransBruto+cobFiado+cobSaldos)-totalVentaLlenar-totalGastos;
  const totalLlenosIngresados=PRODUCTOS_CONFIG.reduce((a,p)=>a+num(datos.productos[p.id]?.llenos),0);

  // ── Cierre del día / stock ──
  const planKeyToStockKey = {"soda":"sifon","b10":"bidon10","b20":"bidon20"};
  const PROD_LABEL = {soda:"Sifones",b10:"Bidón 10L",b20:"Bidón 20L"};
  const [mostrarCierre, setMostrarCierre] = useState(false);
  const yaCerrado = !!planilla._diaCerrado;
  const llenosCargados = {soda:Number(datos.productos?.soda?.llenos||0),b10:Number(datos.productos?.b10?.llenos||0),b20:Number(datos.productos?.b20?.llenos||0)};
  const vendidosDia = {soda:0,b10:0,b20:0};
  ventas.forEach(v=>v.detalle.forEach(d=>{const k=prodKey[d.nombre];if(k)vendidosDia[k]+=d.cantidad;}));
  const prestadosDia = {soda:0,b10:0,b20:0};
  const devueltosDia = {soda:0,b10:0,b20:0};
  ventas.forEach(v=>{
    (v.envPrest||[]).forEach(e=>{const k=prodKey[e.prod];if(k)prestadosDia[k]+=Number(e.cant)||0;});
    (v.envDev||[]).forEach(e=>{const k=prodKey[e.prod];if(k)devueltosDia[k]+=Number(e.cant)||0;});
  });
  const sobrantes={},vaciosRec={};
  ["soda","b10","b20"].forEach(pk=>{
    sobrantes[pk]=Math.max(0,llenosCargados[pk]-vendidosDia[pk]-prestadosDia[pk]);
    vaciosRec[pk]=vendidosDia[pk]+devueltosDia[pk];
  });
  const confirmarCierre = () => {
    const s = JSON.parse(JSON.stringify(stock));
    if(!s.soderia_vacios) s.soderia_vacios={sifon:0,bidon10:0,bidon20:0};
    ["soda","b10","b20"].forEach(pk=>{
      const sk=planKeyToStockKey[pk];
      s.soderia[sk]        =(s.soderia[sk]||0)+sobrantes[pk];
      s.soderia_vacios[sk] =(s.soderia_vacios[sk]||0)+vaciosRec[pk];
      s.camion[sk]         =0;
    });
    setStock(s);
    syncData({stock:s});
    onGuardar({...datos,_diaCerrado:true,_stockActualizado:true});
    setMostrarCierre(false);
  };

  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Planilla · {dia}</span>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
          <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>{fecha}</span>
          {planilla._autoGuardado&&<span style={{fontSize:10,color:"#4dd9a0",fontWeight:500}}>✓ Auto-guardado</span>}
          {planilla._stockActualizado&&<span style={{fontSize:10,color:"var(--color-text-info)",fontWeight:500}}>📦 Stock actualizado</span>}
        </div>
      </div>
      <div style={{padding:16}}>

        {/* Datos de salida — ingreso manual */}
        <span style={{...s.sectionTitle,padding:"0 0 8px"}}>Al salir a repartir</span>
        <div style={s.grid3}>
          {[["fecha","Fecha","text"],["peso","Peso kg","number"],["bultos","Bultos","number"]].map(([k,l,t])=>(
            <div key={k}><label style={s.label}>{l}</label>
              <input style={s.inputNum} type={t} placeholder={t==="text"?"dd/mm/aaaa":"0"} value={datos[k]||""} onChange={e=>set(k,e.target.value)} />
            </div>
          ))}
        </div>

        {/* Llenos — ingreso manual, vacios/plata/llenar auto desde ventas */}
        <span style={{...s.sectionTitle,padding:"12px 0 8px"}}>Envases cargados (solo ingresá los llenos)</span>
        <div style={{background:"var(--color-background-secondary)",borderRadius:10,overflow:"hidden",marginBottom:4}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",padding:"6px 10px",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
            {["Producto","Llenos","Vacíos","Plata","Llenar"].map(h=><div key={h} style={{fontSize:11,color:"var(--color-text-secondary)",fontWeight:500,textAlign:h==="Producto"?"left":"right"}}>{h}</div>)}
          </div>
          {PRODUCTOS_CONFIG.map(p=>{
            const auto=totalesPorProd[p.id];
            const esSoda = p.id==="soda";
            return (
              <div key={p.id} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",padding:"6px 10px",borderBottom:"0.5px solid var(--color-border-tertiary)",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-primary)"}}>{p.nombre}</div>
                  {esSoda&&auto.cajones>0&&<div style={{fontSize:10,color:"#f5b942"}}>{auto.cajones} caj. ({auto.vacios} un.)</div>}
                </div>
                <div>
                  <input type="number" style={{...s.inputNum,width:"100%",fontSize:13}} value={datos.productos[p.id]?.llenos||""} onChange={e=>setProd(p.id,"llenos",e.target.value)} placeholder="0" />
                  {esSoda&&datos.productos[p.id]?.llenos>0&&<div style={{fontSize:10,color:"var(--color-text-tertiary)",textAlign:"right"}}>{Math.floor((datos.productos[p.id]?.llenos||0)/6)} caj.</div>}
                </div>
                <div style={{textAlign:"right",fontSize:13,color:"var(--color-text-secondary)"}}>{esSoda?`${auto.cajones||"—"} caj`:(auto.vacios||"—")}</div>
                <div style={{textAlign:"right",fontSize:13,color:"var(--color-text-primary)"}}>{auto.plata?fmt(auto.plata).replace("$",""):"—"}</div>
                <div style={{textAlign:"right",fontSize:13,color:"var(--color-text-danger)"}}>{auto.llenar?fmt(auto.llenar).replace("$",""):"—"}</div>
              </div>
            );
          })}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",padding:"8px 10px",background:"var(--color-background-tertiary)"}}>
            <div style={{fontSize:12,color:"var(--color-text-secondary)",fontWeight:500}}>Totales</div>
            <div style={{textAlign:"right",fontSize:12,fontWeight:500,color:"var(--color-text-primary)"}}>{totalLlenosIngresados||"—"}</div>
            <div style={{textAlign:"right",fontSize:12,fontWeight:500,color:"var(--color-text-primary)"}}>{Object.values(totalesPorProd).reduce((a,p)=>a+p.vacios,0)||"—"}</div>
            <div style={{textAlign:"right",fontSize:12,fontWeight:500,color:"var(--color-text-primary)"}}>{totalVentaPlata?fmt(totalVentaPlata).replace("$",""):"—"}</div>
            <div style={{textAlign:"right",fontSize:12,fontWeight:500,color:"var(--color-text-danger)"}}>{totalVentaLlenar?fmt(totalVentaLlenar).replace("$",""):"—"}</div>
          </div>
        </div>
        <p style={{fontSize:11,color:"var(--color-text-tertiary)",marginBottom:12}}>Vacíos, plata y llenar se calculan automáticamente desde las ventas del día.</p>

        {/* Gastos extras */}
        <div style={s.divider} />
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:11,color:"var(--color-text-secondary)",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.06em"}}>Gastos extras (efectivo)</span>
          <button style={{...s.btn,fontSize:12,padding:"4px 12px"}} onClick={addGasto}>+ Agregar</button>
        </div>
        {(datos.gastos||[]).length===0&&<p style={{fontSize:13,color:"var(--color-text-tertiary)",marginBottom:8}}>Sin gastos extras</p>}
        {(datos.gastos||[]).map((g,i)=>(
          g.confirmado
          ? <div key={i} style={{...s.card,margin:"0 0 6px",background:"var(--color-background-tertiary)",borderLeft:"3px solid #4dd9a0",padding:"10px 12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-primary)"}}>{g.cat.charAt(0).toUpperCase()+g.cat.slice(1)}{g.desc?` · ${g.desc}`:""}</div>
                  <div style={{fontSize:12,color:"var(--color-text-danger)",marginTop:2}}>−{fmt(num(g.monto))}</div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button style={{...s.btn,fontSize:11,padding:"3px 10px"}} onClick={()=>setGasto(i,"confirmado",false)}>Editar</button>
                  <button style={s.btnDanger} onClick={()=>delGasto(i)}>✕</button>
                </div>
              </div>
            </div>
          : <div key={i} style={{...s.card,margin:"0 0 6px",padding:"10px 12px"}}>
              <div style={{display:"flex",gap:6,marginBottom:6}}>
                <select style={{...s.select,flex:1}} value={g.cat} onChange={e=>setGasto(i,"cat",e.target.value)}>
                  {GASTOS_CATEGORIAS.map(c=><option key={c} value={c}>{c.charAt(0).toUpperCase()+c.slice(1)}</option>)}
                </select>
                <input style={{...s.inputNum,flex:1}} type="number" placeholder="Monto $" value={g.monto||""} onChange={e=>setGasto(i,"monto",e.target.value)} />
              </div>
              <input style={{...s.input,marginBottom:6}} placeholder="Descripción (opcional)" value={g.desc||""} onChange={e=>setGasto(i,"desc",e.target.value)} />
              <div style={{display:"flex",gap:6}}>
                <button style={{flex:1,padding:"7px",borderRadius:8,border:"none",background:"#0a2e1f",color:"#4dd9a0",fontSize:12,fontWeight:500,cursor:"pointer",opacity:!g.monto?0.5:1}}
                  disabled={!g.monto}
                  onClick={()=>{setGasto(i,"confirmado",true);setTimeout(()=>onGuardar({...datos,gastos:datos.gastos.map((x,j)=>j===i?{...x,confirmado:true}:x)}),50);}}>
                  ✓ Confirmar y guardar
                </button>
                <button style={s.btnDanger} onClick={()=>delGasto(i)}>✕</button>
              </div>
            </div>
        ))}
        {totalGastos>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderTop:"0.5px solid var(--color-border-tertiary)",marginBottom:8}}>
          <span style={{fontSize:13,color:"var(--color-text-secondary)"}}>Total gastos extras</span>
          <span style={{fontSize:13,fontWeight:500,color:"var(--color-text-danger)"}}>−{fmt(totalGastos)}</span>
        </div>}

        {/* Cobranza */}
        <div style={s.divider} />
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0 8px"}}>
          <span style={{fontSize:10,color:"var(--color-text-tertiary)",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.07em"}}>Cobranza del día</span>
          <button style={{...s.btn,fontSize:11,padding:"3px 10px"}}
            onClick={()=>setDatos(d=>({...d,
              peso:String(pesoAuto||d.peso||""),
              efectivo:String(Math.round(cobEfectivo)),
              retenciones:String(cobTransDesc),
              fiado:String(Math.round(cobFiado))
            }))}>
            ↻ Autocompletar desde ventas
          </button>
        </div>
        <div style={s.grid3}>
          {[["efectivo","Efectivo"],["fiado","Fiado"],["retenciones","Retención 2.5%"]].map(([k,l])=>(
            <div key={k}><label style={{...s.label,textAlign:"center"}}>{l}</label>
              <input style={{...s.inputNum,textAlign:"center"}} type="number" placeholder="0" value={datos[k]||""} onChange={e=>set(k,e.target.value)} />
            </div>
          ))}
        </div>
        {/* Desglose de transferencias */}
        {cobTransBruto>0&&(
          <div style={{...s.card,margin:"10px 0",background:"var(--color-background-tertiary)"}}>
            <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:8}}>Detalle transferencias</div>
            {[["Monto bruto",fmt(cobTransBruto),"primary"],["Retención 2.5%",`−${fmt(cobTransDesc)}`,"danger"],["Neto recibido",fmt(cobTransNeto),"success"]].map(([l,v,c])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>{l}</span>
                <span style={{fontSize:13,fontWeight:500,color:`var(--color-text-${c})`}}>{v}</span>
              </div>
            ))}
          </div>
        )}
        {cobSaldos>0&&(
          <div style={{...s.card,margin:"0 0 10px",background:"var(--color-background-tertiary)"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>Cobrado de deuda anterior</span>
              <span style={{fontSize:13,fontWeight:500,color:"#4dd9a0"}}>{fmt(cobSaldos)}</span>
            </div>
          </div>
        )}
        <div style={{marginTop:12}}>
          <label style={s.label}>Observaciones</label>
          <textarea style={{...s.input,minHeight:56,resize:"vertical"}} placeholder="Notas del día..." value={datos.obs||""} onChange={e=>set("obs",e.target.value)} />
        </div>

        {/* Resumen */}
        <div style={s.divider} />
        <span style={{...s.sectionTitle,padding:"0 0 10px"}}>Resumen del día</span>

        {/* Ventas del día */}
        <div style={{...s.card,margin:"0 0 8px",background:"var(--color-background-secondary)",padding:"14px 16px"}}>
          <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Ventas registradas</div>
          {[
            ["Contado (efectivo)", fmt(cobEfectivo), "primary"],
            ["Transferencias",     fmt(cobTransBruto), "info"],
            ["Fiado del día",      fmt(cobFiado), "warning"],
          ].map(([l,v,c])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
              <span style={{fontSize:13,color:"var(--color-text-secondary)"}}>{l}</span>
              <span style={{fontSize:13,fontWeight:500,color:`var(--color-text-${c})`}}>{v}</span>
            </div>
          ))}
          {/* Cobros de deuda — separados por forma de pago */}
          {cobSaldosEfec>0&&(
            <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
              <span style={{fontSize:13,color:"var(--color-text-secondary)"}}>+ Cobro deuda · efectivo</span>
              <span style={{fontSize:13,fontWeight:500,color:"var(--color-text-success)"}}>{fmt(cobSaldosEfec)}</span>
            </div>
          )}
          {cobSaldosTrans>0&&(
            <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
              <span style={{fontSize:13,color:"var(--color-text-secondary)"}}>+ Cobro deuda · transferencia</span>
              <span style={{fontSize:13,fontWeight:500,color:"var(--color-text-info)"}}>{fmt(cobSaldosTrans)}</span>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 2px"}}>
            <span style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>Total cobrado</span>
            <span style={{fontSize:16,fontWeight:500,color:"var(--color-text-primary)"}}>{fmt(cobEfectivo+cobTransBruto+cobSaldos)}</span>
          </div>
        </div>

        {/* Ventas de clientes de otros días */}
        {ventasExtraDia.length>0&&(
          <div style={{...s.card,margin:"0 0 8px",background:"var(--color-background-secondary)",padding:"14px 16px",borderLeft:"3px solid var(--color-border-info)"}}>
            <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-info)",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>📦 Ventas de otros días ({ventasExtraDia.length})</div>
            {ventasExtraDia.map(v=>{
              const c=(clientes||[]).find(x=>x.id===v.clienteId);
              return (
                <div key={v.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                  <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>{c?.nombre||"Cliente"} <span style={{color:"var(--color-text-tertiary)"}}>· {c?.dia}</span></span>
                  <span style={{fontSize:13,fontWeight:500,color:"var(--color-text-info)"}}>{fmt(v.pagadoNum||v.neto||0)}</span>
                </div>
              );
            })}
            {extraEfectivo>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}><span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>Contado</span><span style={{fontSize:11,color:"var(--color-text-primary)"}}>{fmt(extraEfectivo)}</span></div>}
            {extraTrans>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}><span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>Transfer.</span><span style={{fontSize:11,color:"var(--color-text-info)"}}>{fmt(extraTrans)}</span></div>}
            {extraFiado>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}><span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>Fiado</span><span style={{fontSize:11,color:"var(--color-text-warning)"}}>{fmt(extraFiado)}</span></div>}
            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 2px"}}>
              <span style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>Total otros días</span>
              <span style={{fontSize:16,fontWeight:500,color:"var(--color-text-info)"}}>{fmt(extraTotal)}</span>
            </div>
          </div>
        )}
        <div style={{...s.card,margin:"0 0 8px",padding:"14px 16px"}}>
          <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Efectivo en mano</div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
            <span style={{fontSize:13,color:"var(--color-text-secondary)"}}>Efectivo cobrado (contado)</span>
            <span style={{fontSize:13,color:"var(--color-text-primary)"}}>{fmt(cobEfectivo)}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
            <span style={{fontSize:13,color:"var(--color-text-danger)"}}>− Llenado de envases</span>
            <span style={{fontSize:13,color:"var(--color-text-danger)"}}>{fmt(totalVentaLlenar)}</span>
          </div>
          {totalGastos>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
            <span style={{fontSize:13,color:"var(--color-text-danger)"}}>− Gastos extras</span>
            <span style={{fontSize:13,color:"var(--color-text-danger)"}}>{fmt(totalGastos)}</span>
          </div>}
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 2px"}}>
            <span style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>Efectivo en mano</span>
            <span style={{fontSize:18,fontWeight:500,color:(cobEfectivo-totalVentaLlenar-totalGastos)>=0?"var(--color-text-success)":"var(--color-text-danger)"}}>{fmt(cobEfectivo-totalVentaLlenar-totalGastos)}</span>
          </div>
        </div>

        {/* Transferencias */}
        {cobTransBruto>0&&(
          <div style={{...s.card,margin:"0 0 8px",padding:"14px 16px"}}>
            <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Transferencias</div>
            <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
              <span style={{fontSize:13,color:"var(--color-text-secondary)"}}>Monto total</span>
              <span style={{fontSize:13,color:"var(--color-text-primary)"}}>{fmt(cobTransBruto)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
              <span style={{fontSize:12,color:"var(--color-text-tertiary)"}}>Retención 2.5% (informativo)</span>
              <span style={{fontSize:12,color:"var(--color-text-danger)"}}>−{fmt(cobTransDesc)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0 2px"}}>
              <span style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>Neto a acreditar</span>
              <span style={{fontSize:16,fontWeight:500,color:"var(--color-text-info)"}}>{fmt(cobTransNeto)}</span>
            </div>
            {/* Transferencias pendientes de confirmar */}
            {ventasPendTrans.length>0&&(
              <div style={{marginTop:8,borderTop:"0.5px solid var(--color-border-tertiary)",paddingTop:8}}>
                <div style={{fontSize:11,color:"#f5b942",marginBottom:6,fontWeight:500}}>🔴 {ventasPendTrans.length} sin confirmar</div>
                {ventasPendTrans.map(v=>(
                  <div key={v.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",fontSize:12}}>
                    <span style={{color:"var(--color-text-secondary)"}}>{v.cliente}</span>
                    <span style={{color:"#f5b942",fontWeight:500}}>{fmt(v.pagadoNum||v.neto||0)}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Fiado */}
        <div style={{...s.card,margin:"0 0 8px",padding:"14px 16px"}}>
          <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Fiado pendiente</div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
            <span style={{fontSize:13,color:"var(--color-text-secondary)"}}>Fiado del día</span>
            <span style={{fontSize:13,color:"var(--color-text-primary)"}}>{fmt(cobFiado)}</span>
          </div>
          {cobSaldos>0&&(
            <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
              <span style={{fontSize:13,color:"var(--color-text-secondary)"}}>− Cobros de saldos anteriores</span>
              <span style={{fontSize:13,color:"var(--color-text-success)"}}>−{fmt(cobSaldos)}</span>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0 2px"}}>
            <span style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>Fiado neto pendiente</span>
            <span style={{fontSize:16,fontWeight:500,color:fiadoNeto>0?"var(--color-text-warning)":"var(--color-text-success)"}}>{fmt(Math.abs(fiadoNeto))}{fiadoNeto<0?" (a favor)":""}</span>
          </div>
        </div>

        {/* Ganancia */}
        <div style={{...s.card,margin:"0 0 16px",padding:"14px 16px",background:"var(--color-background-secondary)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>Ganancia neta del día</div>
              <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}}>Total cobrado − Llenado − Gastos</div>
            </div>
            <span style={{fontSize:22,fontWeight:500,color:ganancia>=0?"var(--color-text-success)":"var(--color-text-danger)"}}>{fmt(ganancia)}</span>
          </div>
        </div>
        <button style={s.btnPrimary} onClick={()=>onGuardar(datos)}>Guardar planilla</button>
        {onCerrarDia&&ventas.length>0&&(()=>{
          const yaEnviado = !!localStorage.getItem(`sr_informe_${fecha}_${dia}`);
          return (
            <button style={{...s.btnPrimary,background:yaEnviado?"#0F6E56":"#8B2FC9",marginTop:8,width:"100%"}}
              onClick={async()=>{
                if(yaEnviado){alert("El informe del día ya fue enviado a tu email.");return;}
                const ok = await onCerrarDia();
                if(ok) alert("✅ Informe enviado a tu email correctamente.");
                else alert("❌ No se pudo enviar el informe. Verificá tu conexión.");
              }}>
              {yaEnviado?"✓ Informe ya enviado":"📧 Cerrar día y enviar informe"}
            </button>
          );
        })()}

        {/* ── Botón Cerrar día / actualizar stock ── */}
        {!yaCerrado ? (
          <button style={{width:"100%",padding:"14px",borderRadius:10,border:"2px solid #f5b942",background:"#2e1f06",color:"#f5b942",fontSize:15,fontWeight:600,cursor:"pointer",marginTop:10}}
            onClick={()=>setMostrarCierre(true)}>
            🔒 Cerrar el día y actualizar stock
          </button>
        ) : (
          <div style={{textAlign:"center",padding:"12px",borderRadius:10,background:"rgba(29,158,117,0.15)",color:"#4dd9a0",fontSize:13,fontWeight:500,marginTop:10}}>
            ✅ Día cerrado — stock actualizado
          </div>
        )}

        {/* ── Modal resumen de cierre ── */}
        {mostrarCierre&&(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:999,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
            onClick={()=>setMostrarCierre(false)}>
            <div style={{background:"var(--color-background-primary)",borderRadius:"16px 16px 0 0",padding:"24px 20px",width:"100%",maxWidth:480}}
              onClick={e=>e.stopPropagation()}>
              <div style={{fontSize:17,fontWeight:700,color:"var(--color-text-primary)",marginBottom:4}}>🔒 Cerrar el día</div>
              <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:16}}>Esto actualiza el stock de la sodería. Verificá que los números sean correctos.</div>
              <div style={{background:"var(--color-background-secondary)",borderRadius:10,overflow:"hidden",marginBottom:16}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",padding:"8px 12px",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                  {["Producto","✅ Llenos vuelven","📦 Vacíos vuelven"].map(h=>(
                    <div key={h} style={{fontSize:11,fontWeight:600,color:"var(--color-text-secondary)",textAlign:h==="Producto"?"left":"center"}}>{h}</div>
                  ))}
                </div>
                {["soda","b10","b20"].map(pk=>{
                  const esSoda=pk==="soda";
                  const llLabel=esSoda?`${Math.floor(sobrantes[pk]/CAJON_SODA)} caj (${sobrantes[pk]} un)`:String(sobrantes[pk]);
                  const vacLabel=esSoda?`${Math.floor(vaciosRec[pk]/CAJON_SODA)} caj (${vaciosRec[pk]} un)`:String(vaciosRec[pk]);
                  return (
                    <div key={pk} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",padding:"10px 12px",borderBottom:"0.5px solid var(--color-border-tertiary)",alignItems:"center"}}>
                      <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-primary)"}}>{PROD_LABEL[pk]}</div>
                      <div style={{textAlign:"center",fontSize:14,fontWeight:600,color:"#4dd9a0"}}>{llLabel}</div>
                      <div style={{textAlign:"center",fontSize:14,fontWeight:600,color:"#f5b942"}}>{vacLabel}</div>
                    </div>
                  );
                })}
                <div style={{background:"rgba(29,158,117,0.08)",borderTop:"1px solid rgba(29,158,117,0.3)",padding:"10px 12px"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"var(--color-text-secondary)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>📦 Quedará en sodería</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
                    {["soda","b10","b20"].map(pk=>{
                      const sk=planKeyToStockKey[pk];
                      const nuevoLl=(stock?.soderia?.[sk]||0)+sobrantes[pk];
                      const nuevoVac=(stock?.soderia_vacios?.[sk]||0)+vaciosRec[pk];
                      const esSoda=pk==="soda";
                      return (
                        <div key={pk} style={{textAlign:"center",background:"var(--color-background-primary)",borderRadius:8,padding:"8px 4px"}}>
                          <div style={{fontSize:10,color:"var(--color-text-tertiary)",marginBottom:2}}>{PROD_LABEL[pk]}</div>
                          <div style={{fontSize:15,fontWeight:700,color:"#4dd9a0"}}>{esSoda?`${Math.floor(nuevoLl/CAJON_SODA)} caj`:nuevoLl}</div>
                          <div style={{fontSize:10,color:"var(--color-text-tertiary)"}}>llenos</div>
                          <div style={{fontSize:13,fontWeight:600,color:"#f5b942",marginTop:2}}>{esSoda?`${Math.floor(nuevoVac/CAJON_SODA)} caj`:nuevoVac}</div>
                          <div style={{fontSize:10,color:"var(--color-text-tertiary)"}}>vacíos</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button style={{flex:1,padding:"13px",borderRadius:10,border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-secondary)",color:"var(--color-text-secondary)",fontSize:14,cursor:"pointer"}}
                  onClick={()=>setMostrarCierre(false)}>Cancelar</button>
                <button style={{flex:2,padding:"13px",borderRadius:10,border:"none",background:"#f5b942",color:"#1a1a1a",fontSize:14,fontWeight:700,cursor:"pointer"}}
                  onClick={confirmarCierre}>✅ Confirmar cierre</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function InicioReparto({dia,fecha,planilla,productos,cargasDia,stock,onGuardar,onVolver}) {
  const prodKeys = {"Sifón 1.5L":"soda","Bidón 10L":"b10","Bidón 20L":"b20"};
  const CAJON = 6; // sifones por cajón
  const [llenos,setLlenos] = useState(()=>{
    const precarga = (cargasDia||CARGA_DIA_DEFAULT)[dia]||CARGA_DIA_DEFAULT[dia]||{};
    const m={};
    productos.forEach(p=>{
      const k=prodKeys[p.nombre];
      if(k) m[k] = planilla?.productos?.[k]?.llenos || precarga[k] || "";
    });
    return m;
  });
  const yaIniciado = planilla?.iniciado;

  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Inicio del reparto · {dia}</span>
      </div>
      <div style={{padding:16}}>
        <div style={{...s.card,margin:"0 0 16px",background:"var(--color-background-info)",border:"0.5px solid var(--color-border-info)"}}>
          <div style={{fontSize:14,fontWeight:500,color:"var(--color-text-info)",marginBottom:4}}>
            📅 {dia} · {fecha ? new Date(fecha+'T12:00:00').toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) : ""}
          </div>
          <div style={{fontSize:13,color:"var(--color-text-secondary)"}}>
            {yaIniciado?"Podés modificar las cantidades iniciales si hay un error.":"Ingresá la cantidad de envases llenos con los que salís hoy."}
          </div>
        </div>

        <span style={{...s.sectionTitle,padding:"0 0 10px"}}>Envases llenos al salir</span>

        {productos.map(p=>{
          const k=prodKeys[p.nombre]; if(!k) return null;
          return (
            <div key={p.id} style={{...s.card,margin:"0 0 10px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:15,fontWeight:500,color:"var(--color-text-primary)"}}>{p.nombre}</div>
                <div style={{fontSize:12,color:"var(--color-text-secondary)"}}>{fmt(p.precio)} c/u</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <button style={{...s.btn,padding:"6px 18px",fontSize:22,lineHeight:1}}
                  onClick={()=>setLlenos(l=>({...l,[k]:Math.max(0,(Number(l[k])||0)-(k==="soda"?CAJON:1))}))}>
                  {k==="soda"?"-caj":"-"}
                </button>
                <div style={{textAlign:"center",minWidth:50}}>
                  <div style={{fontSize:26,fontWeight:500,color:"var(--color-text-primary)"}}>{llenos[k]||0}</div>
                  {k==="soda"&&<div style={{fontSize:10,color:"var(--color-text-tertiary)"}}>{Math.floor((llenos[k]||0)/CAJON)}caj+{(llenos[k]||0)%CAJON}un</div>}
                </div>
                <button style={{...s.btn,padding:"6px 18px",fontSize:22,lineHeight:1}}
                  onClick={()=>setLlenos(l=>({...l,[k]:(Number(l[k])||0)+(k==="soda"?CAJON:1)}))}>
                  {k==="soda"?"+caj":"+"}
                </button>
              </div>
            </div>
          );
        })}

        <div style={{...s.card,margin:"12px 0 20px",background:"var(--color-background-secondary)"}}>
          <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:6}}>Total envases cargados</div>
          <div style={{fontSize:28,fontWeight:500,color:"var(--color-text-primary)"}}>
            {Object.values(llenos).reduce((a,v)=>a+(Number(v)||0),0)}
          </div>
        </div>

        <button style={s.btnPrimary}
          onClick={()=>{
            const nuevaPlanilla = {
              ...(planilla||planillaDiaVacia()),
              iniciado:true,
              productos:{
                ...(planilla?.productos||{}),
                ...Object.fromEntries(Object.entries(llenos).map(([k,v])=>[k,{
                  ...(planilla?.productos?.[k]||{}),
                  llenos:v
                }]))
              }
            };
            onGuardar(nuevaPlanilla, true);
          }}>
          {yaIniciado?"Actualizar y continuar →":"🚀 Iniciar y descontar de sodería"}
        </button>
        {!yaIniciado&&(
          <button style={{...s.btn,width:"100%",padding:"12px",fontSize:13,borderRadius:10,marginTop:6}}
            onClick={()=>{
              const nuevaPlanilla = {
                ...planilla,
                iniciado:true,
                productos: Object.fromEntries(
                  Object.entries(cajones).map(([k,v])=>[k,{
                    ...(planilla?.productos?.[k]||{}),
                    llenos:v
                  }])
                )
              };
              onGuardar(nuevaPlanilla, false);
            }}>
            Iniciar sin descontar stock
          </button>
        )}
      </div>
      {/* Stock sodería */}
      {stock?.soderia&&(
        <div style={{...s.card,margin:"10px 14px 0",background:"var(--color-background-tertiary)"}}>
          <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:8}}>Stock actual · Sodería</div>
          <div style={{display:"flex",gap:16}}>
            {[["Sifón",stock?.soderia?.sifon||0],["Bidón 10L",stock?.soderia?.bidon10||0],["Bidón 20L",stock?.soderia?.bidon20||0]].map(([l,v])=>(
              <div key={l} style={{textAlign:"center"}}>
                <div style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{l}</div>
                <div style={{fontSize:18,fontWeight:500,color:v>0?"var(--color-text-primary)":"var(--color-text-danger)"}}>{v||0}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function ListaClientes({clientes,dia,fecha,ventas,todasVentas,noVisitas,prospectos,recordatorios,onSeleccionar,onNuevoCliente,onVolver,onReordenar,onRegistrarNoVisita,onQuitarNoVisita,onVentaProspecto,onNoEstaProspecto,onConfirmarTransfer}) {
  const [busqueda,setBusqueda] = useState("");
  const [editandoOrden,setEditandoOrden] = useState(null);
  const [ordenTemp,setOrdenTemp] = useState("");
  // ventas y noVisitas ya filtradas por fecha+dia desde App
  const atendidos = new Set(ventas.filter(v=>!v._esCobro&&!v._esAjuste).map(v=>v.clienteId));
  const noVMap = {}; (noVisitas||[]).filter(v=>v.fecha===fecha).forEach(v=>{noVMap[v.clienteId]=v.motivo;});
  // visitados = ventas + noesta2 + noquiso (noesta 1ra vez NO cuenta)
  const visitadosSinVenta = new Set(
    Object.entries(noVMap).filter(([,m])=>m==="noesta2"||m==="noquiso").map(([id])=>Number(id))
  );
  const visitados = new Set([...atendidos,...visitadosSinVenta]);
  const prospectosDelDia = (prospectos||[]).filter(p=>p.dia===dia&&p.estado==="activo");
  const visitadosProspectos = new Set(
    ventas.filter(v=>prospectosDelDia.some(p=>p.id===v.clienteId)).map(v=>v.clienteId)
  );

  const marcarNoVisita = (id,motivo) => {
    const prev = noVMap[id];
    if(motivo==="noesta"&&prev==="noesta") onRegistrarNoVisita(id,"noesta2");
    else if(prev===motivo) onQuitarNoVisita(id);
    else onRegistrarNoVisita(id,motivo);
  };

  const clientesOrdenados = [...clientes].sort((a,b)=>(a.orden||9999)-(b.orden||9999));
  const filtrados  = clientesOrdenados.filter(c=>c.nombre.toLowerCase().includes(busqueda.toLowerCase()));
  const pendientesNormales = filtrados.filter(c=>!visitados.has(c.id)&&noVMap[c.id]!=="noesta");
  const volverAlFinal      = filtrados.filter(c=>noVMap[c.id]==="noesta"&&!atendidos.has(c.id));
  const pendientes         = [...pendientesNormales, ...volverAlFinal];
  const sinEntrega         = filtrados.filter(c=>visitadosSinVenta.has(c.id));
  const listos             = filtrados.filter(c=>atendidos.has(c.id));

  const abrirRuta = ()=>{
    const cp=pendientes.filter(c=>c.maps).slice(0,9);
    if(!cp.length){alert("Ningún pendiente tiene Maps cargado.");return;}
    const dest=encodeURIComponent(cp[cp.length-1].maps);
    const wps=cp.slice(0,-1).map(c=>encodeURIComponent(c.maps)).join("|");
    window.open(`https://www.google.com/maps/dir/?api=1${wps?`&waypoints=${wps}`:""}&destination=${dest}&travelmode=driving`,"_blank");
  };

  const guardarOrden=(c)=>{
    const n=parseInt(ordenTemp);
    if(!isNaN(n)&&n>0) onReordenar(clientes.map(x=>x.id===c.id?{...x,orden:n}:x));
    setEditandoOrden(null);setOrdenTemp("");
  };

  const Card=({c})=>{
    const [fotoOpen,setFotoOpen] = React.useState(false);
    const atendido=atendidos.has(c.id), est=noVMap[c.id];
    const bc=atendido?"#1D9E75":est==="noesta"?"#EF9F27":(est==="noesta2"||est==="noquiso")?"#E24B4A":"var(--color-border-tertiary)";
    return (
      <>
      <div style={{...s.card,borderLeft:`3px solid ${bc}`,opacity:(visitados.has(c.id))?0.65:est==="noesta"?0.85:1}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
          <div style={{flexShrink:0,paddingTop:2}} onClick={()=>{if(!atendido){setEditandoOrden(c.id);setOrdenTemp(String(c.orden||""));}}}>
            {editandoOrden===c.id
              ? <input autoFocus type="number" min={1} value={ordenTemp}
                  onChange={e=>setOrdenTemp(e.target.value)}
                  onBlur={()=>guardarOrden(c)}
                  onKeyDown={e=>e.key==="Enter"&&guardarOrden(c)}
                  style={{width:40,textAlign:"center",padding:"3px",borderRadius:6,border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-secondary)",color:"var(--color-text-primary)",fontSize:14}} />
              : <div style={{width:34,height:34,borderRadius:8,background:"var(--color-background-secondary)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:600,color:"var(--color-text-secondary)",cursor:"pointer",border:"0.5px solid var(--color-border-tertiary)"}}>
                  {c.orden||"#"}
                </div>
            }
          </div>
          <div style={{flex:1,cursor:"pointer",minWidth:0}} onClick={()=>onSeleccionar(c)}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{fontWeight:500,fontSize:15,color:"var(--color-text-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5}}>
                {c.nombre}
                {c.foto&&<span style={{fontSize:10,color:"#4dd9a0",flexShrink:0,marginLeft:3}}>📷</span>}
              </div>
              {(recordatorios||[]).some(r=>r.clienteId===c.id&&!r.confirmado)&&(
                <span style={{fontSize:13,flexShrink:0}} title="Recordatorio pendiente">🔔</span>
              )}
              {(()=>{const vt=ventas.find(v=>v.clienteId===c.id&&v.fechaKey===fecha&&v.pago==="transferencia");
                if(!vt) return null;
                return (
                  <button style={{background:"none",border:"none",cursor:"pointer",padding:"2px 4px",lineHeight:1,flexShrink:0,display:"flex",alignItems:"center",gap:3,borderRadius:6,background:vt.transConfirmada?"transparent":"rgba(245,185,66,0.15)"}}
                    onClick={e=>{e.stopPropagation();onConfirmarTransfer&&onConfirmarTransfer(c.id,vt.id);}}
                    title={vt.transConfirmada?"Transfer. confirmada — tocá para desmarcar":"Tocá para confirmar transferencia"}>
                    <span style={{fontSize:15}}>{vt.transConfirmada?"🟢":"🔴"}</span>
                    {!vt.transConfirmada&&<span style={{fontSize:11,fontWeight:500,color:"#f5b942"}}>{fmt(vt.pagadoNum||vt.neto||0)}</span>}
                  </button>
                );
              })()}
            </div>
            <div style={{fontSize:17,color:"var(--color-text-secondary)",marginTop:2}}>
              {c.calle?`${c.calle} ${c.nro||""}`:c.manzana?`Mz ${c.manzana} L ${c.lote}`:""}{c.barrio?` · ${c.barrio}`:""}
            </div>
            {c.notas&&<div style={{fontSize:12,color:"var(--color-text-warning)",marginTop:2}}>📝 {c.notas}</div>}
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>
              <TagsCliente cliente={c} ventas={todasVentas||ventas}/>
              {atendido    && <span style={s.badge("success")}>✓ Listo</span>}
              {est==="noesta" && !atendido  && <span style={s.badge("warning")}>🔄 No estaba aún</span>}
              {est==="noesta2"  && <span style={s.badge("warning")}>No estaba</span>}
              {est==="noquiso"  && <span style={s.badge("danger")}>No quiso</span>}
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8,flexShrink:0,alignItems:"center"}}>
            {c.maps     && <a href={c.maps} target="_blank" rel="noreferrer" style={{fontSize:20,textDecoration:"none"}}>📍</a>}
            {c.telefono && <a href={`https://wa.me/54${c.telefono}`} target="_blank" rel="noreferrer" style={{fontSize:20,textDecoration:"none"}}>💬</a>}
            <span style={{fontSize:20,cursor:"pointer",lineHeight:1}} title="Foto domicilio" onClick={e=>{e.stopPropagation();setFotoOpen(true);}}>📷</span>
          </div>
        </div>
        {(!visitados.has(c.id)||est==="noesta")&&!atendido&&(
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button style={{background:"var(--color-background-warning)",color:"var(--color-text-warning)",border:"1px solid var(--color-border-warning)",borderRadius:10,padding:"10px 0",fontSize:13,cursor:"pointer",fontWeight:500,flex:1}}
              onClick={()=>marcarNoVisita(c.id,est==="noesta"?"noesta2":"noesta")}>
              {est==="noesta"?"2ª vez":"🔄 No está"}
            </button>
            <button style={{background:"var(--color-background-danger)",color:"var(--color-text-danger)",border:"1px solid var(--color-border-danger)",borderRadius:10,padding:"10px 0",fontSize:13,cursor:"pointer",fontWeight:500,flex:1}}
              onClick={()=>marcarNoVisita(c.id,"noquiso")}>No quiere</button>
            <button style={{background:"#185FA5",color:"#e2eaf4",border:"none",borderRadius:10,padding:"10px 0",fontSize:14,cursor:"pointer",fontWeight:600,flex:2}}
              onClick={()=>onSeleccionar(c)}>Entregar →</button>
          </div>
        )}
        {(est==="noesta2"||est==="noquiso")&&!atendido&&(
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:6}}>
            <button style={{...s.btn,fontSize:12,padding:"4px 10px"}} onClick={()=>onQuitarNoVisita(c.id)}>Desmarcar</button>
          </div>
        )}
      </div>
      {fotoOpen&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:2000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}} onClick={e=>{e.stopPropagation();setFotoOpen(false);}}>
          {c.foto
            ? <img src={c.foto} alt="Domicilio" style={{maxWidth:"100%",maxHeight:"60vh",borderRadius:10,objectFit:"contain",marginBottom:16}} />
            : <div style={{color:"#aaa",fontSize:14,marginBottom:20}}>Sin foto · {c.nombre}</div>
          }
          <div style={{display:"flex",gap:12}} onClick={e=>e.stopPropagation()}>
            <label style={{background:"#185FA5",color:"#e2eaf4",padding:"10px 18px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",textAlign:"center"}}>
              📷 Cámara
              <input type="file" accept="image/*" capture="environment" style={{display:"none"}}
                onChange={async e=>{const f=e.target.files[0];if(!f)return;const b64=await comprimirFoto(f);onReordenar(clientes.map(x=>x.id===c.id?{...x,foto:b64}:x));setFotoOpen(false);}} />
            </label>
            <label style={{background:"#2a3a4a",color:"#e2eaf4",padding:"10px 18px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",textAlign:"center"}}>
              🖼 Galería
              <input type="file" accept="image/*" style={{display:"none"}}
                onChange={async e=>{const f=e.target.files[0];if(!f)return;const b64=await comprimirFoto(f);onReordenar(clientes.map(x=>x.id===c.id?{...x,foto:b64}:x));setFotoOpen(false);}} />
            </label>
            {c.foto&&<button style={{background:"#3a2020",color:"#e05c5c",padding:"10px 14px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",border:"none"}} onClick={()=>{onReordenar(clientes.map(x=>x.id===c.id?{...x,foto:""}:x));setFotoOpen(false);}}>🗑</button>}
          </div>
          <span style={{color:"#aaa",fontSize:11,marginTop:14}}>Tocá fuera para cerrar</span>
        </div>
      )}
      </>
    );
  };

  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Clientes · {dia}</span>
        <button style={{...s.btn,padding:"6px 12px",fontSize:13}} onClick={onNuevoCliente}>+ Nuevo</button>
      </div>
      <div style={{padding:"10px 16px 6px"}}>
        <input style={s.input} placeholder="Buscar cliente..." value={busqueda} onChange={e=>setBusqueda(e.target.value)} />
        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap",alignItems:"center"}}>
          <span style={s.badge("success")}>{visitados.size}/{clientes.length} visitados</span>
          {volverAlFinal.length>0&&<span style={s.badge("warning")}>{volverAlFinal.length} volver al final</span>}
          {sinEntrega.length>0&&<span style={s.badge("danger")}>{sinEntrega.length} sin entrega</span>}
          <button style={{...s.btn,fontSize:11,padding:"3px 10px",marginLeft:"auto"}} onClick={abrirRuta}>🗺 Ruta Maps</button>
        </div>
        <p style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:6}}>Tocá el # para editar el número de orden del cliente</p>
      </div>
      {filtrados.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"var(--color-text-tertiary)",fontSize:14}}>No hay clientes para {dia}.</div>}
      {pendientesNormales.length>0&&<><span style={s.sectionTitle}>Pendientes ({pendientesNormales.length})</span>{pendientesNormales.map(c=><Card key={c.id} c={c}/>)}</>}
      {volverAlFinal.length>0&&<><span style={{...s.sectionTitle,color:"#f5b942"}}>🔄 Volver a visitar ({volverAlFinal.length})</span>{volverAlFinal.map(c=><Card key={c.id} c={c}/>)}</>}
      {listos.length>0&&<><span style={s.sectionTitle}>Entregado ({listos.length})</span>{listos.map(c=><Card key={c.id} c={c}/>)}</>}
      {sinEntrega.length>0&&<><span style={s.sectionTitle}>Sin entrega ({sinEntrega.length})</span>{sinEntrega.map(c=><Card key={c.id} c={c}/>)}</>}

      {/* Prospectos del día — al final de la lista */}
      {prospectosDelDia.length>0&&(
        <>
          <span style={{...s.sectionTitle,color:"#f5b942"}}>🚀 Prospectos en promoción ({prospectosDelDia.length})</span>
          {prospectosDelDia.map(p=>(
            <div key={p.id} style={{...s.card,borderLeft:"3px solid #f5b942",opacity:visitadosProspectos.has(p.id)?0.7:1}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                <div style={{width:34,height:34,borderRadius:8,background:"#2e1f06",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,color:"#f5b942",flexShrink:0}}>P</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:500,fontSize:14,color:"var(--color-text-primary)"}}>{p.nombre}</div>
                  <div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:2}}>
                    {p.barrio}{p.calle?` · ${p.calle} ${p.nro||""}`:p.manzana?` · Mz ${p.manzana} L ${p.lote}`:""}
                  </div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:4}}>
                    {p.sifon>0&&<span style={s.tag}>Sifón×{p.sifon}</span>}
                    {p.bidon10>0&&<span style={s.tag}>10L×{p.bidon10}</span>}
                    {p.bidon20>0&&<span style={s.tag}>20L×{p.bidon20}</span>}
                    {p.dispenser>0&&<span style={{...s.tag,color:"#5daaff"}}>Disp×{p.dispenser}</span>}
                    {visitadosProspectos.has(p.id)&&<span style={s.badge("success")}>✓ Registrado</span>}
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8,flexShrink:0}}>
                  {p.maps&&<a href={p.maps} target="_blank" rel="noreferrer" style={{fontSize:18,textDecoration:"none"}} onClick={e=>e.stopPropagation()}>📍</a>}
                  {p.telefono&&<a href={`https://wa.me/54${p.telefono}`} target="_blank" rel="noreferrer" style={{fontSize:18,textDecoration:"none"}} onClick={e=>e.stopPropagation()}>💬</a>}
                </div>
              </div>
              {!visitadosProspectos.has(p.id)&&(
                <div style={{display:"flex",gap:6,marginTop:8,justifyContent:"flex-end"}}>
                  <button style={{background:"var(--color-background-warning)",color:"var(--color-text-warning)",border:"0.5px solid var(--color-border-warning)",borderRadius:8,padding:"5px 10px",fontSize:11,cursor:"pointer"}}
                    onClick={()=>onNoEstaProspecto&&onNoEstaProspecto(p.id)}>No estaba</button>
                  <button style={{background:"#185FA5",color:"#e2eaf4",border:"none",borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:500}}
                    onClick={()=>onVentaProspecto&&onVentaProspecto(p)}>Registrar entrega →</button>
                </div>
              )}
            </div>
          ))}
        </>
      )}
    </div>
  );
}

function DetalleCliente({cliente,ventas,dia,fecha,productos,onVenta,onVolver,onEditar,onEliminarVenta,onEditarVenta,onEliminarCliente,onNoEstaCliente,onNoQuiereCliente,recordatorios,onGuardarRecordatorio,onConfirmarRecordatorio,onCobrarSaldo}) {
  const [editandoCliente,setEditandoCliente] = useState(false);
  const [editandoVentaId,setEditandoVentaId] = useState(null);
  const [editandoSaldo,setEditandoSaldo] = useState(false);
  const [tipoSaldoEdit,setTipoSaldoEdit] = useState("");
  const [montoSaldoEdit,setMontoSaldoEdit] = useState("");
  const [mostrarRecordatorio,setMostrarRecordatorio] = useState(false);
  const [mostrarPagoSaldo,setMostrarPagoSaldo] = useState(false);
  const [mostrarFotoGrande,setMostrarFotoGrande] = useState(false);
  const recActivos = (recordatorios||[]).filter(r=>r.clienteId===cliente.id&&!r.confirmado);
  const historial = [...ventas].sort((a,b)=>(b.fechaKey||"").localeCompare(a.fechaKey||"")||(b.id||0)-(a.id||0));
  const ventaHoy  = fecha ? ventas.find(v=>v.fechaKey===fecha&&!v._esCobro&&!v._esAjuste) : null;
  const initials  = cliente.nombre.split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase();
  const totalComprado = ventas.reduce((a,v)=>a+(v.neto||0),0);
  const promedioVenta = ventas.length>0 ? Math.round(totalComprado/ventas.length) : 0;
  const ventasUltimos30 = ventas.filter(v=>{
    const fk=v.fechaKey||""; if(!fk) return false;
    const d=new Date(fk); const hoy=new Date();
    return (hoy-d)/86400000<=30;
  }).length;

  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>{cliente.nombre}</span>
        <div style={{display:"flex",gap:4}}>
          <button style={{...s.btn,padding:"4px 8px",fontSize:18,lineHeight:1,position:"relative"}}
            onClick={()=>setMostrarRecordatorio(true)}>
            🔔
            {recActivos.length>0&&<span style={{position:"absolute",top:-3,right:-3,background:"#f5b942",color:"#0f1923",borderRadius:"50%",width:16,height:16,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{recActivos.length}</span>}
          </button>
          <button style={{...s.btn,fontSize:12,padding:"5px 10px"}} onClick={()=>{setEditandoCliente(!editandoCliente);setEditandoVentaId(null);}}>
            {editandoCliente?"Cancelar":"Editar"}
          </button>
        </div>
      </div>
      {mostrarPagoSaldo&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <PagoSaldoPanel
            saldo={cliente.saldo}
            onCobrar={(monto,pago)=>{
              onCobrarSaldo&&onCobrarSaldo(monto,pago);
              setMostrarPagoSaldo(false);
            }}
            onCerrar={()=>setMostrarPagoSaldo(false)}
          />
        </div>
      )}
      {mostrarRecordatorio&&(
        <RecordatorioModal
          cliente={cliente}
          onGuardar={(datos)=>{
            onGuardarRecordatorio&&onGuardarRecordatorio({...datos,clienteId:cliente.id,clienteNombre:cliente.nombre,dia:cliente.dia,id:Date.now(),confirmado:false});
            setMostrarRecordatorio(false);
          }}
          onCerrar={()=>setMostrarRecordatorio(false)}
        />
      )}

      {mostrarFotoGrande&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:2000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setMostrarFotoGrande(false)}>
          {cliente.foto
            ? <img src={cliente.foto} alt="Domicilio" style={{maxWidth:"100%",maxHeight:"60vh",borderRadius:10,objectFit:"contain",marginBottom:16}} />
            : <div style={{color:"#aaa",fontSize:14,marginBottom:20}}>Sin foto aún · {cliente.nombre}</div>
          }
          <div style={{display:"flex",gap:12}} onClick={e=>e.stopPropagation()}>
            <label style={{background:"#185FA5",color:"#e2eaf4",padding:"12px 20px",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"center"}}>
              📷 Cámara
              <input type="file" accept="image/*" capture="environment" style={{display:"none"}}
                onChange={async e=>{const f=e.target.files[0];if(!f)return;const b64=await comprimirFoto(f);onEditar({foto:b64});setMostrarFotoGrande(false);}} />
            </label>
            <label style={{background:"#2a3a4a",color:"#e2eaf4",padding:"12px 20px",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"center"}}>
              🖼 Galería
              <input type="file" accept="image/*" style={{display:"none"}}
                onChange={async e=>{const f=e.target.files[0];if(!f)return;const b64=await comprimirFoto(f);onEditar({foto:b64});setMostrarFotoGrande(false);}} />
            </label>
            {cliente.foto&&<button style={{background:"#3a2020",color:"#e05c5c",padding:"12px 14px",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",border:"none"}} onClick={()=>{onEditar({foto:""});setMostrarFotoGrande(false);}}>🗑</button>}
          </div>
          <span style={{color:"#aaa",fontSize:11,marginTop:14}}>Tocá fuera para cerrar</span>
        </div>
      )}
      <div style={{padding:16}}>
        {recActivos.length>0&&!editandoCliente&&(
          <div style={{marginBottom:10}}>
            {recActivos.map(r=>(
              <div key={r.id} style={{...s.card,margin:"0 0 6px",background:"#2e1f06",border:"1px solid #f5b942",display:"flex",gap:10,alignItems:"flex-start"}}>
                <span style={{fontSize:18,flexShrink:0}}>🔔</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:500,color:"#f5b942"}}>{r.fecha} {r.hora&&`· ${r.hora}`}</div>
                  <div style={{fontSize:13,color:"var(--color-text-primary)",marginTop:2}}>{r.motivo}</div>
                </div>
                <button style={{background:"#4dd9a0",color:"#0a2e1f",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",flexShrink:0}}
                  onClick={()=>onConfirmarRecordatorio&&onConfirmarRecordatorio(r.id)}>
                  ✓ Listo
                </button>
              </div>
            ))}
          </div>
        )}
        {!editandoCliente && <>
          {/* Header cliente */}
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
            {cliente.foto
              ? <img src={cliente.foto} alt="" onClick={()=>setMostrarFotoGrande(true)} title="Ver foto grande" style={{width:52,height:52,borderRadius:10,objectFit:"cover",flexShrink:0,border:"0.5px solid var(--color-border-tertiary)",cursor:"zoom-in"}} />
              : <div style={{width:52,height:52,borderRadius:10,background:"var(--color-background-info)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:500,fontSize:18,color:"var(--color-text-info)",flexShrink:0}}>{initials}</div>
            }
            <div style={{flex:1}}>
              <div style={{fontWeight:500,fontSize:16,color:"var(--color-text-primary)"}}>{cliente.nombre}</div>
              <div style={{fontSize:12,color:"var(--color-text-secondary)"}}>
                {cliente.calle?`${cliente.calle} ${cliente.nro||""} · `:cliente.manzana?`Mz ${cliente.manzana} L ${cliente.lote} · `:""}
                {cliente.barrio} · {cliente.dia}
              </div>
              {cliente.notas&&<div style={{fontSize:12,color:"var(--color-text-warning)",marginTop:3}}>📝 {cliente.notas}</div>}
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              {cliente.maps     && <a href={cliente.maps} target="_blank" rel="noreferrer" style={{fontSize:26,textDecoration:"none"}}>📍</a>}
              {cliente.telefono && <a href={`https://wa.me/54${cliente.telefono}`} target="_blank" rel="noreferrer" style={{fontSize:26,textDecoration:"none"}}>💬</a>}

            </div>
          </div>

          {/* Foto domicilio si existe - clickable */}
          {cliente.foto&&!editandoCliente&&(
            <div style={{marginBottom:10,cursor:"zoom-in",borderRadius:10,overflow:"hidden",maxHeight:140,position:"relative"}} onClick={()=>setMostrarFotoGrande(true)}>
              <img src={cliente.foto} alt="Domicilio" style={{width:"100%",maxHeight:140,objectFit:"cover",display:"block"}} />
              <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.5))",padding:"6px 10px",fontSize:11,color:"#fff"}}>
                📷 Domicilio · tocá para ampliar
              </div>
            </div>
          )}

          {/* Métricas */}
          <div style={{...s.grid2,marginBottom:12}}>
            <div style={s.metricCard}>
              <div style={s.metricLabel}>Saldo</div>
              <div style={{...s.metricVal,color:cliente.saldo<0?"var(--color-text-danger)":cliente.saldo>0?"var(--color-text-success)":"var(--color-text-primary)"}}>{fmt(cliente.saldo)}</div>
              <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}}>{cliente.saldo<0?"Debe":cliente.saldo>0?"A su favor":"Al día"}</div>
            </div>
            <div style={s.metricCard}>
              <div style={s.metricLabel}>Total histórico</div>
              <div style={s.metricVal}>{fmt(totalComprado)}</div>
              <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}}>{ventas.length} compras</div>
            </div>
          </div>

          {/* Saldo */}
          <div style={{...s.card,margin:"0 0 10px",borderLeft:cliente.saldo<0?"3px solid var(--color-text-danger)":cliente.saldo>0?"3px solid #4dd9a0":"0.5px solid var(--color-border-tertiary)"}}>
            {!editandoSaldo?(
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:12,color:"var(--color-text-secondary)"}}>{cliente.saldo<0?"Saldo pendiente":cliente.saldo>0?"Saldo a favor":"Sin saldo"}</div>
                  <div style={{fontSize:20,fontWeight:500,color:cliente.saldo<0?"var(--color-text-danger)":cliente.saldo>0?"#4dd9a0":"var(--color-text-tertiary)"}}>{fmt(Math.abs(cliente.saldo))}</div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  {cliente.saldo<0&&(
                    <button style={{background:"#185FA5",color:"#e2eaf4",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:500,cursor:"pointer"}}
                      onClick={()=>setMostrarPagoSaldo(true)}>
                      💰 Cobrar
                    </button>
                  )}
                  <button style={{...s.btn,fontSize:11,padding:"4px 10px"}} onClick={()=>setEditandoSaldo(true)}>Ajustar</button>
                </div>
              </div>
            ):(
              <div>
                <div style={{fontSize:12,color:"var(--color-text-secondary)",marginBottom:8,fontWeight:500}}>Ajustar saldo</div>
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  {[["favor","A favor"],["deuda","Debe"],["cero","En cero"]].map(([v,l])=>(
                    <button key={v} style={{flex:1,fontSize:11,padding:"6px 4px",borderRadius:8,border:"0.5px solid var(--color-border-secondary)",cursor:"pointer",
                      background:tipoSaldoEdit===v?"#185FA5":"var(--color-background-secondary)",
                      color:tipoSaldoEdit===v?"#e2eaf4":"var(--color-text-secondary)"}}
                      onClick={()=>setTipoSaldoEdit(v)}>{l}</button>
                  ))}
                </div>
                {tipoSaldoEdit&&tipoSaldoEdit!=="cero"&&(
                  <input style={{...s.input,marginBottom:8}} type="number" min={0} placeholder="Monto ($)"
                    value={montoSaldoEdit} onChange={e=>setMontoSaldoEdit(e.target.value)} />
                )}
                <div style={{display:"flex",gap:6}}>
                  <button style={{...s.btn,flex:1,fontSize:12}} onClick={()=>{setEditandoSaldo(false);setTipoSaldoEdit("");setMontoSaldoEdit("");}}>Cancelar</button>
                  <button style={{...s.btnPrimary,flex:2,fontSize:12,padding:"8px"}} onClick={()=>{
                    let s=cliente.saldo||0;
                    if(tipoSaldoEdit==="favor") s=Math.abs(Number(montoSaldoEdit)||0);
                    if(tipoSaldoEdit==="deuda") s=-Math.abs(Number(montoSaldoEdit)||0);
                    if(tipoSaldoEdit==="cero")  s=0;
                    onEditar({saldo:s});
                    setEditandoSaldo(false);setTipoSaldoEdit("");setMontoSaldoEdit("");
                  }}>Guardar saldo</button>
                </div>
              </div>
            )}
          </div>

          {/* Registrar venta — solo una por día */}
          {ventaHoy
            ? <div style={{...s.card,margin:"0 0 12px",borderLeft:"3px solid #1D9E75",padding:"10px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:14,fontWeight:500,color:"#4dd9a0"}}>✓ Entrega registrada hoy</span>
                  <span style={s.badge("success")}>{fmt(ventaHoy.neto)}</span>
                </div>
                <div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:4}}>
                  {ventaHoy.detalle.map(d=>`${d.nombre} ×${d.cantidad}`).join(" · ")} · {ventaHoy.pago}
                </div>
              </div>
            : <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                <button style={{background:"var(--color-background-warning)",color:"var(--color-text-warning)",border:"1px solid var(--color-border-warning)",borderRadius:10,padding:"12px 0",fontSize:13,cursor:"pointer",fontWeight:500,flex:1,minWidth:90}}
                  onClick={()=>{onNoEstaCliente&&onNoEstaCliente();}}>
                  🔄 No está
                </button>
                <button style={{background:"var(--color-background-danger)",color:"var(--color-text-danger)",border:"1px solid var(--color-border-danger)",borderRadius:10,padding:"12px 0",fontSize:13,cursor:"pointer",fontWeight:500,flex:1,minWidth:90}}
                  onClick={()=>{onNoQuiereCliente&&onNoQuiereCliente();}}>
                  🚫 No quiere
                </button>
                <button style={{...s.btnPrimary,padding:"12px 0",fontSize:15,borderRadius:10,flex:2,minWidth:120}} onClick={onVenta}>
                  📦 Registrar entrega
                </button>
              </div>
          }

          {/* Historial colapsable */}
          <details style={{marginTop:4}}>
            <summary style={{cursor:"pointer",listStyle:"none",display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--color-background-tertiary)",borderRadius:8,padding:"10px 14px",marginBottom:4}}>
              <span style={{fontSize:13,fontWeight:500,color:"var(--color-text-primary)"}}>📋 Historial ({ventas.length} compras · {fmt(totalComprado)})</span>
              <span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>▾</span>
            </summary>
          <div style={{marginTop:4}}>
          {historial.length===0&&<p style={{fontSize:13,color:"var(--color-text-tertiary)",padding:"4px 0"}}>Sin registros aún</p>}
          {historial.map(v=>(
            <div key={v.id} style={{marginBottom:8}}>
              {editandoVentaId===v.id
                ? <EditVenta venta={v} productos={productos} onGuardar={(d,p,m,sa,obs,tr2)=>{onEditarVenta(v.id,d,p,m,sa,obs,tr2);setEditandoVentaId(null);}} onCancelar={()=>setEditandoVentaId(null)} />
                : <div style={{...s.card,margin:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                      <span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{v.fechaKey||v.fecha?.slice(0,10)||v.dia} · {v.fecha?.slice(-8)||""}</span>
                      <span style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>{fmt(v.neto)}</span>
                    </div>
                    <div style={{fontSize:13,color:"var(--color-text-primary)",marginBottom:3}}>{v.detalle.map(d=>`${d.nombre} ×${d.cantidad}`).join(" · ")}</div>
                    <div style={{fontSize:11,color:"var(--color-text-secondary)",marginBottom:6}}>
                      {v.pago}{v.desc>0?` · desc. ${fmt(v.desc)}`:""}{v.saldoAplicado>0?` · saldo ${fmt(v.saldoAplicado)}`:""}{v.obs?` · ${v.obs}`:""}
                    </div>
                    <div style={{display:"flex",justifyContent:"flex-end",gap:6}}>
                      <button style={{...s.btn,fontSize:11,padding:"4px 10px"}} onClick={()=>setEditandoVentaId(v.id)}>Editar</button>
                      <button style={{...s.btnDanger,fontSize:11,padding:"4px 10px"}} onClick={()=>{if(window.confirm(`¿Eliminar venta de ${fmt(v.neto)}?`))onEliminarVenta(v.id);}}>Eliminar</button>
                    </div>
                  </div>
              }
            </div>
          ))}
          </div>
          </details>

          {/* Envases colapsable */}
          <details style={{marginTop:6}}> 
            <summary style={{cursor:"pointer",listStyle:"none",display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--color-background-tertiary)",borderRadius:8,padding:"10px 14px",marginBottom:4}}>
              <span style={{fontSize:13,fontWeight:500,color:"var(--color-text-primary)"}}>🫧 Envases</span>
              <span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>▾</span>
            </summary>
            <div style={{marginTop:4}}>
              {(()=>{
                const pkEnv={"Sifón 1.5L":"sifon","Bidón 10L":"bidon10","Bidón 20L":"bidon20"};
                const extra={sifon:0,bidon10:0,bidon20:0};
                historial.forEach(v=>{
                  (v.envPrest||[]).forEach(e=>{const k=pkEnv[e.prod];if(k)extra[k]+=Number(e.cant)||0;});
                  (v.envDev||[]).forEach(e=>{const k=pkEnv[e.prod];if(k)extra[k]-=Number(e.cant)||0;});
                });
                // Sumar ajuste manual
                const aj=cliente.envAjuste||{};
                const exTotal={sifon:extra.sifon+(aj.sifon||0),bidon10:extra.bidon10+(aj.bidon10||0),bidon20:extra.bidon20+(aj.bidon20||0)};
                const hab={sifon:cliente.sifon||0,bidon10:cliente.bidon10||0,bidon20:cliente.bidon20||0};
                const total={sifon:hab.sifon+exTotal.sifon,bidon10:hab.bidon10+exTotal.bidon10,bidon20:hab.bidon20+exTotal.bidon20};
                const hayExtra=exTotal.sifon!==0||exTotal.bidon10!==0||exTotal.bidon20!==0;
                return (<>
                  <div style={{...s.card,margin:"0 0 10px",background:"var(--color-background-tertiary)"}}>
                    <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:8}}>📦 En poder del cliente ahora</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {total.sifon>0&&<div style={s.metricCard}><div style={s.metricLabel}>Sifón</div><div style={{...s.metricVal,color:exTotal.sifon>0?"var(--color-text-warning)":exTotal.sifon<0?"var(--color-text-success)":"var(--color-text-primary)"}}>{total.sifon}</div></div>}
                      {total.bidon10>0&&<div style={s.metricCard}><div style={s.metricLabel}>10L</div><div style={{...s.metricVal,color:exTotal.bidon10>0?"var(--color-text-warning)":exTotal.bidon10<0?"var(--color-text-success)":"var(--color-text-primary)"}}>{total.bidon10}</div></div>}
                      {total.bidon20>0&&<div style={s.metricCard}><div style={s.metricLabel}>20L</div><div style={{...s.metricVal,color:exTotal.bidon20>0?"var(--color-text-warning)":exTotal.bidon20<0?"var(--color-text-success)":"var(--color-text-primary)"}}>{total.bidon20}</div></div>}
                      {cliente.dispenser>0&&<div style={s.metricCard}><div style={s.metricLabel}>Dispenser</div><div style={s.metricVal}>{cliente.dispenser}</div></div>}
                      {!total.sifon&&!total.bidon10&&!total.bidon20&&!cliente.dispenser&&<span style={{fontSize:13,color:"var(--color-text-tertiary)"}}>Sin envases</span>}
                    </div>
                    {hayExtra&&(
                      <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:8,borderTop:"0.5px solid var(--color-border-tertiary)",paddingTop:6}}>
                        {(hab.sifon>0||hab.bidon10>0||hab.bidon20>0)&&<span>Habitual: {hab.sifon>0?`Sifón×${hab.sifon} `:""}{hab.bidon10>0?`10L×${hab.bidon10} `:""}{hab.bidon20>0?`20L×${hab.bidon20}`:""} · </span>}
                        {exTotal.sifon!==0&&<span style={{color:exTotal.sifon>0?"var(--color-text-warning)":"var(--color-text-success)"}}>{exTotal.sifon>0?`+${exTotal.sifon} sif. extra`:` −${Math.abs(exTotal.sifon)} sif. devueltos`} </span>}
                        {exTotal.bidon10!==0&&<span style={{color:exTotal.bidon10>0?"var(--color-text-warning)":"var(--color-text-success)"}}>{exTotal.bidon10>0?`+${exTotal.bidon10} 10L extra`:` −${Math.abs(exTotal.bidon10)} 10L devueltos`} </span>}
                        {exTotal.bidon20!==0&&<span style={{color:exTotal.bidon20>0?"var(--color-text-warning)":"var(--color-text-success)"}}>{exTotal.bidon20>0?`+${exTotal.bidon20} 20L extra`:` −${Math.abs(exTotal.bidon20)} 20L devueltos`}</span>}
                      </div>
                    )}
                  </div>
                </>);
              })()}
              <div style={{fontSize:12,fontWeight:500,color:"var(--color-text-secondary)",margin:"10px 0 6px"}}>Movimientos registrados</div>
              {historial.filter(v=>(v.envPrest||[]).length>0||(v.envDev||[]).length>0).length===0&&
                <p style={{fontSize:13,color:"var(--color-text-tertiary)"}}>Sin movimientos de envases registrados</p>}
              {historial.filter(v=>(v.envPrest||[]).length>0||(v.envDev||[]).length>0).map(v=>(
                <div key={v.id} style={{...s.card,margin:"0 0 8px"}}>
                  <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginBottom:4}}>{v.fechaKey||v.dia}</div>
                  {(v.envPrest||[]).map((e,i)=>(
                    <div key={"p"+i} style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}>
                      <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>+ Prestado: {e.prod}</span>
                      <span style={s.badge("warning")}>×{e.cant}</span>
                    </div>
                  ))}
                  {(v.envDev||[]).map((e,i)=>(
                    <div key={"d"+i} style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}>
                      <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>← Devuelto: {e.prod}</span>
                      <span style={s.badge("success")}>×{e.cant}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </details>


          <div style={{...s.divider,marginTop:12}}/>
          <details style={{marginTop:4}}>
            <summary style={{fontSize:12,color:"var(--color-text-tertiary)",cursor:"pointer",padding:"4px 0",listStyle:"none",display:"flex",alignItems:"center",gap:4}}>
              ⚙ Opciones avanzadas
            </summary>
            <div style={{marginTop:8}}>
              <button style={{...s.btnDanger,width:"100%",padding:"10px",fontSize:13}} onClick={()=>{if(window.confirm(`¿Eliminar a ${cliente.nombre}? Se borrarán también sus ventas.`))onEliminarCliente();}}>
                Eliminar cliente
              </button>
            </div>
          </details>
        </>}
        {editandoCliente && <EditCliente cliente={cliente} onGuardar={cambios=>{onEditar(cambios);setEditandoCliente(false);}} onEliminarCliente={onEliminarCliente} />}
      </div>
    </div>
  );
}

function EditCliente({cliente,onGuardar,onEliminarCliente}) {
  const [datos,setDatos]=useState({...cliente});
  const set=(k,v)=>setDatos(d=>({...d,[k]:v}));
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
      <div><label style={s.label}>Día de reparto</label>
        <select style={s.select} value={datos.dia} onChange={e=>set("dia",e.target.value)}>{DIAS.map(d=><option key={d} value={d}>{d}</option>)}</select>
      </div>
      {[["nombre","Nombre y apellido"],["barrio","Barrio"],["manzana","Manzana"],["lote","Lote"],["sector","Sector"],["calle","Calle"],["nro","Número"],["telefono","Teléfono (sin 0 ni 15)"],["maps","Link Google Maps"],["foto","Link foto del domicilio (Google Drive, etc)"]].map(([k,l])=>(
        <div key={k}><label style={s.label}>{l}</label><input style={s.input} value={datos[k]||""} onChange={e=>set(k,e.target.value)} placeholder={l} /></div>
      ))}
      <div>
        <label style={s.label}>Notas rápidas (timbre roto, perro, cobrar deuda, etc.)</label>
        <input style={s.input} value={datos.notas||""} onChange={e=>set("notas",e.target.value)} placeholder="ej: timbre roto, cobrar $2000..." />
      </div>
      <span style={{...s.label,fontSize:13,marginTop:4}}>Envases habituales</span>
      <div style={s.grid3}>
        {[["sifon","Sifón"],["bidon10","10L"],["bidon20","20L"]].map(([k,l])=>(
          <div key={k}><label style={{...s.label,textAlign:"center"}}>{l}</label>
            <input style={{...s.input,textAlign:"center"}} type="number" min={0} value={datos[k]||0} onChange={e=>set(k,Number(e.target.value))} />
          </div>
        ))}
      </div>
      <div>
        <label style={s.label}>Dispenser en comodato</label>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button style={{...s.btn,padding:"5px 16px",fontSize:20,lineHeight:1}} onClick={()=>set("dispenser",Math.max(0,(datos.dispenser||0)-1))}>−</button>
          <span style={{fontSize:20,fontWeight:500,minWidth:32,textAlign:"center",color:"var(--color-text-primary)"}}>{datos.dispenser||0}</span>
          <button style={{...s.btn,padding:"5px 16px",fontSize:20,lineHeight:1}} onClick={()=>set("dispenser",(datos.dispenser||0)+1)}>+</button>
          <span style={{fontSize:12,color:"var(--color-text-secondary)"}}>unidades prestadas</span>
        </div>
      </div>
      <div><label style={s.label}>Saldo (corrección manual)</label><input style={s.input} type="number" value={datos.saldo||0} onChange={e=>set("saldo",Number(e.target.value))} /></div>
      {datos.foto&&<div style={{position:"relative",cursor:"zoom-in"}} onClick={()=>setMostrarFotoGrande(true)}>
        <img src={datos.foto} alt="Domicilio" style={{width:"100%",borderRadius:8,maxHeight:160,objectFit:"cover"}} />
        <div style={{position:"absolute",bottom:6,right:8,background:"rgba(0,0,0,0.55)",color:"#fff",fontSize:11,borderRadius:6,padding:"2px 8px"}}>🔍 Ampliar</div>
      </div>}
      <button style={s.btnPrimary} onClick={()=>onGuardar(datos)}>Guardar cambios</button>
      <div style={{marginTop:16,paddingTop:12,borderTop:"0.5px solid var(--color-border-tertiary)"}}>
        <button style={{...s.btnDanger,width:"100%",padding:"10px",fontSize:13}}
          onClick={()=>{if(window.confirm(`¿Eliminar a ${datos.nombre}? Se borrarán también todas sus ventas.`))onEliminarCliente();}}>
          Eliminar cliente permanentemente
        </button>
      </div>
    </div>
  );
}
