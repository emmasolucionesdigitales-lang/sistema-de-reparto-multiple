/* ── AUTH ── */
auth.onAuthStateChanged(function(user){
  var btn=document.getElementById("btn-escala");
  if(!user){if(btn)btn.style.display="none";renderLogin("");return;}
  if(user.uid!==ADMIN_UID){auth.signOut();renderLogin("Acceso denegado.");return;}
  if(btn)btn.style.display="flex";
  cargarTodo();
});

function loginGoogle(){
  var email=document.getElementById("adminEmail")?document.getElementById("adminEmail").value:"";
  var pass=document.getElementById("adminPass")?document.getElementById("adminPass").value:"";
  if(!email||!pass){toast("Completá email y contraseña",false);return;}
  auth.signInWithEmailAndPassword(email,pass).catch(function(e){toast("Email o contraseña incorrectos",false);});
}
function logout(){auth.signOut();document.getElementById("btn-escala").style.display="none";}

    {key:"gestion",       icon:"💰", label:"Emma Control",   count:gestionUsuarios.length},
    {key:"polleria",      icon:"🍗", label:"Pollería",        count:totalPoll},
    {key:"reposteria",    icon:"🎂", label:"Repostería",      count:totalRepos},

    var cls="ptab"+(productoActivo===t.key?" activo":"");
    var badge=t.count>0?'<span class="ptab-badge">'+t.count+'</span>':"";
    return '<div class="'+cls+'" onclick="cambiarProducto(\''+t.key+'\')">'+t.icon+' '+t.label+badge+'</div>';

  var bodyContent="";
  if(productoActivo==="reparto")           bodyContent=renderReparto();
  else if(productoActivo==="repartomulti") bodyContent=renderRepartoMulti();
  else if(productoActivo==="kiosco")       bodyContent=renderKiosco();
  else if(productoActivo==="gestion")      bodyContent=renderGestion();
  else if(productoActivo==="polleria")     bodyContent=renderPolleria();
  else if(productoActivo==="reposteria")   bodyContent=renderReposteria();

function toSlug(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");}
function diasRestantes(f){if(!f)return null;return Math.ceil((new Date(f)-new Date())/(1000*60*60*24));}
function formatFecha(f){if(!f)return"—";return new Date(f).toLocaleDateString("es-AR");}

function calcularEstadoCobro(c){
  var precio=Number(c.precioMensual||0);
  if(!precio)return{estado:"sin_precio",monto:0,montoFinal:0};
  var hoy=new Date();
  var dia=hoy.getDate();
  var mes=hoy.getFullYear()+"-"+String(hoy.getMonth()+1).padStart(2,"0");
  var pagado=(c.ultimoPago||"").startsWith(mes);
  var recargo=Math.round(precio*(1+RECARGO_PCT/100));
  if(pagado)return{estado:"al_dia",monto:precio,montoFinal:precio};
  if(dia<=DIA_RECARGO)return{estado:"pendiente",monto:precio,montoFinal:precio,diasRestantes:DIA_RECARGO-dia+1};
  if(dia<=DIA_SUSPENSION)return{estado:"con_recargo",monto:precio,montoFinal:recargo,diasRestantes:DIA_SUSPENSION-dia};
  return{estado:"suspender",monto:precio,montoFinal:recargo,diasVencido:dia-DIA_SUSPENSION};
}
function cobroBadge(c){
  if(!c.precioMensual)return'<span class="cobro-badge cobro-sin">Sin precio</span>';
  var ec=calcularEstadoCobro(c);
  if(ec.estado==="al_dia")return'<span class="cobro-badge cobro-ok">💚 Cobrado</span>';
  if(ec.estado==="pendiente")return'<span class="cobro-badge cobro-pend">💛 $'+ec.montoFinal.toLocaleString("es-AR")+'</span>';
  if(ec.estado==="con_recargo")return'<span class="cobro-badge cobro-recargo">🟠 $'+ec.montoFinal.toLocaleString("es-AR")+' +15%</span>';
  return'<span class="cobro-badge cobro-vencido">🔴 SUSPENDER</span>';
}

function escHtmlBasico(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#39;").replace(/"/g,"&quot;");}
async function marcarPagado(tipo,id){
  var monto=Number((document.getElementById("cobro-monto")||{value:0}).value)||0;
  if(!monto){toast("Ingresá un monto",false);return;}
  var ref=getDbByTipo(tipo);var c=getClienteByTipo(tipo,id);if(!ref||!c)return;
  var hist=(c.historialPagos||[]);
  var hoy=new Date().toISOString().slice(0,10);
  hist.push({fecha:hoy,monto:monto,via:"Manual"});
  var upd={ultimoPago:hoy,historialPagos:hist};
  if(tipo==="reparto"||tipo==="reposteria"){if(c.estado==="inactivo")upd.estado="activo";}
  else if(tipo==="kiosco"||tipo==="polleria"){if(!c.activo)upd.activo=true;}
  else if(tipo==="gestion"){if(c.estado==="inactivo")upd.estado="usado";}
  try{
    await ref.db.collection(ref.col).doc(id).update(upd);
    toast("✅ Pago $"+monto.toLocaleString("es-AR")+" registrado");
    cerrarModalBtn();cargarTodo();
  }catch(e){toast(e.message,false);}
}
async function verificarPagoMP(tipo,id){
  if(!MP_ACCESS_TOKEN){toast("⚙️ Configurá tu Access Token de MP",false);setTimeout(abrirConfigMP,600);return;}
  var hoy=new Date();
  var ini=new Date(hoy.getFullYear(),hoy.getMonth(),1).toISOString();
  var fin=new Date(hoy.getFullYear(),hoy.getMonth()+1,0,23,59,59).toISOString();
  toast("🔍 Consultando MercadoPago...");
  try{
    var resp=await fetch(
      "https://api.mercadopago.com/v1/payments/search?external_reference="+encodeURIComponent(id)+"&status=approved&sort=date_created&criteria=desc&range=date_created&begin_date="+encodeURIComponent(ini)+"&end_date="+encodeURIComponent(fin),
      {headers:{"Authorization":"Bearer "+MP_ACCESS_TOKEN}}
    );
    if(!resp.ok){toast("Error MP: "+resp.status+" — verificá tu token",false);return;}
    var data=await resp.json();
    if(data.results&&data.results.length>0){
      var pago=data.results[0];
      var monto=pago.transaction_amount||0;
      var fechaPago=(pago.date_approved||new Date().toISOString()).slice(0,10);
      var ref=getDbByTipo(tipo);var c=getClienteByTipo(tipo,id);
      var hist=(c&&c.historialPagos)||[];
      hist.push({fecha:fechaPago,monto:monto,via:"MercadoPago",mpId:pago.id});
      var upd={ultimoPago:fechaPago,historialPagos:hist};
      if(tipo==="reparto"||tipo==="reposteria"){if(c&&c.estado==="inactivo")upd.estado="activo";}
      else if(tipo==="kiosco"||tipo==="polleria"){if(c&&!c.activo)upd.activo=true;}
      else if(tipo==="gestion"){if(c&&c.estado==="inactivo")upd.estado="usado";}
      await ref.db.collection(ref.col).doc(id).update(upd);
      toast("✅ Pago verificado en MP: $"+monto.toLocaleString("es-AR"));
      cerrarModalBtn();cargarTodo();
    }else{
      toast("❌ No se encontró pago aprobado este mes en MP",false);
    }
  }catch(e){
    var msg=e.message||"";
    if(msg.indexOf("fetch")>=0||msg.indexOf("CORS")>=0)toast("⚠️ Error de red MP — marcá manualmente",false);
    else toast("Error MP: "+msg,false);
  }
}
async function suspenderPorPago(tipo,id){
  var c=getClienteByTipo(tipo,id);
  var nombre=c?c.nombre||c.negocio||id:id;
  if(!confirm("¿Suspender acceso a "+nombre+" por falta de pago?"))return;
  var ref=getDbByTipo(tipo);if(!ref)return;
  var upd={};
  if(tipo==="reparto"||tipo==="reposteria")upd.estado="inactivo";
  else if(tipo==="kiosco"||tipo==="polleria")upd.activo=false;
  else if(tipo==="gestion")upd.estado="inactivo";
  try{
    await ref.db.collection(ref.col).doc(id).update(upd);
    toast("🔴 "+nombre+" suspendido");cerrarModalBtn();cargarTodo();
  }catch(e){toast(e.message,false);}
}
async function chequearSuspensionesAutomaticas(){
  var hoy=new Date();var dia=hoy.getDate();
  if(dia<=DIA_SUSPENSION)return;
  var mes=hoy.getFullYear()+"-"+String(hoy.getMonth()+1).padStart(2,"0");
  function necesita(c){return c.precioMensual&&!(c.ultimoPago||"").startsWith(mes);}
  var promesas=[];var susp=0;
  licencias.forEach(function(l){if(necesita(l)&&l.estado!=="inactivo"&&l.estado!=="pendiente"){promesas.push(dbReparto.collection("licencias").doc(l.id).update({estado:"inactivo"}));l.estado="inactivo";susp++;}});
  kioscoClientes.forEach(function(c){if(necesita(c)&&c.activo){promesas.push(dbKiosco.collection("clientes").doc(c.id).update({activo:false}));c.activo=false;susp++;}});
  gestionUsuarios.forEach(function(u){if(necesita(u)&&u.estado!=="inactivo"&&u.estado!=="disponible"){promesas.push(dbGestion.collection("licencias").doc(u.id).update({estado:"inactivo"}));u.estado="inactivo";susp++;}});
  polleriaClientes.forEach(function(c){if(necesita(c)&&c.activo){promesas.push(dbPolleria.collection("clientes").doc(c.id).update({activo:false}));c.activo=false;susp++;}});
  reposteriaLicencias.forEach(function(l){if(necesita(l)&&l.estado!=="inactivo"&&l.estado!=="pendiente"){promesas.push(dbReposteria.collection("licencias").doc(l.id).update({estado:"inactivo"}));l.estado="inactivo";susp++;}});
  if(promesas.length){
    try{await Promise.all(promesas);if(susp>0)toast("🔴 "+susp+" cliente(s) suspendidos automáticamente por falta de pago",false);}
    catch(e){console.warn("Suspensión auto error:",e);}
  }
}

function estadoBadgeActivo(c){
  if(c.pendiente)return'<span class="badge badge-orange">⏳ Pendiente</span>';

  if(d!==null&&d<=7)return'<span class="badge badge-orange">'+d+'d restantes</span>';
  return'<span class="badge badge-green">Activo</span>';
}

async function crearClientePoll(){
  var nom=(document.getElementById("p-nom").value||"").trim();
  var id=(document.getElementById("p-id").value||"").trim()||toSlug(nom);
  var ema=(document.getElementById("p-ema").value||"").trim();
  var tel=(document.getElementById("p-tel").value||"").trim();
  var plan=document.getElementById("p-plan").value;
  var venc=document.getElementById("p-venc").value||null;
  if(!nom||!id){toast("Completá el nombre",false);return;}
  try{await dbPolleria.collection("clientes").doc(id).set({nombre:nom,negocioId:id,email:ema,telefono:tel,plan:plan,activo:true,pendiente:false,vencimiento:venc,fechaAlta:new Date().toISOString()});toast("✅ Pollería "+nom+" creada");cerrarModalBtn();cargarTodo();}
  catch(e){toast(e.message,false);}
}

async function guardarEdicionPoll(id){
  var cobro=getCobroData();
  try{await dbPolleria.collection("clientes").doc(id).update(Object.assign({nombre:document.getElementById("pe-nom").value.trim(),email:document.getElementById("pe-ema").value.trim(),telefono:document.getElementById("pe-tel").value.trim(),plan:document.getElementById("pe-plan").value,vencimiento:document.getElementById("pe-venc").value||null,activo:document.getElementById("pe-activo").value==="1"},cobro));toast("✅ Pollería actualizada");cerrarModalBtn();cargarTodo();}
  catch(e){toast(e.message,false);}
}
async function eliminarPoll(id){
  var c=polleriaClientes.find(function(x){return x.id===id;});
  if(!confirm("¿Eliminar a "+(c?c.nombre:id)+"?"))return;
  try{await dbPolleria.collection("clientes").doc(id).delete();toast("✅ Eliminada");cerrarModalBtn();cargarTodo();}catch(e){toast(e.message,false);}
}
async function suspenderPoll(id,activo){
  var c=polleriaClientes.find(function(x){return x.id===id;});
  if(!confirm((activo?"¿Activar":"¿Suspender")+" a "+(c?c.nombre:id)+"?"))return;
  try{await dbPolleria.collection("clientes").doc(id).update({activo:activo});toast(activo?"✅ Activada":"🔴 Suspendida");cargarTodo();}catch(e){toast(e.message,false);}
}
async function extenderPoll(id){
  var c=polleriaClientes.find(function(x){return x.id===id;});
  var dias=prompt("¿Cuántos días extender?","30");if(!dias)return;
  var base=c&&c.vencimiento&&new Date(c.vencimiento)>new Date()?new Date(c.vencimiento):new Date();
  base.setDate(base.getDate()+parseInt(dias));
  try{await dbPolleria.collection("clientes").doc(id).update({vencimiento:base.toISOString().slice(0,10)});toast("✅ Extendido "+dias+" días");cargarTodo();}catch(e){toast(e.message,false);}
}
function copiarLinkPoll(id){
  var c=polleriaClientes.find(function(x){return x.id===id;});if(!c)return;
  navigator.clipboard.writeText(getPolleriaUrl(c)).then(function(){toast("✅ Link copiado");}).catch(function(){prompt("Copiá:",getPolleriaUrl(c));});
}
async function verStatsPoll(id){
  var c=polleriaClientes.find(function(x){return x.id===id;});if(!c)return;
  var negId=c.negocioId||c.id;
  document.getElementById("modal-container").innerHTML=
    '<div class="modal-overlay" onclick="cerrarModal(event)"><div class="modal"><div class="modal-drag"></div>'+
      '<h2 style="font-size:1.1rem;font-weight:700;margin-bottom:4px">📊 '+c.nombre+'</h2>'+
      '<p style="font-size:0.8rem;color:#f5a442;margin-bottom:14px;font-family:monospace">'+negId+'</p>'+
      '<div id="poll-stats" style="text-align:center;padding:20px;color:#7a9ab8">Cargando...</div>'+
      '<div style="display:flex;gap:10px;margin-top:12px"><button class="btn" style="flex:1" onclick="cerrarModalBtn()">Cerrar</button></div></div></div>';
  try{
    var hoy=new Date().toISOString().slice(0,10);
    var results=await Promise.all([dbPolleria.collection("polleria").doc(negId).collection("pedidos").where("fecha","==",hoy).get(),dbPolleria.collection("polleria").doc(negId).collection("productos").get(),dbPolleria.collection("polleria").doc(negId).collection("clientes").get()]);
    var pedidosHoy=results[0].docs.map(function(d){return d.data();});
    var totalVentasHoy=pedidosHoy.filter(function(p){return p.pagado&&p.estado!=="cancelado";}).reduce(function(s,p){return s+(p.total||0);},0);
    var pedidosPendientes=pedidosHoy.filter(function(p){return p.estado==="pendiente";}).length;
    document.getElementById("poll-stats").innerHTML=
      '<div class="negocio-stats">'+
        '<div class="ns"><div class="ns-val" style="color:#f5a442">$'+totalVentasHoy.toLocaleString("es-AR",{maximumFractionDigits:0})+'</div><div class="ns-label">Ventas hoy</div></div>'+
        '<div class="ns"><div class="ns-val">'+pedidosHoy.length+'</div><div class="ns-label">Pedidos hoy</div></div>'+
        '<div class="ns"><div class="ns-val" style="color:#f07070">'+pedidosPendientes+'</div><div class="ns-label">Pendientes</div></div>'+
        '<div class="ns"><div class="ns-val">'+results[1].size+'</div><div class="ns-label">Productos</div></div>'+
        '<div class="ns"><div class="ns-val">'+results[2].size+'</div><div class="ns-label">Clientes</div></div>'+
        '<div class="ns"><div class="ns-val">'+planBadge(c.plan)+'</div><div class="ns-label">Plan</div></div>'+
      '</div>'+
      '<p style="font-size:0.75rem;color:#4a6a85;text-align:center">Datos en tiempo real · '+hoy+'</p>';
  }catch(e){document.getElementById("poll-stats").innerHTML='<p style="color:#f07070;font-size:0.85rem">Error: '+e.message+'</p>';}
}

  var codigo='REPOS-'+rand;
  var pin=Math.floor(1000+Math.random()*9000);
  document.getElementById("modal-container").innerHTML=
    '<div class="modal-overlay" onclick="cerrarModal(event)"><div class="modal"><div class="modal-drag"></div>'+
      '<h2 style="font-size:1.1rem;font-weight:700;margin-bottom:18px">🎂 Nueva licencia Repostería</h2>'+
      '<label>Código de activación</label>'+
      '<input id="mr-cod" value="'+codigo+'" style="font-family:monospace;font-weight:700;letter-spacing:0.1em;text-transform:uppercase"/>'+
      '<label>PIN de acceso</label>'+
      '<input id="mr-pin" type="number" value="'+pin+'"/>'+
      '<label>Negocio / Cliente</label>'+
      '<input id="mr-neg" placeholder="Ej: Dulce Gestión de María"/>'+
      '<label>Email</label>'+
      '<input id="mr-ema" type="email" placeholder="cliente@ejemplo.com"/>'+
      '<label>Celular</label>'+
      '<input id="mr-cel" type="tel" placeholder="381 123-4567"/>'+
      '<label>Notas (opcional)</label>'+
      '<input id="mr-notas" placeholder="Ej: Plan mensual - vence 30/06"/>'+
      camposCobro(null)+
      '<div style="background:#2e0a1a;border:0.5px solid rgba(245,160,200,0.3);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:0.8rem;color:#f5a0c8;line-height:1.6">'+
        '📋 La clienta abre <b>Dulce Gestión</b>, va a ingresar, y usa este código + PIN para activar su cuenta.'+
      '</div>'+
      '<div style="display:flex;gap:10px">'+
        '<button class="btn btn-pink" style="flex:1" onclick="crearLicenciaReposteria()">🎂 Crear licencia</button>'+
        '<button class="btn" onclick="cerrarModalBtn()">Cancelar</button>'+
      '</div></div></div>';
}

async function crearLicenciaReposteria(){
  var codigo=(document.getElementById("mr-cod").value||"").trim().toUpperCase();
  var pin=Number(document.getElementById("mr-pin").value);
  var neg=(document.getElementById("mr-neg").value||"").trim();
  var ema=(document.getElementById("mr-ema").value||"").trim();
  var cel=(document.getElementById("mr-cel").value||"").trim();
  var notas=(document.getElementById("mr-notas").value||"").trim();
  if(!codigo||!pin){toast("Completá código y PIN",false);return;}
  var cobro=getCobroData();
  try{
    await dbReposteria.collection("licencias").doc(codigo).set(Object.assign({
      estado:"activo", pin:pin, negocio:neg,
      email:ema, celular:cel, notas:notas,
      deviceId:"", creadoEn:new Date().toISOString()
    },cobro));
    toast("✅ Licencia "+codigo+" creada — PIN: "+pin);
    cerrarModalBtn();
    cargarTodo();
  }catch(e){toast(e.message,false);}
}

function abrirEditarReposteria(id){
  var l=reposteriaLicencias.find(function(x){return x.id===id;});if(!l)return;
  document.getElementById("modal-container").innerHTML=
    '<div class="modal-overlay" onclick="cerrarModal(event)"><div class="modal"><div class="modal-drag"></div>'+
      '<h2 style="font-size:1.1rem;font-weight:700;margin-bottom:4px">✏️ Editar licencia</h2>'+
      '<p style="font-size:0.8rem;color:#f5a0c8;margin-bottom:18px;font-family:monospace">'+l.id+'</p>'+
      '<label>PIN</label><input id="er-pin" type="number" value="'+(l.pin||'')+'"/>'+
      '<label>Negocio / Cliente</label><input id="er-neg" value="'+(l.negocio||'')+'"/>'+
      '<label>Email</label><input id="er-ema" type="email" value="'+(l.email||'')+'"/>'+
      '<label>Celular</label><input id="er-cel" type="tel" value="'+(l.celular||'')+'"/>'+
      '<label>Notas</label><input id="er-not" value="'+(l.notas||'')+'"/>'+
      camposCobro(l)+
      '<div style="display:flex;gap:10px;margin-top:6px">'+
        '<button class="btn btn-pink" style="flex:1" onclick="guardarEdicionReposteria(\''+id+'\')">Guardar</button>'+
        '<button class="btn" onclick="cerrarModalBtn()">Cancelar</button>'+
      '</div></div></div>';
}

async function guardarEdicionReposteria(id){
  var cobro=getCobroData();
  try{
    await dbReposteria.collection("licencias").doc(id).update(Object.assign({
      pin:Number(document.getElementById("er-pin").value),
      negocio:document.getElementById("er-neg").value.trim(),
      email:document.getElementById("er-ema").value.trim(),
      celular:document.getElementById("er-cel").value.trim(),
      notas:document.getElementById("er-not").value.trim()
    },cobro));
    toast("✅ Licencia actualizada");
    cerrarModalBtn();
    cargarTodo();
  }catch(e){toast(e.message,false);}
}

async function cambiarEstadoReposteria(id,estado){
  var l=reposteriaLicencias.find(function(x){return x.id===id;});
  var nombre=l?l.negocio||id:id;
  if(!confirm((estado==="inactivo"?"¿Desactivar a ":"¿Activar a ")+nombre+"?"))return;
  try{
    await dbReposteria.collection("licencias").doc(id).update({estado:estado});
    toast(estado==="inactivo"?"🔴 Desactivada":"✅ Activada");
    cargarTodo();
  }catch(e){toast(e.message,false);}
}

async function resetDispositivoReposteria(id){
  var l=reposteriaLicencias.find(function(x){return x.id===id;});
  var nombre=l?l.negocio||id:id;
  if(!confirm("¿Resetear dispositivo de "+nombre+"? Podrá activar desde un celular nuevo."))return;
  try{
    await dbReposteria.collection("licencias").doc(id).update({deviceId:"",estado:"activo"});
    toast("✅ Dispositivo reseteado");
    cargarTodo();
  }catch(e){toast(e.message,false);}
}

/* ════════════════════════════════════════
   REPARTO MULTI
════════════════════════════════════════ */
async function cargarRepartoMulti(){
  try{
    var snapNeg=await dbRepartoMulti.collection("negocios").get();
    var snapUsers=await dbRepartoMulti.collection("users").get();
    var users=snapUsers.docs.map(function(d){return Object.assign({uid:d.id},d.data());});
    repartoMultiNegocios=snapNeg.docs.map(function(d){
      var neg=Object.assign({id:d.id},d.data());
      var dueno=users.find(function(u){return u.uid===neg.ownerId&&u.rol==="dueño";});
      var repartidores=users.filter(function(u){return u.negocioId===neg.id&&u.rol==="repartidor";});
      neg.ownerEmail=dueno?dueno.email||"—":"—";
      neg.ownerNombre=dueno?dueno.nombre||"—":"—";
      neg.cantRepartidores=repartidores.length;
      neg.repartidores=repartidores;
      return neg;
    });
  }catch(e){console.warn("Reparto Multi error:",e);}
}

function renderRepartoMulti(){
  var total=repartoMultiNegocios.length;
  var filtrados=repartoMultiNegocios.filter(function(n){
    if(!filtroRepartoMulti)return true;
    return(n.nombre||"").toLowerCase().indexOf(filtroRepartoMulti)>=0||
           (n.ownerEmail||"").toLowerCase().indexOf(filtroRepartoMulti)>=0||
           (n.ownerNombre||"").toLowerCase().indexOf(filtroRepartoMulti)>=0||
           (n.id||"").toLowerCase().indexOf(filtroRepartoMulti)>=0;
  });

  var filas=filtrados.map(function(n){
    var fechaAlta=n.creadoEn?new Date(n.creadoEn).toLocaleDateString("es-AR"):"—";
    var acc=
      '<button class="btn btn-sm" style="background:#0a2e3f;color:#5dffee;border:0.5px solid #5dffee;margin-right:4px" onclick="verRepartidores(\''+n.id+'\')">👥 '+n.cantRepartidores+'</button>'+
      '<button class="btn btn-sm btn-danger" onclick="eliminarNegocioMulti(\''+n.id+'\',\''+escHtml(n.nombre)+'\')">🗑️</button>';
    return'<tr>'+
      '<td><div style="font-weight:600;color:#e2eaf4">'+escHtml(n.nombre)+'</div>'+
          '<code style="color:#5dffee;font-size:0.72rem">'+n.id+'</code></td>'+
      '<td><div style="font-size:0.85rem">'+escHtml(n.ownerNombre)+'</div>'+
          '<div style="font-size:0.75rem;color:#7a9ab8">'+escHtml(n.ownerEmail)+'</div></td>'+
      '<td style="text-align:center"><span style="color:#5daaff;font-weight:700">'+n.cantRepartidores+'</span></td>'+
      '<td style="color:#7a9ab8;font-size:0.8rem">'+fechaAlta+'</td>'+
      '<td>'+acc+'</td>'+
    '</tr>';
  }).join("");

  var cards=filtrados.map(function(n){
    var fechaAlta=n.creadoEn?new Date(n.creadoEn).toLocaleDateString("es-AR"):"—";
    return'<div class="lic-card" style="border-color:rgba(93,255,238,0.18)">'+
      '<div class="lic-card-top">'+
        '<span class="lic-codigo" style="color:#5dffee">'+escHtml(n.nombre)+'</span>'+
        '<span class="badge" style="background:#0a2e3f;color:#5dffee">'+n.cantRepartidores+' rep.</span>'+
      '</div>'+
      '<div class="lic-card-fila"><span class="lbl">ID</span><code style="color:#5dffee;font-size:0.75rem">'+n.id+'</code></div>'+
      '<div class="lic-card-fila"><span class="lbl">Dueño</span><span class="val">'+escHtml(n.ownerNombre)+'</span></div>'+
      '<div class="lic-card-fila"><span class="lbl">Email</span><span class="val">'+escHtml(n.ownerEmail)+'</span></div>'+
      '<div class="lic-card-fila"><span class="lbl">Alta</span><span class="val">'+fechaAlta+'</span></div>'+
      '<div class="lic-card-fila"><span class="lbl">Cobro</span>'+cobroBadge(n)+'</div>'+
      '<div class="lic-card-actions">'+
        '<button class="btn btn-sm" style="background:#0a2e3f;color:#5dffee;border:0.5px solid #5dffee" onclick="verRepartidores(\''+n.id+'\')">👥 Ver repartidores</button>'+
        '<button class="btn btn-sm" style="background:#2d1a4a;color:#c9a5f5;border:none" onclick="abrirCobrar(\'repartomulti\',\''+n.id+'\')">💳 Cobrar</button>'+
        '<button class="btn btn-sm btn-danger" onclick="eliminarNegocioMulti(\''+n.id+'\',\''+escHtml(n.nombre)+'\')">🗑️ Eliminar</button>'+
      '</div>'+
    '</div>';
  }).join("");

  return'<div style="display:flex;align-items:center;gap:8px;margin:14px 0 10px">'+
    '<span class="firebase-tag" style="border-color:rgba(93,255,238,0.3);color:#5dffee">🔥 sistema-de-reparto-2026</span>'+
  '</div>'+
  '<div class="grid3" style="margin-bottom:14px">'+
    '<div class="stat-card"><div class="stat-num" style="color:#5dffee">'+total+'</div><div class="stat-label">Negocios</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:#5daaff">'+repartoMultiNegocios.reduce(function(s,n){return s+n.cantRepartidores;},0)+'</div><div class="stat-label">Repartidores</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:#4dd9a0">'+licencias.filter(function(l){return l.estado==="usado";}).length+'</div><div class="stat-label">Lic. activas</div></div>'+
  '</div>'+
  '<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center">'+
    '<div class="search-wrap" style="flex:1;margin:0"><span class="search-icon">🔍</span>'+
    '<input placeholder="Buscar negocio, dueño, email..." oninput="filtroRepartoMulti=this.value.toLowerCase();renderMain()" value="'+filtroRepartoMulti+'"/></div>'+
  '</div>'+
  '<div class="desktop-only card" style="padding:0;overflow:hidden"><div class="table-wrap"><table>'+
    '<thead><tr><th>Negocio</th><th>Dueño</th><th style="text-align:center">Repartidores</th><th>Alta</th><th>Acciones</th></tr></thead>'+
    '<tbody>'+(filas||'<tr><td colspan="5" style="text-align:center;color:#4a6a85;padding:30px">No hay negocios registrados en Reparto Multi.</td></tr>')+'</tbody>'+
  '</table></div></div>'+
  '<div class="mobile-only">'+(cards||'<div style="text-align:center;color:#4a6a85;padding:40px 0">No hay negocios registrados.</div>')+'</div>'+
  '<p style="font-size:0.75rem;color:#4a6a85;text-align:center;margin-top:8px;padding-bottom:70px">'+filtrados.length+' de '+total+' negocios · Reparto Multi</p>';
}

function escHtml(s){return(s||"").replace(/'/g,"&#39;").replace(/"/g,"&quot;");}

function verRepartidores(negocioId){
  var neg=repartoMultiNegocios.find(function(n){return n.id===negocioId;});
  if(!neg)return;
  var lista=(neg.repartidores||[]);
  var filas=lista.length===0
    ?'<p style="color:#7a9ab8;font-size:0.85rem;text-align:center;padding:16px">No tiene repartidores aún.</p>'
    :lista.map(function(r){
        return'<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid rgba(255,255,255,0.06)">'+
          '<div>'+
            '<div style="font-weight:600;font-size:0.9rem">'+escHtml(r.nombre||"Sin nombre")+'</div>'+
            '<div style="font-size:0.75rem;color:#7a9ab8">'+escHtml(r.email||"—")+'</div>'+
            (r.sectores&&r.sectores.length?'<div style="font-size:0.72rem;color:#5dffee;margin-top:2px">Sectores: '+r.sectores.join(", ")+'</div>':'')+
          '</div>'+
          '<button class="btn btn-sm btn-danger" onclick="eliminarRepartidorMulti(\''+r.uid+'\',\''+escHtml(r.nombre)+'\')">🗑️</button>'+
        '</div>';
      }).join("");
  document.getElementById("modal-container").innerHTML=
    '<div class="modal-overlay" onclick="cerrarModal(event)"><div class="modal"><div class="modal-drag"></div>'+
      '<h2 style="font-size:1.05rem;font-weight:700;margin-bottom:4px">👥 Repartidores</h2>'+
      '<p style="font-size:0.8rem;color:#5dffee;margin-bottom:16px;font-family:monospace">'+escHtml(neg.nombre)+'</p>'+
      filas+
      '<div style="margin-top:16px"><button class="btn" style="width:100%" onclick="cerrarModalBtn()">Cerrar</button></div>'+
    '</div></div>';
}

async function eliminarRepartidorMulti(uid, nombre){
  if(!confirm("¿Eliminar al repartidor "+nombre+"? Perderá el acceso al sistema."))return;
  try{
    await dbRepartoMulti.collection("users").doc(uid).delete();
    toast("✅ Repartidor eliminado");
    cerrarModalBtn();
    cargarTodo();
  }catch(e){toast(e.message,false);}
}

async function eliminarNegocioMulti(negocioId, nombre){
  if(!confirm("¿Eliminar el negocio \""+nombre+"\"?\nSe eliminará el negocio y sus repartidores asociados. Esta acción no se puede deshacer."))return;
  try{
    var neg=repartoMultiNegocios.find(function(n){return n.id===negocioId;});
    var promesas=[];
    if(neg&&neg.repartidores){
      neg.repartidores.forEach(function(r){ promesas.push(dbRepartoMulti.collection("users").doc(r.uid).delete()); });
    }
    promesas.push(dbRepartoMulti.collection("negocios").doc(negocioId).delete());
    await Promise.all(promesas);
    toast("✅ Negocio eliminado");
    cargarTodo();
  }catch(e){toast(e.message,false);}
}

function cerrarModal(e){if(e.target.classList.contains("modal-overlay"))cerrarModalBtn();}
function cerrarModalBtn(){document.getElementById("modal-container").innerHTML="";}
