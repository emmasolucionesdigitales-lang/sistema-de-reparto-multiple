    if(!nombre.trim()||!negocio.trim()){setError("Completá todos los campos");return;}
    setCargando(true); setError("");
    try {
      const negocioId = await crearNegocio(uid, negocio.trim());
      const p = {rol:"dueño", negocioId, nombre:nombre.trim(), email, negocioNombre:negocio.trim()};
      await saveUserProfile(uid, p);
      onListo(p);
    } catch(e){ setError("Error: "+e.message); setCargando(false); }
  };

  const unirseConCodigo = async () => {
    if(!codigo.trim()){setError("Ingresá el código");return;}
    setCargando(true); setError("");
    const res = await canjearInvitacion(uid, email, codigo.trim().toUpperCase());
    if(!res.ok){ setError(res.msg); setCargando(false); return; }
    const p = {rol:"repartidor", negocioId:res.negocioId, nombre:res.nombre, sectores:res.sectores||[], email};
    onListo(p);
  };

  if(modo==="") return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--color-background-primary)",padding:24,gap:14}}>
      <div style={{fontSize:40}}>💧</div>
      <div style={{fontSize:20,fontWeight:600,color:"var(--color-text-primary)"}}>Sistema de Reparto</div>
      <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:8,textAlign:"center"}}>¿Cómo vas a usar la app?</div>
      <button style={{...s.btnPrimary,width:"100%",maxWidth:320,padding:16,fontSize:15,borderRadius:12}} onClick={()=>setModo("dueño")}>
        👤 Soy dueño — crear mi negocio
      </button>
      <button style={{...s.btn,width:"100%",maxWidth:320,padding:16,fontSize:15,borderRadius:12}} onClick={()=>setModo("repartidor")}>
        🚐 Soy repartidor — tengo un código
      </button>
    </div>
  );

  if(modo==="dueño") return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--color-background-primary)",padding:24}}>
      <div style={{width:"100%",maxWidth:380}}>
        <button style={{...s.btn,marginBottom:16,fontSize:13}} onClick={()=>setModo("")}>← Volver</button>
        <div style={{fontSize:18,fontWeight:600,color:"var(--color-text-primary)",marginBottom:20}}>👤 Crear mi negocio</div>
        <label style={s.label}>Tu nombre</label>
        <input style={{...s.input,marginBottom:12}} placeholder="Ej: Carlos" value={nombre} onChange={e=>setNombre(e.target.value)} />
        <label style={s.label}>Nombre del negocio</label>
        <input style={{...s.input,marginBottom:20}} placeholder="Ej: Distribuidora El Sol" value={negocio} onChange={e=>setNegocio(e.target.value)} />
        {error&&<div style={{color:"var(--color-text-danger)",fontSize:13,marginBottom:12}}>{error}</div>}
        <button style={{...s.btnPrimary,width:"100%",padding:14,fontSize:15}} onClick={crearCuentaDueño} disabled={cargando}>
          {cargando?"Creando...":"Crear negocio"}
        </button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--color-background-primary)",padding:24}}>
      <div style={{width:"100%",maxWidth:380}}>
        <button style={{...s.btn,marginBottom:16,fontSize:13}} onClick={()=>setModo("")}>← Volver</button>
        <div style={{fontSize:18,fontWeight:600,color:"var(--color-text-primary)",marginBottom:8}}>🚐 Unirme como repartidor</div>
        <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:20}}>El dueño te tiene que dar un código de 6 letras.</div>
        <label style={s.label}>Código de invitación</label>
        <input style={{...s.input,marginBottom:20,textTransform:"uppercase",letterSpacing:"0.15em",fontSize:18,textAlign:"center"}} placeholder="XXXXXX" maxLength={6} value={codigo} onChange={e=>setCodigo(e.target.value.toUpperCase())} />
        {error&&<div style={{color:"var(--color-text-danger)",fontSize:13,marginBottom:12}}>{error}</div>}
        <button style={{...s.btnPrimary,width:"100%",padding:14,fontSize:15}} onClick={unirseConCodigo} disabled={cargando}>
          {cargando?"Verificando...":"Unirme al negocio"}
        </button>
      </div>
    </div>
  );
}


// ── AppRepartidor ──────────────────────────────────────────────
function AppRepartidor({uid, perfil, onSalir: onSalirProp}) {
  // Buscar el reparto que corresponde al código del repartidor
  const [pantalla,   setPantalla]   = React.useState("inicio");
  const [fechaActual,setFechaActual]= React.useState(()=>new Date().toISOString().slice(0,10));
  const [clienteId,  setClienteId]  = React.useState(null);
  const [ventaLibreFecha,setVentaLibreFecha] = React.useState(()=>new Date().toISOString().slice(0,10));
  const [diaClienteActual, setDiaClienteActual] = React.useState(diaActual);
  const [datos,      setDatos]      = React.useState(null);

  // Detectar día actual automáticamente
  const diaHoy = () => {
    const dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    return dias[new Date().getDay()];
  };

  React.useEffect(()=>{
    cloudLoad(uid, perfil.negocioId).then(function(d){
      setDatos(d||{clientes:[],ventas:[],productos:[],planillas:{},stock:{},noVisitas:[],prospectos:[],recordatorios:[],repartos:[]});
    });
  },[]);

  if(!datos) return <Cargando texto="Cargando datos..." />;

  // Leer repartos desde Firestore (datos descargados), con fallback a localStorage
  const todosRepartos = datos.repartos && datos.repartos.length > 0
    ? datos.repartos
    : (() => { try{return JSON.parse(localStorage.getItem("cat_repartos_v1")||"[]");}catch{return [];} })();
  const miReparto = todosRepartos.find(r=>r.codigo===perfil?.codigo) || null;

  const todosClientes = datos.clientes || [];
  const ventas        = datos.ventas   || [];
  const productos     = datos.productos|| [];
  const noVisitas     = datos.noVisitas|| [];
  const planillas     = datos.planillas|| {};

  // Sectores del repartidor (barrios asignados)
  const sectores = perfil.sectores || [];

  // Día actual del reparto (puede ajustarse manualmente)
  const diaActual = (() => {
    const dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    return dias[new Date().getDay()];
  })();

  // Clientes de este repartidor = su reparto (TODOS los días)
  const clientes = todosClientes.filter(c =>
    (!miReparto || c.repartoId === miReparto.id) &&
    (sectores.length === 0 || sectores.some(s => (c.barrio||"").toLowerCase().includes(s.toLowerCase())))
  ).sort((a,b)=>DIAS.indexOf(a.dia)-DIAS.indexOf(b.dia)||(a.orden||9999)-(b.orden||9999));

  const cliente = todosClientes.find(c=>c.id===clienteId)||null;

  const sync = (nd) => { setDatos(nd); cloudSave(nd, uid, perfil.negocioId); };
  const saveVentas   = (nv) => sync({...datos, ventas:nv});
  const saveClientes = (nc) => sync({...datos, clientes:nc});
  const saveNoVisitas= (nv) => sync({...datos, noVisitas:nv});
  const savePlanilla = (key,val) => sync({...datos, planillas:{...planillas,[key]:val}});

  const irA = (p) => { setPantalla(p); window.scrollTo(0,0); };

  const registrarVenta = (detalle, pago, montoPagado, saldoAplicado, envPrest, envDev, obs, opcionSaldo) => {
    const c = cliente;
    const calc = calcVenta(detalle, pago, montoPagado, saldoAplicado, productos);
    const nv = [...ventas, {id:Date.now(), clienteId:c.id, cliente:c.nombre, dia:diaClienteActual||c.dia, fechaKey:fechaActual,
      fecha:new Date().toLocaleString("es-AR"), detalle, pago, obs:obs||"", saldoAplicado:saldoAplicado||0,
      envPrest:(envPrest||[]).filter(e=>e.prod&&e.cant), envDev:(envDev||[]).filter(e=>e.prod&&e.cant),
      ...calc, repartidor:perfil.nombre}];
    const clientesActualizados = todosClientes.map(x=>x.id===c.id?{...x,saldo:(x.saldo||0)+calc.saldoDelta}:x);
    sync({...datos, ventas:nv, clientes:clientesActualizados});
  };

  const registrarVentaLibre = (detalle,pago,montoPagado,saldoAplicado,envPrest,envDev,obs,op,mt2,sd,fechaKl) => {
    const c = cliente;
    const calc = calcVenta(detalle, pago, montoPagado, saldoAplicado, productos);
    const nVenta = {id:Date.now(), clienteId:c.id, cliente:c.nombre, dia:c.dia, fechaKey:fechaKl,
      fecha:new Date(fechaKl+"T12:00:00").toLocaleString("es-AR"), detalle, pago, obs:obs||"",
      saldoAplicado:saldoAplicado||0, envPrest:(envPrest||[]).filter(e=>e.prod&&e.cant),
      envDev:(envDev||[]).filter(e=>e.prod&&e.cant), ...calc, repartidor:perfil.nombre};
    saveVentas([...ventas, nVenta]);
    saveClientes(clientes.map(x=>x.id===c.id?{...x,saldo:c.saldo+calc.saldoDelta}:x));
  };

  const eliminarVenta = (ventaId) => {
    const v=ventas.find(x=>x.id===ventaId); if(!v) return;
    saveVentas(ventas.filter(x=>x.id!==ventaId));
    const c2=clientes.find(x=>x.id===v.clienteId);
    if(c2) saveClientes(clientes.map(x=>x.id===c2.id?{...x,saldo:c2.saldo-v.saldoDelta}:x));
  };

  const ventasHoy = ventas.filter(v=>v.fechaKey===fechaActual);
  const noVisHoy  = noVisitas.filter(v=>v.fecha===fechaActual);

  return (
    <div style={s.app}>
      {pantalla==="inicio"&&(
        <InicioRepartidor
          perfil={perfil}
          diaActual={diaActual}
          fechaActual={fechaActual}
          setFechaActual={setFechaActual}
          clientes={clientes}
          ventas={ventas}
          noVisitas={noVisHoy}
          recordatorios={datos.recordatorios||[]}
          onSaveRecordatorio={(r)=>{
            const lista=[...(datos.recordatorios||[]),r];
            sync({...datos,recordatorios:lista});
          }}
          onConfirmarRecordatorio={(id)=>{
            const lista=(datos.recordatorios||[]).map(r=>r.id===id?{...r,confirmado:true}:r);
            sync({...datos,recordatorios:lista});
          }}
          onIrCliente={(cId)=>{setClienteId(cId);setDiaClienteActual(clientes.find(c=>c.id===cId)?.dia||diaActual);irA("venta");}}
          onIrCarga={()=>irA("cargaDia")}
          onIrClientes={()=>irA("clientes")}
          onIrPlanilla={()=>irA("planilla")}
          onIrTodosClientes={()=>irA("todosClientes")}
          onIrAgenda={()=>irA("agendaRep")}
          onIrTransfers={()=>irA("confirmTransferRep")}
          onSalir={onSalirProp||(()=>window.auth.signOut())}
        />
      )}
      {pantalla==="cargaDia"&&(
        <InicioReparto
          dia={diaActual} fecha={fechaActual}
          planilla={planillas[`${diaActual}_${fechaActual}`]||planillaDiaVacia()}
          productos={productos}
          cargasDia={datos.cargasDia||CARGA_DIA_DEFAULT}
          stock={datos.stock||{}}
          onGuardar={(p)=>{savePlanilla(`${diaActual}_${fechaActual}`,p);irA("inicio");}}
          onVolver={()=>irA("inicio")}
        />
      )}
      {pantalla==="clientes"&&(
        <ListaClientes
          clientes={clientes}
          dia={""} fecha={fechaActual} ventas={ventasHoy} noVisitas={noVisHoy}
          onSeleccionar={c=>{setClienteId(c.id);setDiaClienteActual(c.dia||diaActual);irA("venta");}}
          onNuevoCliente={null} onVolver={()=>irA("inicio")}
          onReordenar={lista=>{
            const otros = todosClientes.filter(c=>!(c.dia===diaActual && (sectores.length===0||sectores.some(s=>(c.barrio||"").toLowerCase().includes(s.toLowerCase())))));
            saveClientes([...otros,...lista]);
          }}
          onRegistrarNoVisita={(cId,motivo)=>{
            const nv=[...noVisitas.filter(v=>!(v.clienteId===cId&&v.fecha===fechaActual)),{clienteId:cId,dia:diaClienteActual,fecha:fechaActual,motivo}];
            saveNoVisitas(nv);
          }}
          onQuitarNoVisita={(cId)=>saveNoVisitas(noVisitas.filter(v=>!(v.clienteId===cId&&v.fecha===fechaActual)))}
          onConfirmarTransfer={null} prospectos={[]} recordatorios={[]}
        />
      )}
      {pantalla==="detalleCliente"&&cliente&&(
        <DetalleCliente
          cliente={cliente} ventas={ventas.filter(v=>v.clienteId===cliente.id)}
          dia={diaActual} fecha={fechaActual} productos={productos}
          onVenta={()=>irA("venta")}
          onVentaLibre={()=>{setVentaLibreFecha(new Date().toISOString().slice(0,10));irA("ventaLibre");}}
          onVolver={()=>irA("clientes")}
          onEditar={()=>{}} onEliminarVenta={eliminarVenta} onEditarVenta={()=>{}} onEliminarCliente={()=>{}}
          onNoEstaCliente={()=>{
            const nv=[...noVisitas.filter(v=>!(v.clienteId===cliente.id&&v.dia===diaActual&&v.fecha===fechaActual)),{clienteId:cliente.id,dia:diaActual,fecha:fechaActual,motivo:"noesta"}];
            saveNoVisitas(nv);
          }}
          recordatorios={[]} onGuardarRecordatorio={()=>{}} onConfirmarRecordatorio={()=>{}} onCobrarSaldo={()=>{}}
        />
      )}
      {pantalla==="venta"&&cliente&&(
        <NuevaVenta
          cliente={cliente} productos={productos} fecha={fechaActual}
          onNoEsta={()=>{
            saveNoVisitas([...noVisitas.filter(v=>!(v.clienteId===clienteId&&v.fecha===fechaActual)),{clienteId,dia:diaClienteActual,fecha:fechaActual,motivo:"noesta"}]);
            irA("clientes");
          }}
          onNoQuiere={()=>{
            saveNoVisitas([...noVisitas.filter(v=>!(v.clienteId===clienteId&&v.fecha===fechaActual)),{clienteId,dia:diaClienteActual,fecha:fechaActual,motivo:"noquiso"}]);
            irA("clientes");
          }}
          onGuardar={(d,p,m,sa,ep,ed,obs,op)=>{registrarVenta(d,p,m,sa,ep,ed,obs,op);irA("clientes");}}
          onVolver={()=>irA("clientes")}
        />
      )}

      {pantalla==="confirmTransferRep"&&(
        <ConfirmacionesDia
          dia={diaActual}
          ventas={ventas.filter(v=>v.pago==="transferencia")}
          clientes={clientes}
          onConfirmar={(ventaId)=>{
            const nv=ventas.map(v=>v.id===ventaId?{...v,transConfirmada:!v.transConfirmada}:v);
            sync({...datos,ventas:nv});
          }}
          onVolver={()=>irA("inicio")}
        />
      )}
      {pantalla==="todosClientes"&&(
        <TodosClientesRepartidor
          clientes={clientes}
          ventas={ventas}
          onSeleccionar={(c)=>{setClienteId(c.id);setDiaClienteActual(c.dia||diaActual);irA("venta");}}
          onVolver={()=>irA("inicio")}
        />
      )}
      {pantalla==="agendaRep"&&(
        <AgendaRepartidor
          recordatorios={datos.recordatorios||[]}
          clientes={clientes}
          onConfirmar={(id)=>{const l=(datos.recordatorios||[]).map(r=>r.id===id?{...r,confirmado:true}:r);sync({...datos,recordatorios:l});}}
          onEliminar={(id)=>{const l=(datos.recordatorios||[]).filter(r=>r.id!==id);sync({...datos,recordatorios:l});}}
          onNuevo={(datos2)=>{
            const c=clientes.find(x=>x.id===datos2.clienteId);
            if(!c){alert("Seleccioná un cliente");return;}
            const l=[...(datos.recordatorios||[]),{...datos2,id:Date.now(),clienteId:c.id,clienteNombre:c.nombre,dia:c.dia,confirmado:false}];
            sync({...datos,recordatorios:l});
          }}
          onIrCliente={(cId)=>{setClienteId(cId);setDiaClienteActual(clientes.find(c=>c.id===cId)?.dia||diaActual);irA("venta");}}
          onVolver={()=>irA("inicio")}
        />
      )}
      {pantalla==="planilla"&&(
        <PlanillaDelDia
          dia={diaActual} fecha={fechaActual} ventas={ventasHoy}
          planilla={planillas[`${diaActual}_${fechaActual}`]||planillaDiaVacia()}
          productos={productos} stock={datos.stock||{}} setStock={()=>{}} syncData={()=>{}}
          onGuardar={d=>{savePlanilla(`${diaActual}_${fechaActual}`,d);irA("inicio");}}
          onVolver={()=>irA("inicio")}
        />
      )}
    </div>
  );
}


// ── Login ──────────────────────────────────────────────
function Login({onLogin}) {
  const [modo, setModo]         = React.useState("login"); // "login" | "registro"
  const [email, setEmail]       = React.useState("");
  const [pass, setPass]         = React.useState("");
  const [error, setError]       = React.useState("");
  const [cargando, setCargando] = React.useState(false);

  const manejarAuth = async () => {
    if(!email.trim()||!pass.trim()){setError("Completá email y contraseña");return;}
    setCargando(true); setError("");
    try {
      if(modo==="login"){
        await window.auth.signInWithEmailAndPassword(email.trim(), pass);
      } else {
        await window.auth.createUserWithEmailAndPassword(email.trim(), pass);
      }
    } catch(e) {
      const msgs = {
        "auth/user-not-found":"Email no registrado. ¿Querés crear una cuenta?",
        "auth/wrong-password":"Contraseña incorrecta",
        "auth/email-already-in-use":"Ese email ya tiene una cuenta. Iniciá sesión.",
        "auth/weak-password":"La contraseña debe tener al menos 6 caracteres",
        "auth/invalid-email":"Email inválido",
        "auth/invalid-credential":"Email o contraseña incorrectos",
      };
      setError(msgs[e.code]||e.message);
    }
    setCargando(false);
  };

  const googleLogin = async () => {
    setCargando(true); setError("");
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await window.auth.signInWithPopup(provider);
    } catch(e) {
      setError("Error al iniciar con Google: " + e.message);
    }
    setCargando(false);
  };

  return (
    <div style={{maxWidth:420,margin:"0 auto",minHeight:"100vh",background:"var(--color-background-primary)",padding:"0 24px",display:"flex",flexDirection:"column",justifyContent:"center",gap:16}}>
      <div style={{textAlign:"center",marginBottom:8}}>
        <div style={{fontSize:48,marginBottom:12}}>💧</div>
        <h1 style={{fontSize:22,fontWeight:500,color:"var(--color-text-primary)",margin:"0 0 6px"}}>Sistema de Reparto</h1>
        <p style={{fontSize:14,color:"var(--color-text-secondary)",margin:0}}>
          {modo==="login"?"Ingresá a tu cuenta":"Creá tu cuenta gratuita"}
        </p>
      </div>

      <div style={{display:"flex",gap:0,background:"var(--color-background-secondary)",borderRadius:10,padding:4}}>
        {["login","registro"].map(m=>(
          <button key={m} onClick={()=>{setModo(m);setError("");}}
            style={{flex:1,padding:"8px",border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:500,
              background:modo===m?"var(--color-background-primary)":"transparent",
              color:modo===m?"var(--color-text-primary)":"var(--color-text-secondary)"}}>
            {m==="login"?"Ingresar":"Registrarse"}
          </button>
        ))}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div>
          <label style={{fontSize:13,color:"var(--color-text-secondary)",display:"block",marginBottom:4}}>Email</label>
          <input style={s.input} type="email" placeholder="tu@email.com"
            value={email} onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&manejarAuth()} />
        </div>
        <div>
          <label style={{fontSize:13,color:"var(--color-text-secondary)",display:"block",marginBottom:4}}>Contraseña</label>
          <input style={s.input} type="password" placeholder="Mínimo 6 caracteres"
            value={pass} onChange={e=>setPass(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&manejarAuth()} />
        </div>
        {error&&<div style={{fontSize:13,color:"var(--color-text-danger)",background:"var(--color-background-danger)",padding:"8px 12px",borderRadius:8}}>{error}</div>}
        <button style={{...s.btnPrimary,marginTop:4}} onClick={manejarAuth} disabled={cargando}>
          {cargando?"Procesando...":(modo==="login"?"Ingresar":"Crear cuenta")}
        </button>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,margin:"4px 0"}}>
        <div style={{flex:1,height:"0.5px",background:"var(--color-border-secondary)"}}/>
        <span style={{fontSize:12,color:"var(--color-text-tertiary)"}}>o</span>
        <div style={{flex:1,height:"0.5px",background:"var(--color-border-secondary)"}}/>
      </div>

      <button onClick={googleLogin} disabled={cargando}
        style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"12px",border:"0.5px solid var(--color-border-secondary)",borderRadius:10,background:"var(--color-background-secondary)",color:"var(--color-text-primary)",fontSize:14,cursor:"pointer",fontWeight:500}}>
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continuar con Google
      </button>

      <p style={{fontSize:12,color:"var(--color-text-tertiary)",textAlign:"center",lineHeight:1.6,marginTop:8}}>
        Tus datos son privados y solo accesibles con tu cuenta.
      </p>
    </div>
  );
}


// ── Onboarding ──────────────────────────────────────────────
function Onboarding({uid, onCompleto}) {
  const [paso, setPaso]         = React.useState(1);
  const [negocio, setNegocio]   = React.useState("");
  const [productos, setProductos] = React.useState([
    {id:1,nombre:"Sifón 1.5L",precio:"",costo:""},
    {id:2,nombre:"Bidón 10L", precio:"",costo:""},
    {id:3,nombre:"Bidón 20L", precio:"",costo:""},
  ]);
  const [guardando, setGuardando] = React.useState(false);
  const [error, setError]         = React.useState("");

  const setProd = (i, campo, val) => {
    setProductos(prev => prev.map((p,idx)=>idx===i?{...p,[campo]:val}:p));
  };

  const guardar = async () => {
    if(!negocio.trim()){setError("Ingresá el nombre del negocio");return;}
    setGuardando(true); setError("");
    const prods = productos.map(p=>({...p,precio:Number(p.precio)||0,costo:Number(p.costo)||0}));
    const data = {
      negocio:{nombre:negocio.trim()},
      productos:prods,
      clientes:[],ventas:[],planillas:{},stock:{
        soderia:{sifon:0,bidon10:0,bidon20:0},
        casa:{sifon:0,bidon10:0,bidon20:0},
        camion:{sifon:0,bidon10:0,bidon20:0}
      },
      noVisitas:[],recordatorios:[],prospectos:[],
      cargasDia:{"Lunes":{soda:0,b10:0,b20:0},"Martes":{soda:0,b10:0,b20:0},"Miércoles":{soda:0,b10:0,b20:0},"Jueves":{soda:0,b10:0,b20:0},"Viernes":{soda:0,b10:0,b20:0},"Sábado":{soda:0,b10:0,b20:0}}
    };
    await cloudSave(data, uid, negocioId);
    onCompleto(data);
    setGuardando(false);
  };

  return (
    <div style={{maxWidth:440,margin:"0 auto",minHeight:"100vh",background:"var(--color-background-primary)",padding:"24px 20px",display:"flex",flexDirection:"column",gap:20}}>
      <div style={{textAlign:"center",paddingTop:16}}>
        <div style={{fontSize:40,marginBottom:10}}>🚀</div>
        <h1 style={{fontSize:20,fontWeight:500,color:"var(--color-text-primary)",margin:"0 0 6px"}}>Configurá tu negocio</h1>
        <p style={{fontSize:14,color:"var(--color-text-secondary)",margin:0,lineHeight:1.5}}>Solo una vez. Después podés editar todo desde Configuración.</p>
      </div>

      <div style={{display:"flex",gap:6,justifyContent:"center"}}>
        {[1,2].map(p=>(
          <div key={p} style={{width:36,height:4,borderRadius:2,background:paso>=p?"#185FA5":"var(--color-background-tertiary)"}}/>
        ))}
      </div>

      {paso===1&&(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div style={{background:"var(--color-background-secondary)",borderRadius:12,padding:16}}>
            <h2 style={{fontSize:16,fontWeight:500,color:"var(--color-text-primary)",margin:"0 0 14px"}}>¿Cómo se llama tu negocio?</h2>
            <input style={s.input} placeholder="Ej: Sodería El Manantial"
              value={negocio} onChange={e=>setNegocio(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&negocio.trim()&&setPaso(2)} />
          </div>
          {error&&<div style={{fontSize:13,color:"var(--color-text-danger)"}}>{error}</div>}
          <button style={s.btnPrimary} onClick={()=>{if(!negocio.trim()){setError("Ingresá el nombre");return;}setError("");setPaso(2);}}>
            Continuar →
          </button>
        </div>
      )}

      {paso===2&&(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div style={{background:"var(--color-background-secondary)",borderRadius:12,padding:16}}>
            <h2 style={{fontSize:16,fontWeight:500,color:"var(--color-text-primary)",margin:"0 0 4px"}}>Tus productos y precios</h2>
            <p style={{fontSize:13,color:"var(--color-text-secondary)",margin:"0 0 14px"}}>Podés editarlos después en Configuración.</p>
            {productos.map((p,i)=>(
              <div key={p.id} style={{marginBottom:14,borderBottom:"0.5px solid var(--color-border-tertiary)",paddingBottom:14}}>
                <input style={{...s.input,marginBottom:6,fontWeight:500}} value={p.nombre}
                  onChange={e=>setProd(i,"nombre",e.target.value)} placeholder="Nombre del producto" />
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div>
                    <label style={{fontSize:12,color:"var(--color-text-secondary)",display:"block",marginBottom:3}}>Precio venta ($)</label>
                    <input style={s.input} type="number" placeholder="0" value={p.precio}
                      onChange={e=>setProd(i,"precio",e.target.value)} />
                  </div>
                  <div>
                    <label style={{fontSize:12,color:"var(--color-text-secondary)",display:"block",marginBottom:3}}>Costo ($)</label>
                    <input style={s.input} type="number" placeholder="0" value={p.costo}
                      onChange={e=>setProd(i,"costo",e.target.value)} />
                  </div>
                </div>
              </div>
            ))}
            <button onClick={()=>setProductos(p=>[...p,{id:Date.now(),nombre:"",precio:"",costo:""}])}
              style={{...s.btn,fontSize:13,width:"100%"}}>+ Agregar producto</button>
          </div>
          {error&&<div style={{fontSize:13,color:"var(--color-text-danger)"}}>{error}</div>}
          <div style={{display:"flex",gap:10}}>
            <button style={{...s.btn,flex:1}} onClick={()=>setPaso(1)}>← Atrás</button>
            <button style={{...s.btnPrimary,flex:2}} onClick={guardar} disabled={guardando}>
              {guardando?"Guardando...":"Comenzar →"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function NuevaVentaLibre({cliente,productos,fechaInicial,onGuardar,onVolver}) {
  const [fechaKl,setFechaKl] = React.useState(fechaInicial||new Date().toISOString().slice(0,10));
  const [cantidades,setCantidades] = useState(()=>{const m={};productos.forEach(p=>{const k=p.nombre==="Sifón 1.5L"?"sifon":p.nombre==="Bidón 10L"?"bidon10":"bidon20";m[p.nombre]=cliente[k]||0;});return m;});
  const [pago,setPago] = useState("contado");
  const [monto,setMonto] = useState("");
  const [usarSaldo,setUsarSaldo] = useState(false);
  const [envPrest,setEnvPrest] = useState([{prod:"",cant:""}]);
  const [envDev,setEnvDev] = useState([{prod:"",cant:""}]);
  const [obs,setObs] = useState("");
  const detalle = productos.map(p=>({nombre:p.nombre,cantidad:cantidades[p.nombre]||0,precio:p.precio,total:(cantidades[p.nombre]||0)*p.precio})).filter(d=>d.cantidad>0);
  const bruto = detalle.reduce((a,d)=>a+d.total,0);
  const neto = bruto;
  const saldoDisp = cliente.saldo>0?cliente.saldo:0;
  const saldoApl = (usarSaldo&&pago!=="fiado")?Math.min(saldoDisp,neto):0;
  const aPagar = neto-saldoApl;
  const ER=({list,setList,i})=>(
    <div style={{...s.row,marginBottom:6}}>
      <select style={{...s.select,flex:2}} value={list[i].prod} onChange={e=>{const n=[...list];n[i].prod=e.target.value;setList(n);}}>
        <option value="">— Producto —</option>
        {productos.map(p=><option key={p.id} value={p.nombre}>{p.nombre}</option>)}
      </select>
      <input style={{...s.input,flex:1}} type="number" placeholder="Cant" value={list[i].cant} onChange={e=>{const n=[...list];n[i].cant=e.target.value;setList(n);}} />
    </div>
  );
  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Venta · {cliente.nombre}</span>
      </div>
      <div style={{padding:16}}>
        <div style={{...s.card,margin:"0 0 14px",background:"var(--color-background-tertiary)"}}>
          <label style={{fontSize:12,color:"var(--color-text-secondary)",display:"block",marginBottom:6}}>📅 Fecha de la venta</label>
          <input type="date" style={{...s.input,margin:0}} value={fechaKl} onChange={e=>setFechaKl(e.target.value)} />
        </div>
        <span style={{...s.sectionTitle,padding:"0 0 10px"}}>Cantidades entregadas</span>
        {productos.map(p=>(
          <div key={p.id} style={{...s.card,margin:"0 0 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div><div style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>{p.nombre}</div><div style={{fontSize:12,color:"var(--color-text-secondary)"}}>{fmt(p.precio)} c/u</div></div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button style={{...s.btn,padding:"5px 16px",fontSize:20,lineHeight:1}} onClick={()=>setCantidades(q=>({...q,[p.nombre]:Math.max(0,(q[p.nombre]||0)-1)}))}>−</button>
              <span style={{fontSize:22,fontWeight:500,minWidth:32,textAlign:"center",color:"var(--color-text-primary)"}}>{cantidades[p.nombre]||0}</span>
              <button style={{...s.btn,padding:"5px 16px",fontSize:20,lineHeight:1}} onClick={()=>setCantidades(q=>({...q,[p.nombre]:(q[p.nombre]||0)+1}))}>+</button>
            </div>
          </div>
        ))}
        <div style={s.divider} />
        <label style={{...s.label,fontSize:13,marginBottom:8}}>Forma de pago</label>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {[["contado","Contado"],["transferencia","Transfer."],["fiado","Fiado"]].map(([v,l])=>(
            <button key={v} style={{...s.btn,flex:1,background:pago===v?"#185FA5":undefined,color:pago===v?"#fff":undefined,border:pago===v?"none":undefined,padding:"9px 4px",fontSize:13}} onClick={()=>setPago(v)}>{l}</button>
          ))}
        </div>
        {saldoDisp>0&&pago!=="fiado"&&(
          <div style={{...s.card,margin:"0 0 10px",background:"var(--color-background-success)",border:"0.5px solid var(--color-border-success)",cursor:"pointer"}} onClick={()=>setUsarSaldo(!usarSaldo)}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <input type="checkbox" checked={usarSaldo} onChange={e=>setUsarSaldo(e.target.checked)} style={{width:18,height:18,cursor:"pointer",accentColor:"#0F6E56"}} />
              <label style={{fontSize:14,color:"var(--color-text-success)",cursor:"pointer",fontWeight:500}}>Usar saldo a favor — {fmt(saldoDisp)}</label>
            </div>
          </div>
        )}
        {pago!=="fiado"&&(
          <div style={{marginBottom:12}}>
            <label style={s.label}>Monto cobrado (vacío = {fmt(aPagar)} exacto)</label>
            <input style={s.input} type="number" placeholder={String(Math.round(aPagar))} value={monto} onChange={e=>setMonto(e.target.value)} />
          </div>
        )}
        <div style={s.divider} />
        <label style={{...s.label,fontSize:13,marginBottom:6}}>Envases prestados al cliente</label>
        {envPrest.map((_,i)=><ER key={i} list={envPrest} setList={setEnvPrest} i={i} />)}
        <button style={{...s.btn,fontSize:12,padding:"4px 12px",marginBottom:12}} onClick={()=>setEnvPrest([...envPrest,{prod:"",cant:""}])}>+ Fila</button>
        <label style={{...s.label,fontSize:13,marginBottom:6}}>Envases devueltos por el cliente</label>
        {envDev.map((_,i)=><ER key={i} list={envDev} setList={setEnvDev} i={i} />)}
        <button style={{...s.btn,fontSize:12,padding:"4px 12px",marginBottom:12}} onClick={()=>setEnvDev([...envDev,{prod:"",cant:""}])}>+ Fila</button>
        <div style={s.divider} />
        <label style={s.label}>Observaciones</label>
        <textarea style={{...s.input,minHeight:60,resize:"vertical",marginBottom:14}} value={obs} onChange={e=>setObs(e.target.value)} placeholder="Notas opcionales..." />
        <div style={{...s.card,margin:"0 0 16px",background:"var(--color-background-secondary)"}}>
          <div style={{borderTop:"0.5px solid var(--color-border-tertiary)",paddingTop:10,marginTop:6,display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
            <span style={{fontSize:16,fontWeight:500,color:"var(--color-text-primary)"}}>A cobrar</span>
            <span style={{fontSize:26,fontWeight:500,color:"var(--color-text-primary)"}}>{fmt(aPagar)}</span>
          </div>
        </div>
        <button style={{...s.btnPrimary,opacity:detalle.length===0?0.45:1}} disabled={detalle.length===0} onClick={()=>{
          if(!fechaKl){alert("Elegí una fecha");return;}
          onGuardar(detalle,pago,monto,saldoApl,envPrest,envDev,obs,"compra",0,fechaKl);
        }}>
          Guardar venta
        </button>

      </div>
    </div>
  );
}


function RepartidoresPanel({negocioId, clientes}) {
  const [repartidores, setRepartidores] = React.useState([]);
  const [cargando, setCargando]         = React.useState(true);
  const [nombre, setNombre]             = React.useState("");
  const [sectorInput, setSectorInput]   = React.useState("");
  const [sectores, setSectores]         = React.useState([]);
  const [codigo, setCodigo]             = React.useState("");
  const [generando, setGenerando]       = React.useState(false);
  const [copiado, setCopiado]           = React.useState(false);

  React.useEffect(()=>{
    if(!negocioId) return;
    listarRepartidores(negocioId).then(r=>{ setRepartidores(r); setCargando(false); });
  },[negocioId]);

  const agregarSector = () => {
    const s = sectorInput.trim();
    if(!s || sectores.includes(s)) return;
    setSectores([...sectores, s]);
    setSectorInput("");
  };

  // Barrios disponibles en clientes
  const barriosDisponibles = [...new Set((clientes||[]).map(c=>c.barrio).filter(Boolean))].sort();

  const generarCodigo = async () => {
    if(!nombre.trim()){ alert("Ingresá el nombre del repartidor"); return; }
    if(sectores.length===0){ alert("Agregá al menos un sector/barrio"); return; }
    setGenerando(true);
    const cod = await crearInvitacion(negocioId, nombre.trim(), sectores);
    setCodigo(cod);
    setGenerando(false);
  };

  const copiarCodigo = () => {
    const texto = `Te invito a usar Sistema de Reparto!\nTu código: ${codigo}\nDescargá la app e ingresá como repartidor.`;
    if(navigator.share) {
      navigator.share({ title:"Código de reparto", text:texto });
    } else {
      navigator.clipboard?.writeText(texto);
      setCopiado(true);
      setTimeout(()=>setCopiado(false), 2000);
    }
  };

  const eliminar = async (uid) => {
    if(!window.confirm("¿Eliminar este repartidor?")) return;
    await eliminarRepartidor(uid);
    setRepartidores(r=>r.filter(x=>x.uid!==uid));
  };

  return (
    <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>

      {/* Lista de repartidores */}
      <div style={{...s.card,margin:0}}>
        <div style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)",marginBottom:12}}>👥 Repartidores activos</div>
        {cargando && <div style={{fontSize:13,color:"var(--color-text-tertiary)"}}>Cargando...</div>}
        {!cargando && repartidores.length===0 && (
          <div style={{fontSize:13,color:"var(--color-text-tertiary)"}}>Aún no hay repartidores. Generá un código abajo.</div>
        )}
        {repartidores.map(r=>(
          <div key={r.uid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
            <div>
              <div style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)"}}>{r.nombre}</div>
              <div style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{(r.sectores||[]).join(", ")||"Sin sectores"} · {r.email}</div>
            </div>
            <button style={{...s.btnDanger,fontSize:11,padding:"4px 10px"}} onClick={()=>eliminar(r.uid)}>Eliminar</button>
          </div>
        ))}
      </div>

      {/* Generar invitación */}
      <div style={{...s.card,margin:0,borderLeft:"3px solid #5daaff"}}>
        <div style={{fontSize:14,fontWeight:500,color:"var(--color-text-primary)",marginBottom:12}}>➕ Agregar repartidor</div>
        <label style={s.label}>Nombre del repartidor</label>
        <input style={{...s.input,marginBottom:12}} placeholder="Ej: Juan Pérez" value={nombre} onChange={e=>{setNombre(e.target.value);setCodigo("");}} />
        <label style={s.label}>Sectores / Barrios asignados</label>
        {sectores.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
            {sectores.map(s=>(
              <span key={s} style={{background:"#1e3a5f",color:"#5daaff",borderRadius:6,padding:"4px 10px",fontSize:12,display:"flex",alignItems:"center",gap:6}}>
                {s}
                <button style={{background:"none",border:"none",color:"#5daaff",cursor:"pointer",fontSize:14,padding:0,lineHeight:1}} onClick={()=>setSectores(sectores.filter(x=>x!==s))}>×</button>
              </span>
            ))}
          </div>
        )}
        <div style={{display:"flex",gap:6,marginBottom:12}}>
          <input style={{...s.input,flex:2,margin:0}} placeholder="Escribí un barrio..." value={sectorInput}
            onChange={e=>setSectorInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();agregarSector();}}}
            list="barrios-disponibles" />
          <datalist id="barrios-disponibles">
            {barriosDisponibles.filter(b=>!sectores.includes(b)).map(b=><option key={b} value={b}/>)}
          </datalist>
          <button style={{...s.btn,flex:1,padding:"8px"}} onClick={agregarSector}>+ Agregar</button>
        </div>
        <button style={{...s.btnPrimary,width:"100%",padding:12}} disabled={generando} onClick={generarCodigo}>
          {generando?"Generando...":"🔑 Generar código de invitación"}
        </button>

        {codigo&&(
          <div style={{marginTop:14,background:"var(--color-background-tertiary)",borderRadius:10,padding:14,textAlign:"center"}}>
            <div style={{fontSize:12,color:"var(--color-text-secondary)",marginBottom:6}}>Código para {nombre} · {sectores.join(", ")}</div>
            <div style={{fontSize:36,fontWeight:700,color:"#5daaff",letterSpacing:8,marginBottom:12}}>{codigo}</div>
            <div style={{fontSize:12,color:"var(--color-text-tertiary)",marginBottom:10}}>El repartidor lo ingresa al abrir la app por primera vez</div>
            <button style={{...s.btnPrimary,width:"100%"}} onClick={copiarCodigo}>
              {copiado?"✓ Copiado!":"📤 Compartir código"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}



function Config({productos,setProductos,clientes,setClientes,ventas,setVentas,planillas,setPlanillas,stock,setStock,cargasDia,setCargasDia,syncData,onVolver,negocioId}) {

function VincularEmmaControl() {
  const [token, setToken] = React.useState(()=>localStorage.getItem('sr_ec_token')||'');
  const [enviando, setEnviando] = React.useState(false);
  const [ultimaSync, setUltimaSync] = React.useState(()=>localStorage.getItem('sr_ec_ultima')||'');
  const db = window.firebaseDB;

  const guardarToken = (t) => { setToken(t); localStorage.setItem('sr_ec_token', t); };
  const resetToken = () => { setToken(''); localStorage.removeItem('sr_ec_token'); localStorage.removeItem('sr_ec_ultima'); };

  const enviarResumenDia = async () => {
    if(!token||!db){ alert('Ingresá el código de Emma Control primero'); return; }
    setEnviando(true);
    try {
      const hoy = new Date().toLocaleDateString('es-AR');
      const ventas = JSON.parse(localStorage.getItem('cat_ventas')||'[]');
      const gastos = JSON.parse(localStorage.getItem('cat_gastos')||'[]');
      const ventasHoy = ventas.filter(v=>v.fecha===hoy);
      const gastosHoy = gastos.filter(g=>g.fecha===hoy);
      const totalVentas = ventasHoy.reduce((s,v)=>s+(v.total||0),0);
      const totalGastos = gastosHoy.reduce((s,g)=>s+(g.monto||0),0);
      const movs = [
        ...ventasHoy.map(v=>({id:'venta_'+v.id,tipo:'ingreso',monto:v.total||0,descripcion:'Venta reparto: '+(v.cliente||''),fecha:hoy,origen:'reparto'})),
        ...gastosHoy.map(g=>({id:'gasto_'+g.id,tipo:'egreso',monto:g.monto||0,descripcion:'Gasto reparto: '+(g.concepto||''),fecha:hoy,origen:'reparto'}))
      ];
      const batch = db.batch();
      movs.forEach(m=>{
        const ref = db.collection('sinc_reparto').doc(token).collection('movimientos').doc(m.id);
        batch.set(ref, m);
      });
      await batch.commit();
      const ahora = new Date().toLocaleString('es-AR');
      setUltimaSync(ahora);
      localStorage.setItem('sr_ec_ultima', ahora);
      alert('✅ Resumen enviado a Emma Control\nVentas: $'+totalVentas.toLocaleString('es-AR')+'\nGastos: $'+totalGastos.toLocaleString('es-AR'));
    } catch(e){ alert('Error al enviar: '+e.message); }
    setEnviando(false);
  };

  const s = {
    card:{background:'var(--color-background-secondary)',borderRadius:14,padding:14,marginBottom:12,border:'1px solid var(--color-border-secondary)'},
    title:{fontSize:11,fontWeight:700,color:'var(--color-text-secondary)',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.04em'},
    input:{width:'100%',background:'var(--color-background-tertiary)',border:'1px solid var(--color-border-secondary)',borderRadius:10,padding:'12px 14px',fontSize:16,color:'var(--color-text-primary)',outline:'none',fontFamily:'monospace',letterSpacing:'0.1em',textAlign:'center',marginBottom:10},
    btn:{width:'100%',padding:12,borderRadius:10,border:'none',background:'var(--color-accent-primary)',color:'white',fontSize:14,fontWeight:700,cursor:'pointer',marginBottom:8},
    btnRed:{width:'100%',padding:10,borderRadius:10,border:'1px solid #fecaca',background:'transparent',color:'#dc2626',fontSize:12,fontWeight:600,cursor:'pointer'},
    muted:{fontSize:11,color:'var(--color-text-tertiary)',textAlign:'center',marginBottom:8},
  };

  return (
    <div>
      <div style={s.card}>
        <div style={s.title}>🔗 Vincular con Emma Control</div>
        {!token ? <>
          <div style={{fontSize:13,color:'var(--color-text-secondary)',lineHeight:1.6,marginBottom:12}}>
            Ingresá el código de sincronización que generaste en Emma Control → Config → Vincular con App de Reparto.
          </div>
          <input style={s.input} placeholder="Código (ej: AB12CD34)" maxLength={8}
            onChange={e=>guardarToken(e.target.value.toUpperCase())}/>
          <button style={s.btn} onClick={()=>{if(token.length>=6)alert('✅ Código guardado!');else alert('⚠️ Ingresá el código completo');}}>
            Vincular
          </button>
        </> : <>
          <div style={s.muted}>Vinculado con Emma Control</div>
          <div style={{...s.input,marginBottom:10,fontSize:22,letterSpacing:'0.2em',color:'var(--color-accent-primary)'}}>{token}</div>
          <button style={s.btn} onClick={enviarResumenDia} disabled={enviando}>
            {enviando ? '⏳ Enviando...' : '📤 Enviar resumen del día a Emma Control'}
          </button>
          {ultimaSync && <div style={s.muted}>Última sincronización: {ultimaSync}</div>}
          <button style={s.btnRed} onClick={()=>{if(window.confirm('¿Desvincular Emma Control?'))resetToken();}}>
            🗑️ Desvincular
          </button>
        </>}
      </div>
      <div style={{...s.card,background:'rgba(59,130,246,0.05)'}}>
        <div style={s.title}>ℹ️ Cómo funciona</div>
        <div style={{fontSize:12,color:'var(--color-text-secondary)',lineHeight:1.7}}>
          1. Generá un código en <strong>Emma Control → Config → Vincular</strong><br/>
          2. Pegalo aquí y tocá Vincular<br/>
          3. Al terminar el día tocá <strong>Enviar resumen</strong><br/>
          4. Los movimientos aparecen en Emma Control automáticamente
        </div>
      </div>
    </div>
  );
}

async function comprimirLogoBase64(file, maxW=400, maxH=400, quality=0.75) {
  return new Promise((res,rej)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let {width:w, height:h} = img;
      if(w>maxW||h>maxH) {
        const ratio = Math.min(maxW/w, maxH/h);
        w = Math.round(w*ratio); h = Math.round(h*ratio);
      }
      const canvas = document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      const b64 = canvas.toDataURL("image/jpeg", quality);
      URL.revokeObjectURL(url);
      res(b64);
    };
    img.onerror = rej;
    img.src = url;
  });
}

async function guardarLogoFirestore(codigo, logoB64) {
  if(!window.db || !codigo) return false;
  try {
    await window.dbLicencias.collection("licencias").doc(codigo).update({ logo: logoB64 });
    // Actualizar localStorage también
    const lic = JSON.parse(localStorage.getItem("sr_licencia")||"null");
    if(lic) { lic.logo = logoB64; localStorage.setItem("sr_licencia", JSON.stringify(lic)); }
    return true;
  } catch(e) { console.error("Error guardando logo:", e); return false; }
}

                {c.calle?`${c.calle} ${c.nro||""}`:c.manzana?`Mz ${c.manzana} L ${c.lote}`:""}{c.barrio?` · ${c.barrio}`:""}
              </div>
              {c.saldo<0&&<span style={{...s.badge("danger"),fontSize:10,marginTop:3,display:"inline-block"}}>Debe {fmt(Math.abs(c.saldo))}</span>}
              {c.saldo>0&&<span style={{...s.badge("success"),fontSize:10,marginTop:3,display:"inline-block"}}>A favor {fmt(c.saldo)}</span>}
              {vUlt&&<div style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:2}}>Última venta: {vUlt.fechaKey}</div>}

  );
}

function NuevoRecordatorioForm({clientes,onGuardar,onCerrar}) {
  const hoy = new Date().toISOString().slice(0,10);
  const [tipo,setTipo]     = React.useState("visita");
  const [fecha,setFecha]   = React.useState(hoy);
  const [hora,setHora]     = React.useState("10:00");
  const [busq,setBusq]     = React.useState("");
  const [clienteId,setClienteId] = React.useState(null);
  const [motivo,setMotivo] = React.useState("");
  const tipoConfig = {visita:{ico:"🏠",label:"Visita",color:"#5daaff",bg:"#1e3a5f"},cobro:{ico:"💰",label:"Cobro",color:"#f5b942",bg:"#2e1f06"}};
  const clientesFilt = busq.length>1 ? clientes.filter(c=>c.nombre.toLowerCase().includes(busq.toLowerCase())).slice(0,6) : [];
  const clienteSel = clientes.find(c=>c.id===clienteId);
  return (
    <div>
      {/* Tipo */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {Object.entries(tipoConfig).map(([k,tc])=>(
          <button key={k} style={{flex:1,padding:"10px 8px",borderRadius:10,border:`2px solid ${tipo===k?tc.color:"var(--color-border-secondary)"}`,
            background:tipo===k?tc.bg:"transparent",color:tipo===k?tc.color:"var(--color-text-secondary)",
            fontSize:13,fontWeight:500,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}
            onClick={()=>setTipo(k)}>
            <span style={{fontSize:20}}>{tc.ico}</span>{tc.label}
          </button>
        ))}
      </div>
      {/* Fecha y hora */}
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <div style={{flex:2}}><label style={s.label}>Fecha</label><input type="date" style={s.input} value={fecha} onChange={e=>setFecha(e.target.value)}/></div>
        <div style={{flex:1}}><label style={s.label}>Hora</label><input type="time" style={s.input} value={hora} onChange={e=>setHora(e.target.value)}/></div>
      </div>
      {/* Buscar cliente */}
      <div style={{marginBottom:10}}>
        <label style={s.label}>Cliente</label>
        {clienteSel ? (
          <div style={{...s.card,margin:0,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",background:"var(--color-background-info)"}}>
            <div>
              <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-primary)"}}>{clienteSel.nombre}</div>
              <div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{clienteSel.dia} · {clienteSel.barrio||""}</div>
            </div>
            <button style={{...s.btn,fontSize:11,padding:"3px 8px"}} onClick={()=>{setClienteId(null);setBusq("");}}>✕</button>
          </div>
        ) : (
          <div>
            <input style={s.input} placeholder="Escribí el nombre del cliente..." value={busq} onChange={e=>setBusq(e.target.value)} />
            {clientesFilt.map(c=>(
              <div key={c.id} style={{...s.card,margin:"2px 0",padding:"8px 12px",cursor:"pointer",background:"var(--color-background-tertiary)"}}
                onClick={()=>{setClienteId(c.id);setBusq("");}}>
                <div style={{fontSize:13,fontWeight:500,color:"var(--color-text-primary)"}}>{c.nombre}</div>
                <div style={{fontSize:11,color:"var(--color-text-secondary)"}}>{c.dia} · {c.barrio||""}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      {/* Detalle */}
      <div style={{marginBottom:14}}>
        <label style={s.label}>Detalle</label>
        <textarea style={{...s.input,minHeight:60,resize:"vertical"}}
          placeholder={tipo==="cobro"?"ej: Cobrar deuda $5.000...":"ej: Pasar a visitar, entregar pedido..."}
          value={motivo} onChange={e=>setMotivo(e.target.value)}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button style={{...s.btn,flex:1}} onClick={onCerrar}>Cancelar</button>
        <button style={{...s.btnPrimary,flex:2,opacity:(!clienteId||!motivo.trim())?0.5:1}}
          disabled={!clienteId||!motivo.trim()}
          onClick={()=>onGuardar({tipo,fecha,hora,motivo:motivo.trim(),clienteId})}>
          Guardar recordatorio
        </button>
      </div>
    </div>
  );
}



function ConfigApariencia() {
  const [temaActual, setTemaActual] = React.useState(getTemaActual);

  const [guardado, setGuardado] = React.useState(false);
  const [logo, setLogo] = React.useState(()=>getLogo());
  const [subiendoLogo, setSubiendoLogo] = React.useState(false);
  const licData = (() => { try { return JSON.parse(localStorage.getItem("sr_licencia")||"null"); } catch { return null; } })();

  const aplicar = (id) => {
    setTemaActual(id);
    aplicarTema(id);
    localStorage.setItem("sr_tema", JSON.stringify(id));
    setGuardado(true);
    setTimeout(()=>setGuardado(false),2000);

                {[tema.vars["--color-background-primary"],tema.vars["--color-accent"]||tema.vars["--color-text-info"],tema.vars["--color-text-success"],tema.vars["--color-text-warning"]].map((c,i)=>(
                  <div key={i} style={{width:12,height:12,borderRadius:"50%",background:c,border:"1px solid rgba(128,128,128,0.3)"}}/>
                ))}
              </div>

      </div>

      {/* Logo del negocio */}

        <div style={{fontSize:13,fontWeight:600,color:"var(--color-text-primary)",marginBottom:10}}>🖼 Logo del negocio</div>
        {logo&&(
          <div style={{textAlign:"center",marginBottom:10}}>

          </div>
        )}
        <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginBottom:8,lineHeight:1.5}}>
          El logo aparece en la portada de la app. Recomendado: fondo transparente o blanco, mínimo 200×200px.
        </div>
        <input type="file" accept="image/*" style={{...s.input,padding:"7px",fontSize:12,marginBottom:8}}
          onChange={async(e)=>{
            const f=e.target.files[0]; if(!f) return;
            setSubiendoLogo(true);
            try {
              const b64 = await comprimirLogoBase64(f, 400, 400, 0.8);
              const ok = await guardarLogoFirestore(licData?.codigo, b64);
              if(ok) { setLogo(b64); alert("✅ Logo guardado correctamente."); }
              else alert("❌ No se pudo guardar el logo. Verificá la conexión.");
            } catch(e) { alert("Error al procesar la imagen: "+e.message); }
            setSubiendoLogo(false);
            e.target.value="";
          }}
        />
        {logo&&(
          <button style={{...s.btnDanger,width:"100%",fontSize:12}} onClick={async()=>{
            if(!window.confirm("¿Eliminar el logo?")) return;
            await guardarLogoFirestore(licData?.codigo, "");
            setLogo(null);
          }}>🗑 Quitar logo</button>
        )}
        {subiendoLogo&&<div style={{fontSize:12,color:"var(--color-text-info)",textAlign:"center",marginTop:6}}>Procesando imagen...</div>}
      </div>
    </div>
  );
}

// ── VistaClientesGeneral (dueño ve TODOS los clientes agrupados) ──
function VistaClientesGeneral({clientes, repartos, ventas, onVerDetalle, onVolver}) {
  const [busq, setBusq] = React.useState("");
  const [repFiltro, setRepFiltro] = React.useState("todos");
  const [diaFiltro, setDiaFiltro] = React.useState("todos");
  const [abiertos, setAbiertos] = React.useState({});

  const toggle = (key) => setAbiertos(o=>({...o,[key]:!o[key]}));

  // Calcular saldo deudor para badge
  const saldoCliente = (c) => c.saldo||0;

  // Última venta por cliente
  const ultimaVenta = React.useMemo(()=>{
    const m={};
    ventas.forEach(v=>{
      if(!m[v.clienteId]||v.fechaKey>m[v.clienteId]) m[v.clienteId]=v.fechaKey;
    });
    return m;
  },[ventas]);

  // Filtrar clientes
  const busqL = busq.toLowerCase();
  const clientesFiltrados = clientes.filter(c=>{
    if(repFiltro!=="todos" && c.repartoId!==repFiltro) return false;
    if(diaFiltro!=="todos" && c.dia!==diaFiltro) return false;
    if(busq && !c.nombre.toLowerCase().includes(busqL) &&
       !(c.barrio||"").toLowerCase().includes(busqL) &&
       !(c.telefono||"").includes(busq)) return false;
    return true;
  });

  // Agrupar: repartidor → dia → clientes
  const grupos = React.useMemo(()=>{
    const repMap = {};
    repartos.forEach(r=>{ repMap[r.id]=r; });

    // Sin reparto asignado van a un grupo especial
    const sinReparto = {id:"sin", repartidorNombre:"Sin reparto", numero:0};

    const agrupado = {};
    clientesFiltrados.forEach(c=>{
      const repId = c.repartoId||"sin";
      const rep = repMap[repId]||sinReparto;
      if(!agrupado[repId]) agrupado[repId]={rep, dias:{}};
      const dia = c.dia||"Sin día";
      if(!agrupado[repId].dias[dia]) agrupado[repId].dias[dia]=[];
      agrupado[repId].dias[dia].push(c);
    });

    // Ordenar por número de reparto
    return Object.values(agrupado).sort((a,b)=>a.rep.numero-b.rep.numero);
  },[clientesFiltrados, repartos]);

  const totalClientes = clientesFiltrados.length;
  const totalDeudores = clientesFiltrados.filter(c=>saldoCliente(c)<0).length;
  const totalDeuda = clientesFiltrados.filter(c=>saldoCliente(c)<0).reduce((a,c)=>a+Math.abs(saldoCliente(c)),0);

  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Todos los clientes</span>
      </div>

      {/* Resumen general */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,padding:"10px 14px 6px"}}>
        <div style={{...s.metricCard,textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:700,color:"var(--color-text-primary)"}}>{totalClientes}</div>
          <div style={{fontSize:10,color:"var(--color-text-secondary)"}}>Clientes</div>
        </div>
        <div style={{...s.metricCard,textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:700,color:"#e05252"}}>{totalDeudores}</div>
          <div style={{fontSize:10,color:"var(--color-text-secondary)"}}>Con deuda</div>
        </div>
        <div style={{...s.metricCard,textAlign:"center"}}>
          <div style={{fontSize:16,fontWeight:700,color:"#e05252"}}>{fmt(totalDeuda)}</div>
          <div style={{fontSize:10,color:"var(--color-text-secondary)"}}>Total deuda</div>
        </div>
      </div>

      {/* Búsqueda */}
      <div style={{padding:"0 14px 8px"}}>
        <input style={s.input} placeholder="🔍 Buscar por nombre, barrio o teléfono..."
          value={busq} onChange={e=>setBusq(e.target.value)} />
      </div>

      {/* Filtro por reparto */}
      <div style={{padding:"0 14px 6px",overflowX:"auto"}}>
        <div style={{display:"flex",gap:6,whiteSpace:"nowrap",paddingBottom:4}}>
          <button style={{...s.btn,fontSize:11,padding:"4px 12px",flexShrink:0,
            background:repFiltro==="todos"?"#185FA5":"var(--color-background-tertiary)",
            color:repFiltro==="todos"?"#e2eaf4":"var(--color-text-secondary)"}}
            onClick={()=>setRepFiltro("todos")}>Todos</button>
          {repartos.sort((a,b)=>a.numero-b.numero).map(r=>(
            <button key={r.id} style={{...s.btn,fontSize:11,padding:"4px 12px",flexShrink:0,
              background:repFiltro===r.id?"#185FA5":"var(--color-background-tertiary)",
              color:repFiltro===r.id?"#e2eaf4":"var(--color-text-secondary)"}}
              onClick={()=>setRepFiltro(r.id)}>Rep.{r.numero} · {r.repartidorNombre.split(" ")[0]}</button>
          ))}
        </div>
      </div>

      {/* Filtro por día */}
      <div style={{padding:"0 14px 10px",overflowX:"auto"}}>
        <div style={{display:"flex",gap:6,whiteSpace:"nowrap",paddingBottom:4}}>
          {["todos",...DIAS].map(d=>(
            <button key={d} style={{...s.btn,fontSize:11,padding:"3px 10px",flexShrink:0,
              background:diaFiltro===d?"#0e7c6b":"var(--color-background-tertiary)",
              color:diaFiltro===d?"#e2eaf4":"var(--color-text-secondary)"}}
              onClick={()=>setDiaFiltro(d)}>
              {d==="todos"?"Todos los días":d}
            </button>
          ))}
        </div>
      </div>

      {/* Lista agrupada */}
      <div style={{padding:"0 14px 32px"}}>
        {grupos.length===0 && (
          <div style={{textAlign:"center",padding:"40px 0",color:"var(--color-text-tertiary)"}}>
            <div style={{fontSize:36,marginBottom:8}}>🔍</div>
            <div style={{fontSize:14}}>No se encontraron clientes</div>
          </div>
        )}

        {grupos.map(({rep, dias})=>{
          const repKey = "rep_"+rep.id;
          const repAbierto = abiertos[repKey]!==false; // abierto por defecto
          const totalRep = Object.values(dias).flat().length;
          const deudaRep = Object.values(dias).flat().filter(c=>saldoCliente(c)<0).reduce((a,c)=>a+Math.abs(saldoCliente(c)),0);
          const deudoresRep = Object.values(dias).flat().filter(c=>saldoCliente(c)<0).length;

          return (
            <div key={rep.id} style={{marginBottom:12}}>
              {/* Header del repartidor */}
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
                background:"#185FA5",borderRadius:10,cursor:"pointer",marginBottom:repAbierto?6:0}}
                onClick={()=>toggle(repKey)}>
                <div style={{width:36,height:36,borderRadius:10,background:"rgba(255,255,255,0.2)",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:18,fontWeight:800,color:"#fff",flexShrink:0}}>
                  {rep.numero||"?"}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{rep.repartidorNombre}</div>
                  <div style={{display:"flex",gap:6,marginTop:2,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,color:"rgba(255,255,255,0.75)"}}>{totalRep} clientes</span>
                    {deudoresRep>0&&<span style={{fontSize:11,color:"#ffcc66",fontWeight:600}}>⚠️ {deudoresRep} deben {fmt(deudaRep)}</span>}
                    {deudoresRep===0&&totalRep>0&&<span style={{fontSize:11,color:"#7de8c5"}}>✓ Sin deudas</span>}
                  </div>
                </div>
                <span style={{color:"rgba(255,255,255,0.7)",fontSize:16}}>{repAbierto?"▲":"▼"}</span>
              </div>

              {/* Días del repartidor */}
              {repAbierto && DIAS.filter(d=>dias[d]&&(diaFiltro==="todos"||d===diaFiltro)).map(dia=>{
                const diaKey = "dia_"+rep.id+"_"+dia;
                const diaAbierto = abiertos[diaKey]!==false; // abierto por defecto
                const csDia = (dias[dia]||[]).sort((a,b)=>(a.orden||9999)-(b.orden||9999));
                const deudoresDia = csDia.filter(c=>saldoCliente(c)<0).length;

                return (
                  <div key={dia} style={{marginBottom:6,marginLeft:8}}>
                    {/* Header del día */}
                    <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",
                      background:"var(--color-background-tertiary)",
                      borderRadius:8,cursor:"pointer",border:"0.5px solid var(--color-border-secondary)",
                      marginBottom:diaAbierto?4:0}}
                      onClick={()=>toggle(diaKey)}>
                      <span style={{fontSize:13,fontWeight:600,color:"var(--color-text-primary)",flex:1}}>
                        📅 {dia}
                      </span>
                      <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>{csDia.length} clientes</span>
                      {deudoresDia>0&&<span style={s.badge("danger")}>{deudoresDia} deben</span>}
                      <span style={{color:"var(--color-text-tertiary)",fontSize:12,marginLeft:4}}>{diaAbierto?"▲":"▼"}</span>
                    </div>

                    {/* Clientes del día */}
                    {diaAbierto && csDia.map(c=>{
                      const saldo = saldoCliente(c);
                      const ult = ultimaVenta[c.id];
                      return (
                        <div key={c.id}
                          style={{display:"flex",alignItems:"center",gap:10,
                            padding:"10px 12px",marginBottom:4,marginLeft:8,
                            background:"var(--color-background-secondary)",
                            borderRadius:8,cursor:"pointer",
                            border:"0.5px solid "+(saldo<0?"rgba(220,80,80,0.3)":"var(--color-border-secondary)"),
                            transition:"opacity 0.15s"}}
                          onClick={()=>onVerDetalle(c)}>
                          {/* Número de orden */}
                          <div style={{width:24,height:24,borderRadius:6,
                            background:"var(--color-background-tertiary)",
                            display:"flex",alignItems:"center",justifyContent:"center",
                            fontSize:10,fontWeight:700,color:"var(--color-text-tertiary)",flexShrink:0}}>
                            {c.orden||"—"}
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13,fontWeight:600,color:"var(--color-text-primary)",
                              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                              {c.nombre}
                            </div>
                            <div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:1}}>
                              {c.barrio||""}{c.calle?` · ${c.calle} ${c.nro||""}`:c.manzana?` · Mz ${c.manzana} L ${c.lote}`:""}
                            </div>
                            {ult&&<div style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:1}}>Última venta: {ult}</div>}
                          </div>
                          <div style={{textAlign:"right",flexShrink:0}}>
                            {saldo<0 && <div style={{fontSize:12,fontWeight:600,color:"#e05252"}}>−{fmt(Math.abs(saldo))}</div>}
                            {saldo>0 && <div style={{fontSize:12,fontWeight:600,color:"#4dd9a0"}}>+{fmt(saldo)}</div>}
                            {saldo===0 && <div style={{fontSize:11,color:"var(--color-text-tertiary)"}}>✓</div>}
                            <span style={{fontSize:14,color:"var(--color-text-tertiary)"}}>→</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
