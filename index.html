    if('serviceWorker' in navigator){
      const CACHE = 'sr2026-v19';
      const ASSETS = [

        'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
        'https://unpkg.com/@babel/standalone/babel.min.js',

        'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js',
      ];
      const sw = `
const CACHE='${CACHE}';
const ASSETS=${JSON.stringify(ASSETS)};
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting()));
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>clients.claim()));
});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET') return;
  e.respondWith(
    caches.match(e.request).then(cached=>{
      const net = fetch(e.request).then(res=>{
        if(res.ok) caches.open(CACHE).then(c=>c.put(e.request,res.clone()));
        return res;
      }).catch(()=>cached);
      return cached||net;
    })
  );
});`;
      const blob = new Blob([sw],{type:'application/javascript'});
      const url = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).catch(()=>{});
    }

  <script>

      // ── LICENCIAS: conecta al proyecto del Panel Admin (app-reparto-65035) ──
      var licenciasApp = firebase.apps.find(function(a){ return a.name === "licencias"; });
      if(!licenciasApp) {
        licenciasApp = firebase.initializeApp({
          apiKey: "AIzaSyDV1i35MLw74hjnSg6rRZgQFIAI8hsJllI",

      });

    } catch(e) { console.error("Firebase init error:", e); window.db = null; window.auth = null; }

    // ── Funciones multi-usuario ──────────────────────────────────────
    function getUserProfile(uid) {
      if(!window.db) return Promise.resolve(null);
      return window.db.collection("users").doc(uid).get()
        .then(function(doc){ return doc.exists ? doc.data() : null; })
        .catch(function(){ return null; });
    }
    function saveUserProfile(uid, data) {
      if(!window.db) return Promise.resolve();
      return window.db.collection("users").doc(uid).set(data, {merge:true});
    }
    function crearNegocio(uid, nombre) {
      if(!window.db) return Promise.resolve(null);
      var ref = window.db.collection("negocios").doc();
      return ref.set({ nombre:nombre, ownerId:uid, creadoEn:new Date().toISOString() })
        .then(function(){ return ref.id; });
    }
    function crearInvitacion(negocioId, nombre, sectores) {
      if(!window.db) return Promise.resolve(null);
      var codigo = Math.random().toString(36).slice(2,8).toUpperCase();
      return window.db.collection("negocios").doc(negocioId)
        .collection("invites").doc(codigo)
        .set({ nombre:nombre, sectores:sectores||[], usado:false, creadoEn:new Date().toISOString() })
        .then(function(){ return codigo; });
    }
    function canjearInvitacion(uid, email, codigo) {
      if(!window.db) return Promise.resolve({ok:false, msg:"Sin conexión"});
      return window.db.collectionGroup("invites").get().then(function(snap){
        var found = null;
        snap.forEach(function(doc){ if(doc.id===codigo && !doc.data().usado) found=doc; });
        if(!found) return {ok:false, msg:"Código inválido o ya usado"};
        var inv = found.data();
        var negocioId = found.ref.parent.parent.id;
        return found.ref.update({usado:true, uid:uid})
          .then(function(){
            return saveUserProfile(uid, { rol:"repartidor", negocioId:negocioId, nombre:inv.nombre, sectores:inv.sectores||[], email:email });
          })
          .then(function(){ return {ok:true, negocioId:negocioId, nombre:inv.nombre, sectores:inv.sectores||[]}; });
      }).catch(function(e){ return {ok:false, msg:"Error: "+e.message}; });
    }
    function listarRepartidores(negocioId) {
      if(!window.db) return Promise.resolve([]);
      return window.db.collection("users").where("negocioId","==",negocioId).where("rol","==","repartidor").get()
        .then(function(snap){ var r=[]; snap.forEach(function(d){ r.push({uid:d.id,...d.data()}); }); return r; })
        .catch(function(){ return []; });
    }
    function eliminarRepartidor(uid) {
      if(!window.db) return Promise.resolve();
      return window.db.collection("users").doc(uid).delete();
    }
    function negocioCol(negocioId) {
      return window.db.collection("negocios").doc(negocioId).collection("datos");
    }
    function cloudSave(data, uid, negocioId) {
      if(!window.db || !negocioId) return Promise.resolve(false);
      var col = negocioCol(negocioId);
      var saves = [
        col.doc("config").set({
          planillas: data.planillas || {},
          stock: data.stock || {},
          productos: data.productos || [],
          noVisitas: data.noVisitas || [],
          cargasDia: data.cargasDia || {},
          recordatorios: data.recordatorios || [],
          prospectos: data.prospectos || [],
          mantVeh: data.mantVeh || [],
          histPrecios: data.histPrecios || [],
          zonasReparto: data.zonasReparto || {},
          negocio: data.negocio || {},
          repartos: data.repartos || []
        })
      ];
      var cl = data.clientes || [];
      var nc = Math.ceil(cl.length/50)||1;
      saves.push(col.doc("clientes_meta").set({n:nc,total:cl.length}));
      for(var i=0;i<nc;i++) saves.push(col.doc("cl_"+i).set({d:cl.slice(i*50,i*50+50)}));
      var vt = data.ventas || [];
      var nv = Math.ceil(vt.length/80)||1;
      saves.push(col.doc("ventas_meta").set({n:nv,total:vt.length}));
      for(var j=0;j<nv;j++) saves.push(col.doc("vt_"+j).set({d:vt.slice(j*80,j*80+80)}));
      saves.push(col.doc("prospectos").set({d:data.prospectos||[]}));
      return Promise.all(saves).then(function(){return true;}).catch(function(e){console.error("Save err",e);return false;});
    }
    function cloudLoad(uid, negocioId) {
      if(!window.db || !negocioId) return Promise.resolve(null);
      var col = negocioCol(negocioId);
      return Promise.all([
        col.doc("config").get(),
        col.doc("clientes_meta").get(),
        col.doc("ventas_meta").get(),
        col.doc("prospectos").get()
      ]).then(function(results) {
        var cfg=results[0], cMeta=results[1], vMeta=results[2], prDoc=results[3];
        if(!cfg.exists) return null;
        var data = cfg.data();
        if(!data.recordatorios)  data.recordatorios = [];
        if(!data.prospectos)     data.prospectos = [];
        if(!data.mantVeh)        data.mantVeh = [];
        if(!data.histPrecios)    data.histPrecios = [];
        if(!data.zonasReparto)   data.zonasReparto = {};
        if(!data.negocio)        data.negocio = {};
        if(!data.repartos)       data.repartos = [];
        var nc = cMeta.exists ? (cMeta.data().n||0) : 0;
        var vn = vMeta.exists ? (vMeta.data().n||0) : 0;
        var cFetches = []; for(var i=0;i<nc;i++) cFetches.push(col.doc("cl_"+i).get());
        var vFetches = []; for(var j=0;j<vn;j++) vFetches.push(col.doc("vt_"+j).get());
        return Promise.all(cFetches.concat(vFetches)).then(function(docs) {
          data.clientes   = docs.slice(0,nc).reduce(function(a,d){return a.concat(d.exists?d.data().d:[]);}, []);
          data.ventas     = docs.slice(nc).reduce(function(a,d){return a.concat(d.exists?d.data().d:[]);}, []);
          data.prospectos = prDoc.exists ? (prDoc.data().d||[]) : [];
          return data;
        });
      }).catch(function(e){console.error("Load err",e);return null;});
    }

// Debounce save — espera 1.5s después del último cambio antes de guardar
let _saveTimer = null;
let _saveQueue = null;
function debounceSave(fn) {
  _saveQueue = fn;
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(()=>{
    const f = _saveQueue; _saveQueue = null; _saveTimer = null;
    if(f) f();
  }, 1200);
}
window.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="hidden" && _saveQueue){
    const f=_saveQueue; _saveQueue=null;
    if(_saveTimer){clearTimeout(_saveTimer);_saveTimer=null;}
    f();
  }
});

function useLS(key, fallback) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : fallback; }
    catch { return fallback; }
  });
  const save = (v) => {
    setVal(v);
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
  };
  return [val, save];
}

function calcVenta(detalle, pago, montoPagado, saldoAplicado, productos) {
  const bruto = detalle.reduce((a,d)=>a+d.total,0);
  const desc = 0; // retención solo en planilla, no afecta el monto de la venta
  const neto = bruto - desc;
  const aPagar = neto - (saldoAplicado||0);
  const pagadoNum = pago==="fiado" ? 0 : (montoPagado!==""&&!isNaN(Number(montoPagado)) ? Number(montoPagado) : aPagar);
  const saldoDelta = pagadoNum - neto;
  const costo = detalle.reduce((a,d)=>{ const p=productos.find(x=>x.nombre===d.nombre); return a+(p?p.costo*d.cantidad:0); },0);
  return { bruto, desc, neto, aPagar, pagadoNum, saldoDelta, costo, ganancia:neto-costo };
}

// Comprime imagen a max 800px y calidad 0.75 antes de guardar
function comprimirFoto(file, maxW=800, quality=0.75) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(file);
  });
}

const AZUL = [24, 95, 165];
const AZUL_CLAR = [214, 228, 240];
const GRIS = [245, 245, 245];
const NEGRO = [30, 30, 30];

function fmt2(n) { return "$"+Number(n||0).toLocaleString("es-AR",{minimumFractionDigits:0}); }

function pdfHeader(doc, negocio, titulo, subtitulo) {
  const W = doc.internal.pageSize.getWidth();
  doc.setFillColor(...AZUL);
  doc.rect(0, 0, W, 28, "F");
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold");
  doc.setFontSize(14);
  doc.text("Sistema de Reparto 2026 · Multi", 14, 10);
  doc.setFontSize(10);
  doc.setFont("helvetica","normal");
  doc.text(negocio||"", 14, 17);
  doc.setFontSize(12);
  doc.setFont("helvetica","bold");
  doc.text(titulo, W/2, 10, {align:"center"});
  doc.setFontSize(9);
  doc.setFont("helvetica","normal");
  doc.text(subtitulo||"", W/2, 17, {align:"center"});
  doc.setTextColor(...NEGRO);
  return 35;
}

function pdfSeccion(doc, y, titulo) {
  doc.setFillColor(...AZUL_CLAR);
  doc.rect(10, y, doc.internal.pageSize.getWidth()-20, 7, "F");
  doc.setFont("helvetica","bold");
  doc.setFontSize(9);
  doc.setTextColor(...AZUL);
  doc.text(titulo, 14, y+5);
  doc.setTextColor(...NEGRO);
  return y+9;
}

function generarPDFDiario({ventas, clientes, planillas, noVisitas, productos, fecha, dia, negocio}) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:"portrait", unit:"mm", format:"a4"});
  const W = doc.internal.pageSize.getWidth();
  const ventasDia = ventas.filter(v=>v.fechaKey===fecha&&v.dia===dia);
  const noVDia = (noVisitas||[]).filter(v=>v.fecha===fecha&&v.dia===dia);
  const planilla = planillas[`${dia}_${fecha}`]||{};
  const gastos = planilla.gastos||[];
  const totalGastos = gastos.reduce((a,g)=>a+(Number(g.monto)||0),0);

  // Totales
  const cobEf  = ventasDia.filter(v=>v.pago==="contado").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
  const cobTr  = ventasDia.filter(v=>v.pago==="transferencia").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
  const cobFi  = ventasDia.filter(v=>v.pago==="fiado").reduce((a,v)=>a+(v.neto||0),0);
  const totalBruto = cobEf+cobTr+cobFi;
  const totalGan = ventasDia.reduce((a,v)=>a+(v.ganancia||0),0);
  const efectivoNeto = cobEf - totalGastos;

  let y = pdfHeader(doc, negocio, `Informe Diario — ${dia}`, fecha);

  // Resumen financiero
  y = pdfSeccion(doc, y, "RESUMEN FINANCIERO");
  doc.autoTable({
    startY: y,
    margin:{left:10,right:10},
    styles:{fontSize:9,cellPadding:2},
    headStyles:{fillColor:AZUL,textColor:[255,255,255],fontStyle:"bold"},
    alternateRowStyles:{fillColor:GRIS},
    head:[["Concepto","Monto"]],
    body:[
      ["💵 Efectivo cobrado", fmt2(cobEf)],
      ["📲 Transferencias", fmt2(cobTr)],
      ["📝 Fiado", fmt2(cobFi)],
      ["📦 Total facturado", fmt2(totalBruto)],
      ["✅ Ganancia estimada", fmt2(totalGan)],
      ["🔧 Gastos del día", fmt2(totalGastos)],
      ["💰 Efectivo neto en mano", fmt2(efectivoNeto)],
    ],
    columnStyles:{0:{cellWidth:120},1:{cellWidth:50,halign:"right"}},
  });
  y = doc.lastAutoTable.finalY + 6;

  // Detalle por cliente
  if(ventasDia.length>0) {
    y = pdfSeccion(doc, y, `DETALLE POR CLIENTE (${ventasDia.length} entregas)`);
    const filas = ventasDia.map(v=>{
      const prod = v.detalle.map(d=>`${d.nombre} ×${d.cantidad}`).join(", ");
      return [v.cliente||"", prod, fmt2(v.neto), v.pago==="contado"?"Efectivo":v.pago==="transferencia"?"Transfer.":"Fiado", fmt2(v.pagadoNum||0)];
    });
    doc.autoTable({
      startY:y,
      margin:{left:10,right:10},
      styles:{fontSize:8,cellPadding:1.5,overflow:"linebreak"},
      headStyles:{fillColor:AZUL,textColor:[255,255,255],fontStyle:"bold"},
      alternateRowStyles:{fillColor:GRIS},
      head:[["Cliente","Productos","Total","Pago","Pagado"]],
      body:filas,
      columnStyles:{0:{cellWidth:42},1:{cellWidth:62},2:{cellWidth:22,halign:"right"},3:{cellWidth:22,halign:"center"},4:{cellWidth:22,halign:"right"}},
    });
    y = doc.lastAutoTable.finalY + 6;
  }

  // No visitados
  if(noVDia.length>0) {
    y = pdfSeccion(doc, y, `NO VISITADOS (${noVDia.length})`);
    const cl = clientes.reduce((m,c)=>{m[c.id]=c.nombre;return m;},{});
    doc.autoTable({
      startY:y, margin:{left:10,right:10},
      styles:{fontSize:8,cellPadding:1.5},
      headStyles:{fillColor:[180,60,60],textColor:[255,255,255],fontStyle:"bold"},
      head:[["Cliente","Motivo"]],
      body:noVDia.map(v=>[cl[v.clienteId]||"", v.motivo==="noesta"?"No estaba":v.motivo==="noquiso"?"No quiso":"—"]),
      columnStyles:{0:{cellWidth:100},1:{cellWidth:60}},
    });
    y = doc.lastAutoTable.finalY + 6;
  }

  // Gastos
  if(gastos.length>0) {
    y = pdfSeccion(doc, y, "GASTOS DEL DÍA");
    doc.autoTable({
      startY:y, margin:{left:10,right:10},
      styles:{fontSize:8,cellPadding:1.5},
      headStyles:{fillColor:AZUL,textColor:[255,255,255],fontStyle:"bold"},
      alternateRowStyles:{fillColor:GRIS},
      head:[["Descripción","Monto"]],
      body:[...gastos.map(g=>[g.cat+(g.desc?` — ${g.desc}`:""), fmt2(g.monto)]),["TOTAL",fmt2(totalGastos)]],
      columnStyles:{0:{cellWidth:130},1:{cellWidth:30,halign:"right"}},
    });
    y = doc.lastAutoTable.finalY + 6;
  }

  // Envases
  const envPrest={sifon:0,bidon10:0,bidon20:0}, envDev={sifon:0,bidon10:0,bidon20:0};
  const pk={"Sifón 1.5L":"sifon","Bidón 10L":"bidon10","Bidón 20L":"bidon20"};
  ventasDia.forEach(v=>{
    (v.envPrest||[]).forEach(e=>{const k=pk[e.prod];if(k)envPrest[k]+=Number(e.cant)||0;});
    (v.envDev||[]).forEach(e=>{const k=pk[e.prod];if(k)envDev[k]+=Number(e.cant)||0;});
  });
  if(envPrest.sifon||envPrest.bidon10||envPrest.bidon20||envDev.sifon||envDev.bidon10||envDev.bidon20) {
    y = pdfSeccion(doc, y, "MOVIMIENTO DE ENVASES");
    doc.autoTable({
      startY:y, margin:{left:10,right:10},
      styles:{fontSize:8,cellPadding:1.5},
      headStyles:{fillColor:AZUL,textColor:[255,255,255],fontStyle:"bold"},
      head:[["Producto","Prestados","Devueltos","Neto"]],
      body:[
        ["Sifón 1.5L", envPrest.sifon, envDev.sifon, envPrest.sifon-envDev.sifon],
        ["Bidón 10L", envPrest.bidon10, envDev.bidon10, envPrest.bidon10-envDev.bidon10],
        ["Bidón 20L", envPrest.bidon20, envDev.bidon20, envPrest.bidon20-envDev.bidon20],
      ],
      columnStyles:{0:{cellWidth:80},1:{cellWidth:30,halign:"center"},2:{cellWidth:30,halign:"center"},3:{cellWidth:30,halign:"center"}},
    });
  }

  // Pie de página
  doc.setFontSize(7);
  doc.setTextColor(150,150,150);
  doc.text(`Generado el ${new Date().toLocaleString("es-AR")} · Sistema de Reparto 2026 · Multi`, W/2, doc.internal.pageSize.getHeight()-8, {align:"center"});

  return doc.output("datauristring").split(",")[1]; // base64
}

function generarPDFSemanal({ventas, clientes, planillas, noVisitas, productos, fechaFin, negocio}) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:"portrait", unit:"mm", format:"a4"});
  const W = doc.internal.pageSize.getWidth();

  // Calcular rango semanal (lunes a sábado)
  const fin = new Date(fechaFin);
  const ini = new Date(fin); ini.setDate(fin.getDate()-5);
  const fechasRango = [];
  for(let d=new Date(ini); d<=fin; d.setDate(d.getDate()+1)) fechasRango.push(d.toISOString().slice(0,10));

  const ventasSem = ventas.filter(v=>fechasRango.includes(v.fechaKey));
  const cobEf  = ventasSem.filter(v=>v.pago==="contado").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
  const cobTr  = ventasSem.filter(v=>v.pago==="transferencia").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
  const cobFi  = ventasSem.filter(v=>v.pago==="fiado").reduce((a,v)=>a+(v.neto||0),0);
  const totalGan = ventasSem.reduce((a,v)=>a+(v.ganancia||0),0);
  const totalGastos = fechasRango.reduce((a,f)=>{
    const dias=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    return a+dias.reduce((b,d)=>b+((planillas[`${d}_${f}`]?.gastos||[]).reduce((c,g)=>c+(Number(g.monto)||0),0)),0);
  },0);

  const semLabel = `${ini.toLocaleDateString("es-AR",{day:"numeric",month:"short"})} al ${fin.toLocaleDateString("es-AR",{day:"numeric",month:"short",year:"numeric"})}`;
  let y = pdfHeader(doc, negocio, "Informe Semanal", semLabel);

  y = pdfSeccion(doc, y, "RESUMEN DE LA SEMANA");
  doc.autoTable({
    startY:y, margin:{left:10,right:10},
    styles:{fontSize:9,cellPadding:2},
    headStyles:{fillColor:AZUL,textColor:[255,255,255],fontStyle:"bold"},
    alternateRowStyles:{fillColor:GRIS},
    head:[["Concepto","Monto"]],
    body:[
      ["💵 Efectivo cobrado", fmt2(cobEf)],
      ["📲 Transferencias", fmt2(cobTr)],
      ["📝 Fiado acumulado", fmt2(cobFi)],
      ["📦 Total facturado", fmt2(cobEf+cobTr+cobFi)],
      ["✅ Ganancia estimada", fmt2(totalGan)],
      ["🔧 Gastos de la semana", fmt2(totalGastos)],
      ["💰 Resultado neto", fmt2(cobEf+cobTr-totalGastos)],
    ],
    columnStyles:{0:{cellWidth:120},1:{cellWidth:50,halign:"right"}},
  });
  y = doc.lastAutoTable.finalY + 6;

  // Por día
  y = pdfSeccion(doc, y, "DETALLE POR DÍA");
  const DIAS_MAP = {"Lunes":"lunes","Martes":"martes","Miércoles":"miercoles","Jueves":"jueves","Viernes":"viernes","Sábado":"sabado"};
  const filasXDia = fechasRango.map(f=>{
    const vF = ventasSem.filter(v=>v.fechaKey===f);
    const gastosDia = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"].reduce((a,d)=>
      a+((planillas[`${d}_${f}`]?.gastos||[]).reduce((b,g)=>b+(Number(g.monto)||0),0)),0);
    const total = vF.reduce((a,v)=>a+(v.neto||0),0);
    const d=new Date(f+"T12:00:00"); const label=d.toLocaleDateString("es-AR",{weekday:"short",day:"numeric",month:"short"});
    return [label, vF.length, fmt2(total), fmt2(gastosDia), fmt2(total-gastosDia)];
  }).filter(r=>r[1]>0);
  if(filasXDia.length>0) doc.autoTable({
    startY:y, margin:{left:10,right:10},
    styles:{fontSize:8,cellPadding:1.5},
    headStyles:{fillColor:AZUL,textColor:[255,255,255],fontStyle:"bold"},
    alternateRowStyles:{fillColor:GRIS},
    head:[["Día","Entregas","Facturado","Gastos","Neto"]],
    body:filasXDia,
    columnStyles:{0:{cellWidth:40},1:{cellWidth:22,halign:"center"},2:{cellWidth:32,halign:"right"},3:{cellWidth:32,halign:"right"},4:{cellWidth:32,halign:"right"}},
  });
  y = doc.lastAutoTable.finalY + 6;

  // Top clientes
  y = pdfSeccion(doc, y, "TOP CLIENTES DE LA SEMANA");
  const porCliente = {};
  ventasSem.forEach(v=>{
    if(!porCliente[v.clienteId]) porCliente[v.clienteId]={nombre:v.cliente,total:0,compras:0};
    porCliente[v.clienteId].total+=v.neto||0;
    porCliente[v.clienteId].compras++;
  });
  const top = Object.values(porCliente).sort((a,b)=>b.total-a.total).slice(0,10);
  if(top.length>0) doc.autoTable({
    startY:y, margin:{left:10,right:10},
    styles:{fontSize:8,cellPadding:1.5},
    headStyles:{fillColor:AZUL,textColor:[255,255,255],fontStyle:"bold"},
    alternateRowStyles:{fillColor:GRIS},
    head:[["Cliente","Compras","Total"]],
    body:top.map(c=>[c.nombre,c.compras,fmt2(c.total)]),
    columnStyles:{0:{cellWidth:110},1:{cellWidth:30,halign:"center"},2:{cellWidth:30,halign:"right"}},
  });

  doc.setFontSize(7);
  doc.setTextColor(150,150,150);
  doc.text(`Generado el ${new Date().toLocaleString("es-AR")} · Sistema de Reparto 2026 · Multi`, W/2, doc.internal.pageSize.getHeight()-8, {align:"center"});
  return doc.output("datauristring").split(",")[1];
}

function generarPDFMensual({ventas, clientes, planillas, noVisitas, productos, mes, anio, negocio}) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:"portrait", unit:"mm", format:"a4"});
  const W = doc.internal.pageSize.getWidth();

  const ventasMes = ventas.filter(v=>{
    const fk=v.fechaKey||""; return fk.startsWith(`${anio}-${String(mes).padStart(2,"0")}`);
  });
  const cobEf  = ventasMes.filter(v=>v.pago==="contado").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
  const cobTr  = ventasMes.filter(v=>v.pago==="transferencia").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
  const cobFi  = ventasMes.filter(v=>v.pago==="fiado").reduce((a,v)=>a+(v.neto||0),0);
  const totalGan = ventasMes.reduce((a,v)=>a+(v.ganancia||0),0);
  const mesNombre = new Date(anio,mes-1,1).toLocaleDateString("es-AR",{month:"long",year:"numeric"});

  let y = pdfHeader(doc, negocio, "Informe Mensual", mesNombre.charAt(0).toUpperCase()+mesNombre.slice(1));

  y = pdfSeccion(doc, y, "RESUMEN DEL MES");
  doc.autoTable({
    startY:y, margin:{left:10,right:10},
    styles:{fontSize:9,cellPadding:2},
    headStyles:{fillColor:AZUL,textColor:[255,255,255],fontStyle:"bold"},
    alternateRowStyles:{fillColor:GRIS},
    head:[["Concepto","Monto"]],
    body:[
      ["📦 Entregas realizadas", ventasMes.length+" ventas"],
      ["💵 Efectivo cobrado", fmt2(cobEf)],
      ["📲 Transferencias", fmt2(cobTr)],
      ["📝 Fiado acumulado", fmt2(cobFi)],
      ["📦 Total facturado", fmt2(cobEf+cobTr+cobFi)],
      ["✅ Ganancia estimada", fmt2(totalGan)],
    ],
    columnStyles:{0:{cellWidth:120},1:{cellWidth:50,halign:"right"}},
  });
  y = doc.lastAutoTable.finalY + 6;

  // Clientes con deuda
  const deudores = clientes.filter(c=>c.saldo<0).sort((a,b)=>a.saldo-b.saldo);
  if(deudores.length>0) {
    y = pdfSeccion(doc, y, `CLIENTES CON DEUDA (${deudores.length})`);
    doc.autoTable({
      startY:y, margin:{left:10,right:10},
      styles:{fontSize:8,cellPadding:1.5},
      headStyles:{fillColor:[180,60,60],textColor:[255,255,255],fontStyle:"bold"},
      head:[["Cliente","Día","Saldo"]],
      body:deudores.map(c=>[c.nombre, c.dia, fmt2(Math.abs(c.saldo))]),
      columnStyles:{0:{cellWidth:100},1:{cellWidth:40},2:{cellWidth:30,halign:"right"}},
    });
    y = doc.lastAutoTable.finalY + 6;
  }

  // Envases en circulación
  const envTot = clientes.reduce((a,c)=>({sifon:a.sifon+(c.sifon||0),bidon10:a.bidon10+(c.bidon10||0),bidon20:a.bidon20+(c.bidon20||0)}),{sifon:0,bidon10:0,bidon20:0});
  y = pdfSeccion(doc, y, "ENVASES EN PODER DE CLIENTES");
  doc.autoTable({
    startY:y, margin:{left:10,right:10},
    styles:{fontSize:9,cellPadding:2},
    headStyles:{fillColor:AZUL,textColor:[255,255,255],fontStyle:"bold"},
    head:[["Producto","Cantidad"]],
    body:[["Sifón 1.5L", envTot.sifon],["Bidón 10L", envTot.bidon10],["Bidón 20L", envTot.bidon20]],
    columnStyles:{0:{cellWidth:120},1:{cellWidth:50,halign:"center"}},
  });

  doc.setFontSize(7);
  doc.setTextColor(150,150,150);
  doc.text(`Generado el ${new Date().toLocaleString("es-AR")} · Sistema de Reparto 2026 · Multi`, W/2, doc.internal.pageSize.getHeight()-8, {align:"center"});
  return doc.output("datauristring").split(",")[1];
}

async function enviarInformePorEmail({base64pdf, nombre, asunto, cuerpoHtml, emailDestino, nombreDestino}) {
  try {
    const res = await fetch("https://api.brevo.com/v3/smtp/email", {
      method:"POST",
      headers:{"Content-Type":"application/json","api-key":BREVO_API_KEY},
      body: JSON.stringify({
        sender:{name:"Sistema de Reparto 2026 · Multi", email:BREVO_FROM},
        to:[{email:emailDestino, name:nombreDestino||emailDestino}],
        subject: asunto,
        htmlContent: cuerpoHtml,
        attachment:[{content:base64pdf, name:nombre}]
      })
    });
    return res.ok;
  } catch(e) { console.error("Email error",e); return false; }
}

function usarInformes({ventas, clientes, planillas, noVisitas, productos}) {
  const lic = (() => { try { return JSON.parse(localStorage.getItem("sr_licencia")||"null"); } catch { return null; } })();
  const negocio = lic?.negocio || "Sistema de Reparto 2026 · Multi";
  const emailDest = lic?.email || "";

  const enviarDiario = async (fecha, dia) => {
    if(!emailDest || !window.jspdf) return false;
    try {
      const base64 = generarPDFDiario({ventas,clientes,planillas,noVisitas,productos,fecha,dia,negocio});
      const d = new Date(fecha+"T12:00:00");
      const label = d.toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});
      return await enviarInformePorEmail({
        base64pdf:base64, nombre:`informe-diario-${fecha}.pdf`,
        asunto:`📦 Informe del día — ${label}`,
        cuerpoHtml:`<h2>Sistema de Reparto 2026 · Multi</h2><p>Hola <b>${negocio}</b>,</p><p>Adjunto el informe del día <b>${label}</b>.</p><p>Guardalo para tener tu registro.</p><br><p style="color:#888;font-size:12px">Sistema de Reparto 2026 · Multi</p>`,
        emailDestino:emailDest, nombreDestino:negocio
      });
    } catch(e) { console.error("PDF diario error",e); return false; }
  };

  const enviarSemanal = async (fechaSabado) => {
    if(!emailDest || !window.jspdf) return false;
    try {
      const base64 = generarPDFSemanal({ventas,clientes,planillas,noVisitas,productos,fechaFin:fechaSabado,negocio});
      const d = new Date(fechaSabado+"T12:00:00");
      const label = d.toLocaleDateString("es-AR",{day:"numeric",month:"long",year:"numeric"});
      return await enviarInformePorEmail({
        base64pdf:base64, nombre:`informe-semanal-${fechaSabado}.pdf`,
        asunto:`📊 Informe Semanal — semana del ${label}`,
        cuerpoHtml:`<h2>Sistema de Reparto 2026 · Multi</h2><p>Hola <b>${negocio}</b>,</p><p>Adjunto el resumen de la semana que terminó el <b>${label}</b>.</p><br><p style="color:#888;font-size:12px">Sistema de Reparto 2026 · Multi</p>`,
        emailDestino:emailDest, nombreDestino:negocio
      });
    } catch(e) { console.error("PDF semanal error",e); return false; }
  };

  const enviarMensual = async (mes, anio) => {
    if(!emailDest || !window.jspdf) return false;
    try {
      const base64 = generarPDFMensual({ventas,clientes,planillas,noVisitas,productos,mes,anio,negocio});
      const label = new Date(anio,mes-1,1).toLocaleDateString("es-AR",{month:"long",year:"numeric"});
      return await enviarInformePorEmail({
        base64pdf:base64, nombre:`informe-mensual-${anio}-${mes}.pdf`,
        asunto:`📅 Informe Mensual — ${label}`,
        cuerpoHtml:`<h2>Sistema de Reparto 2026 · Multi</h2><p>Hola <b>${negocio}</b>,</p><p>Adjunto el resumen del mes de <b>${label}</b>.</p><br><p style="color:#888;font-size:12px">Sistema de Reparto 2026 · Multi</p>`,
        emailDestino:emailDest, nombreDestino:negocio
      });
    } catch(e) { console.error("PDF mensual error",e); return false; }
  };

  return {enviarDiario, enviarSemanal, enviarMensual};
}

function App() {
  const [usuario, setUsuario] = React.useState(undefined);
  const [perfil,  setPerfil]  = React.useState(undefined);
  const [temaElegido, setTemaElegido] = React.useState(()=>!!localStorage.getItem("sr_tema"));

  React.useEffect(()=>{
    if(!window.auth){ setUsuario(null); setPerfil(null); return; }
    return window.auth.onAuthStateChanged(function(u){
      setUsuario(u||null);
      if(!u){ setPerfil(null); return; }
      getUserProfile(u.uid).then(function(p){ setPerfil(p||null); });
    });
  },[]);

  if(usuario===undefined||perfil===undefined) return <Cargando />;
  if(!usuario) return <Login />;
  if(!temaElegido) return <PantallaElegirTema onElegido={(id)=>{ localStorage.setItem("sr_tema",JSON.stringify(id)); aplicarTema(id); setTemaElegido(true); }} />;
  if(!perfil || !perfil.negocioId) return <OnboardingRoles uid={usuario.uid} email={usuario.email} onListo={(p)=>setPerfil(p)} />;
  if(perfil.rol==="repartidor") return <AppRepartidor uid={usuario.uid} perfil={perfil} />;
  return <AppPrincipal uid={usuario.uid} email={usuario.email} perfil={perfil} />;
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error:null}; }
  static getDerivedStateFromError(e) { return {error:e}; }
  componentDidCatch(e,info) { console.error("App error:", e, info); }
  render() {
    if(this.state.error) return (
      <div style={{padding:40,textAlign:"center",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0f1923"}}>
        <div style={{fontSize:40,marginBottom:16}}>⚠️</div>
        <div style={{fontSize:18,fontWeight:500,color:"#f07070",marginBottom:8}}>Algo salió mal</div>
        <div style={{fontSize:13,color:"#7a9ab8",marginBottom:20,maxWidth:300}}>{String(this.state.error.message||"Error desconocido")}</div>
        <button style={{background:"#185FA5",color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",fontSize:14,cursor:"pointer"}}
          onClick={()=>{this.setState({error:null});window.location.hash="portada";}}>
          Reiniciar app
        </button>
      </div>
    );
    return this.props.children;
  }
}

function PantallaPin({pin, onOk}) {
  const [intento, setIntento] = React.useState("");
  const [error, setError] = React.useState("");
  const [intentos, setIntentos] = React.useState(0);
  const [bloqueado, setBloqueado] = React.useState(false);

  const verificar = () => {
    if(intento === String(pin)) { setError(""); onOk(); }
    else {
      const nv = intentos+1;
      setIntentos(nv);
      setIntento("");
      if(nv>=5) { setBloqueado(true); setError("Demasiados intentos. Contactá al soporte."); }
      else setError(`PIN incorrecto (${5-nv} intento${5-nv!==1?"s":""} restante${5-nv!==1?"s":""})`);
    }
  };

  const teclas = [1,2,3,4,5,6,7,8,9,"","0","⌫"];

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,minHeight:"100vh",gap:20}}>
      <div style={{width:70,height:70,borderRadius:"50%",background:"var(--color-background-info)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:34}}>💧</div>
      <h1 style={{fontSize:20,fontWeight:600,color:"var(--color-text-primary)"}}>Sistema de Reparto 2026 · Multi</h1>
      <p style={{fontSize:14,color:"var(--color-text-secondary)"}}>Ingresá tu PIN de acceso</p>

      {/* Indicadores de dígitos */}
      <div style={{display:"flex",gap:16,marginBottom:8}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:18,height:18,borderRadius:"50%",
            background:intento.length>i?"#185FA5":"transparent",
            border:"2px solid var(--color-border-secondary)"}} />
        ))}
      </div>

      {error&&<p style={{fontSize:13,color:"var(--color-text-danger)",textAlign:"center"}}>{error}</p>}

      {/* Teclado numérico */}
      {!bloqueado&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,72px)",gap:10}}>
        {teclas.map((t,i)=>(
          <button key={i} style={{
            height:60,fontSize:t==="⌫"?20:22,fontWeight:500,borderRadius:12,
            background:t===""?"transparent":"var(--color-background-secondary)",
            border:t===""?"none":"0.5px solid var(--color-border-secondary)",
            color:"var(--color-text-primary)",cursor:t===""?"default":"pointer",
            opacity:t===""?0:1
          }} onClick={()=>{
            if(t==="") return;
            if(t==="⌫") setIntento(v=>v.slice(0,-1));
            else if(intento.length<4) {
              const nv = intento+t;
              setIntento(nv);
              if(nv.length===4) setTimeout(()=>{
                if(nv===String(pin)){setError("");onOk();}
                else{
                  setIntento("");
                  setIntentos(prev=>{
                    const n2=prev+1;
                    if(n2>=5){setBloqueado(true);setError("Demasiados intentos. Contactá al soporte.");}
                    else{setError(`PIN incorrecto (${5-n2} intento${5-n2!==1?"s":""} restante${5-n2!==1?"s":""})`);}
                    return n2;
                  });
                }
              },200);
            }
          }}>{t}</button>
        ))}
      </div>}
    </div>
  );
}

// ── Generador de fechas por día de semana ────────────────────────────────────
function getFechasDelAnio(diaNombre) {
  const diasSemana = {"Lunes":1,"Martes":2,"Miércoles":3,"Jueves":4,"Viernes":5,"Sábado":6,"Domingo":0};
  const target = diasSemana[diaNombre];
  if(target===undefined) return [];
  const hoy = new Date();
  const anio = hoy.getFullYear();
  const fechas = [];
  const d = new Date(anio,0,1);
  while(d.getDay()!==target) d.setDate(d.getDate()+1);
  while(d.getFullYear()===anio) {
    fechas.push(new Date(d));
    d.setDate(d.getDate()+7);
  }
  return fechas;
}

function formatFecha(d) {
  return d.toLocaleDateString("es-AR",{weekday:"short",day:"numeric",month:"short"});
}

function fechaKey(d) {
  return d.toISOString().slice(0,10);
}

function hoyKey() { return new Date().toISOString().slice(0,10); }

function SelectorFecha({dia,planillas,ventas,noVisitas,onSeleccionar,onVolver}) {
  const fechas = getFechasDelAnio(dia);
  const hoy = hoyKey();
  const [mostrarTodas,setMostrarTodas] = useState(false);

  // Agrupar por mes
  const porMes = {};
  fechas.forEach(f=>{
    const mes = f.toLocaleDateString("es-AR",{month:"long",year:"numeric"});
    if(!porMes[mes]) porMes[mes]=[];
    porMes[mes].push(f);
  });

  const meses = Object.keys(porMes);
  const mesActual = new Date().toLocaleDateString("es-AR",{month:"long",year:"numeric"});
  const [mesAbierto,setMesAbierto] = useState(mesActual);

  const ventasPorFecha = {};
  ventas.filter(v=>v.dia===dia).forEach(v=>{
    const fk = v.fechaKey || v.fecha?.slice(0,10) || "";
    ventasPorFecha[fk] = (ventasPorFecha[fk]||0) + 1;
  });

  const visitasPorFecha = {};
  (noVisitas||[]).filter(v=>v.dia===dia).forEach(v=>{
    visitasPorFecha[v.fecha] = (visitasPorFecha[v.fecha]||0) + 1;
  });

  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Fechas de visita · {dia}</span>
      </div>
      <div style={{padding:"8px 16px"}}>
        <p style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:8}}>Seleccioná la fecha de reparto para comenzar o continuar la jornada.</p>
        {meses.map(mes=>{
          const abierto = mes===mesAbierto;
          return (
            <div key={mes} style={{marginBottom:8}}>
              <button style={{...s.card,margin:0,width:"100%",textAlign:"left",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:abierto?"var(--color-background-info)":"var(--color-background-secondary)"}}
                onClick={()=>setMesAbierto(abierto?null:mes)}>
                <span style={{fontSize:14,fontWeight:500,color:abierto?"var(--color-text-info)":"var(--color-text-primary)",textTransform:"capitalize"}}>{mes}</span>
                <span style={{color:"var(--color-text-tertiary)"}}>{abierto?"▲":"▼"}</span>
              </button>
              {abierto&&(
                <div style={{border:"0.5px solid var(--color-border-tertiary)",borderTop:"none",borderRadius:"0 0 12px 12px",overflow:"hidden"}}>
                  {porMes[mes].map(f=>{
                    const fk = fechaKey(f);
                    const planKey = `${dia}_${fk}`;
                    const tienePlanilla = !!planillas[planKey];
                    const nVentas = ventasPorFecha[fk]||0;
                    const nVisitas = visitasPorFecha[fk]||0;
                    const esHoy = fk===hoy;
                    return (
                      <button key={fk} style={{width:"100%",textAlign:"left",padding:"12px 16px",cursor:"pointer",border:"none",borderBottom:"0.5px solid var(--color-border-tertiary)",background:esHoy?"var(--color-background-success)":"var(--color-background-primary)",display:"flex",justifyContent:"space-between",alignItems:"center"}}
                        onClick={()=>onSeleccionar(fk,f)}>
                        <div>
                          <span style={{fontSize:14,fontWeight:esHoy?500:400,color:esHoy?"var(--color-text-success)":"var(--color-text-primary)",textTransform:"capitalize"}}>
                            {formatFecha(f)}{esHoy?" · Hoy":""}
                          </span>
                          <div style={{display:"flex",gap:6,marginTop:4}}>
                            {nVentas>0&&<span style={s.badge("success")}>{nVentas} entregas</span>}
                            {nVisitas>0&&<span style={s.badge("warning")}>{nVisitas} visitas s/venta</span>}
                            {tienePlanilla&&<span style={s.badge("info")}>planilla ✓</span>}
                          </div>
                        </div>
                        <span style={{color:"var(--color-text-tertiary)"}}>→</span>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
        {/* Fecha especial al final */}

      </div>
    </div>
  );
}

function StockGeneral({stock,setStock,clientes,ventas,productos,planillas,onVolver}) {
  const CAJON = 6;
  const [tab, setTab] = React.useState("stock");
  const [guardado, setGuardado] = React.useState(false);
  // Stock base editable (solo Sodería y Casa — se setea una vez)
  const [base, setBase] = React.useState(()=>({
    soderia:        {...stock?.soderia        ||{sifon:0,bidon10:0,bidon20:0}},
    soderia_vacios: {...stock?.soderia_vacios ||{sifon:0,bidon10:0,bidon20:0}},
    casa:           {...stock?.casa           ||{sifon:0,bidon10:0,bidon20:0}},
  }));
  const setB = (lugar,key,val) => setBase(b=>({...b,[lugar]:{...b[lugar],[key]:Number(val)||0}}));

  // Calcular lo vendido en total por día (desde todas las ventas registradas)
  const DIAS = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
  const prodKey = {"Sifón 1.5L":"sifon","Bidón 10L":"bidon10","Bidón 20L":"bidon20"};

  // Ventas de hoy (fechaKey = hoy)
  const hoy = new Date().toISOString().slice(0,10);
  const ventasHoy = ventas.filter(v=>v.fechaKey===hoy);

  // ¿El día ya fue cerrado?
  const diaCerradoHoy = DIAS.some(d=>!!planillas[`${d}_${hoy}`]?._diaCerrado);

  // Lo cargado hoy (de las planillas del día)
  const cargadoHoy = {sifon:0, bidon10:0, bidon20:0};
  DIAS.forEach(d=>{
    const p = planillas[`${d}_${hoy}`];
    if(p?.productos){
      cargadoHoy.sifon   += Number(p.productos.soda?.llenos||0);
      cargadoHoy.bidon10 += Number(p.productos.b10?.llenos||0);
      cargadoHoy.bidon20 += Number(p.productos.b20?.llenos||0);
    }
  });

  // Lo vendido hoy
  const vendidoHoy = {sifon:0, bidon10:0, bidon20:0};
  ventasHoy.forEach(v=>v.detalle.forEach(d=>{
    const k=prodKey[d.nombre]; if(k) vendidoHoy[k]+=d.cantidad;
  }));

  // En camión: valor real de Firebase (actualizado por InicioReparto/cerrarCamion)
  const enCamionHoy = diaCerradoHoy ? {sifon:0,bidon10:0,bidon20:0} : {
    sifon:   stock?.camion?.sifon   || 0,
    bidon10: stock?.camion?.bidon10 || 0,
    bidon20: stock?.camion?.bidon20 || 0,
  };

  // Sodería: valor real de Firebase
  const soCal = {
    sifon:   stock?.soderia?.sifon   || 0,
    bidon10: stock?.soderia?.bidon10 || 0,
    bidon20: stock?.soderia?.bidon20 || 0,
  };

  // Envases en clientes
  const envC = {sifon:0,bidon10:0,bidon20:0};
  clientes.forEach(c=>{envC.sifon+=(c.sifon||0);envC.bidon10+=(c.bidon10||0);envC.bidon20+=(c.bidon20||0);});
  ventas.forEach(v=>{
    (v.envPrest||[]).forEach(e=>{const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;if(k)envC[k]+=Number(e.cant)||0;});
    (v.envDev||[]).forEach(e=>{const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;if(k)envC[k]-=Number(e.cant)||0;});
  });

  const guardar = () => {
    setStock({soderia:base.soderia, soderia_vacios:base.soderia_vacios, casa:base.casa, camion:stock?.camion||{sifon:0,bidon10:0,bidon20:0}});
    setGuardado(true);
    setTimeout(()=>setGuardado(false),2000);
  };

  const Row = ({l,v,color})=>(
    <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
      <span style={{fontSize:13,color:"var(--color-text-secondary)"}}>{l}</span>
      <span style={{fontSize:13,fontWeight:500,color:color||"var(--color-text-primary)"}}>{v}</span>
    </div>
  );

  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>📦 Stock</span>
      </div>
      <div style={{display:"flex",gap:6,padding:"10px 14px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
        {[["stock","📦 Inventario"],["clientes","👥 Clientes"]].map(([t,l])=>(
          <button key={t} style={{...s.btn,flex:1,padding:"8px 4px",fontSize:13,fontWeight:tab===t?600:400,
            background:tab===t?"var(--color-background-secondary)":"transparent",
            borderBottom:tab===t?"2px solid #185FA5":"none",
            borderRadius:tab===t?"8px 8px 0 0":"8px",
            color:tab===t?"var(--color-text-primary)":"var(--color-text-secondary)"}}
            onClick={()=>setTab(t)}>{l}</button>
        ))}
      </div>

      <div style={{padding:14,overflowY:"auto"}}>
      {tab==="stock"&&(<>
        {/* Estado actual calculado */}
        <div style={{...s.card,margin:"0 0 12px",background:"var(--color-background-secondary)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:500,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:"0.05em"}}>📊 Estado actual (calculado)</div>
            {(stock?.camion?.sifon>0||stock?.camion?.bidon10>0||stock?.camion?.bidon20>0)&&(
              <button style={{...s.btn,fontSize:10,padding:"3px 8px",color:"var(--color-text-danger)",border:"1px solid var(--color-text-danger)"}}
                onClick={()=>{if(window.confirm("¿Limpiar camión? Solo si no hay reparto activo.")){setStock(prev=>({...prev,camion:{sifon:0,bidon10:0,bidon20:0}}));}}}>
                🔄 Limpiar camión
              </button>
            )}
          </div>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            {[["🏭 Sodería",[Math.floor(soCal.sifon/CAJON),soCal.bidon10,soCal.bidon20]],["🚚 En reparto",[Math.floor(enCamionHoy.sifon/CAJON),enCamionHoy.bidon10,enCamionHoy.bidon20]]].map(([titulo,vals])=>(
              <div key={titulo} style={{flex:1}}>
                <div style={{fontSize:10,color:titulo.includes("reparto")&&diaCerradoHoy?"#4dd9a0":"var(--color-text-tertiary)",marginBottom:4}}>
                  {titulo}{titulo.includes("reparto")&&diaCerradoHoy?" ✅":""}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {vals.map((v,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",background:"var(--color-background-tertiary)",borderRadius:6,padding:"4px 8px"}}>
                      <span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{["Caj","10L","20L"][i]}</span>
                      <span style={{fontSize:14,fontWeight:600,color:titulo.includes("reparto")&&diaCerradoHoy?"#4dd9a0":v<3?"var(--color-text-danger)":v<8?"var(--color-text-warning)":"var(--color-text-primary)"}}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
          {(cargadoHoy.sifon>0||cargadoHoy.bidon10>0||cargadoHoy.bidon20>0)&&(
            <div style={{fontSize:11,color:"var(--color-text-tertiary)",borderTop:"0.5px solid var(--color-border-tertiary)",paddingTop:6,marginTop:4}}>
              Hoy: cargado {Math.floor(cargadoHoy.sifon/CAJON)} caj · {cargadoHoy.bidon10} 10L · {cargadoHoy.bidon20} 20L
              {" / "}vendido {Math.floor(vendidoHoy.sifon/CAJON)} caj · {vendidoHoy.bidon10} 10L · {vendidoHoy.bidon20} 20L
            </div>
          )}
        </div>

        {/* Stock base editable — se setea una vez */}
        {[["soderia","🏭 Sodería (stock base llenos)"],["soderia_vacios","📦 Sodería (vacíos en depósito)"],["casa","🏠 Casa / Depósito"]].map(([lugar,titulo])=>(
          <div key={lugar} style={{...s.card,margin:"0 0 12px"}}>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:14,fontWeight:600,color:"var(--color-text-primary)"}}>{titulo}</div>
              <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}}>Modificá solo cuando ajustés físicamente el stock</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              <div>
                <label style={{...s.label,textAlign:"center",fontSize:11}}>Cajones soda</label>
                <input style={{...s.inputNum,textAlign:"center"}} type="number" min={0}
                  value={Math.floor((base[lugar]?.sifon||0)/CAJON)}
                  onChange={e=>{ const caj=Number(e.target.value)||0; const sueltos=(base[lugar]?.sifon||0)%CAJON; setB(lugar,"sifon",caj*CAJON+sueltos); }} />
                <div style={{fontSize:10,color:"var(--color-text-tertiary)",textAlign:"center",marginTop:2}}>{base[lugar]?.sifon||0} sifones</div>
              </div>
              <div>
                <label style={{...s.label,textAlign:"center",fontSize:11}}>Bidón 10L</label>
                <input style={{...s.inputNum,textAlign:"center"}} type="number" min={0} value={base[lugar]?.bidon10||0} onChange={e=>setB(lugar,"bidon10",e.target.value)} />
              </div>
              <div>
                <label style={{...s.label,textAlign:"center",fontSize:11}}>Bidón 20L</label>
                <input style={{...s.inputNum,textAlign:"center"}} type="number" min={0} value={base[lugar]?.bidon20||0} onChange={e=>setB(lugar,"bidon20",e.target.value)} />
              </div>
            </div>
          </div>
        ))}
        <button style={{...s.btnPrimary,background:guardado?"#0F6E56":undefined}} onClick={guardar}>
          {guardado?"✓ Guardado":"Guardar stock base"}
        </button>
      </>)}

      {tab==="clientes"&&(<>
        <div style={{...s.card,margin:"0 0 12px",background:"var(--color-background-secondary)"}}>
          <div style={{fontSize:11,fontWeight:500,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Total envases en clientes</div>
          <div style={{display:"flex",gap:8}}>
            {[[Math.floor(envC.sifon/CAJON),"caj",`${envC.sifon} sif`],[envC.bidon10,"10L",null],[envC.bidon20,"20L",null]].map(([v,u,sub])=>(
              <div key={u} style={{flex:1,background:"var(--color-background-tertiary)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:700,color:"var(--color-text-info)"}}>{v}</div>
                {sub&&<div style={{fontSize:10,color:"var(--color-text-tertiary)"}}>{sub}</div>}
                <div style={{fontSize:10,color:"var(--color-text-secondary)",marginTop:2}}>{u}</div>
              </div>
            ))}
          </div>
        </div>
        {clientes.filter(c=>{
          const vC=ventas.filter(v=>v.clienteId===c.id);
          const ex={sifon:0,bidon10:0,bidon20:0};
          vC.forEach(v=>{
            (v.envPrest||[]).forEach(e=>{const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;if(k)ex[k]+=Number(e.cant)||0;});
            (v.envDev||[]).forEach(e=>{const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;if(k)ex[k]-=Number(e.cant)||0;});
          });
          return ex.sifon>0||ex.bidon10>0||ex.bidon20>0;
        }).sort((a,b)=>{const dA=DIAS.indexOf(a.dia),dB=DIAS.indexOf(b.dia);return dA!==dB?dA-dB:(a.orden||9999)-(b.orden||9999);}).map(c=>{
          const vC=(todasVentas||ventas).filter(v=>v.clienteId===c.id);
          const extra={sifon:0,bidon10:0,bidon20:0};
          vC.forEach(v=>{
            (v.envPrest||[]).forEach(e=>{const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;if(k)extra[k]+=Number(e.cant)||0;});
            (v.envDev||[]).forEach(e=>{const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;if(k)extra[k]-=Number(e.cant)||0;});

                  {extra.bidon10>0&&<span style={{...s.tag,color:"var(--color-text-warning)"}}>+{extra.bidon10} 10L</span>}
                  {extra.bidon20>0&&<span style={{...s.tag,color:"var(--color-text-warning)"}}>+{extra.bidon20} 20L</span>}
                </div>
              </div>
            </div>
          );
        })}
        {clientes.filter(c=>{const vC=ventas.filter(v=>v.clienteId===c.id);const ex={sifon:0,bidon10:0,bidon20:0};vC.forEach(v=>{(v.envPrest||[]).forEach(e=>{const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;if(k)ex[k]+=Number(e.cant)||0;});(v.envDev||[]).forEach(e=>{const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;if(k)ex[k]-=Number(e.cant)||0;});});return ex.sifon>0||ex.bidon10>0||ex.bidon20>0;}).length===0&&
          <p style={{textAlign:"center",color:"var(--color-text-tertiary)",padding:"30px 0",fontSize:14}}>No hay clientes con envases prestados extra</p>}

function ConfirmacionesDia({dia,ventas,clientes,onConfirmar,onVolver}) {

    porCliente[v.clienteId].ventas.push(v);
  });
  const grupos = Object.values(porCliente);

                    <div style={{fontSize:12,color:"var(--color-text-secondary)",marginTop:2}}>{(v.detalle||[]).map(d=>`${d.nombre}×${d.cantidad}`).join(" · ")}</div>
                  </div>
                  <span style={{fontSize:16,fontWeight:500,color:"#f5b942"}}>{fmt(v.pagadoNum||v.neto||0)}</span>
                </div>
                <button style={{width:"100%",padding:"9px",borderRadius:8,border:"none",background:"#185FA5",color:"#e2eaf4",fontSize:13,fontWeight:500,cursor:"pointer"}}
                  onClick={()=>onConfirmar(v.id)}>✓ Confirmar transferencia</button>
              </div>
            ))}
          </div>
        ))}
        {fechasConf.length>0&&(
          <div style={{marginTop:8}}>
            <div style={{fontSize:10,color:"var(--color-text-tertiary)",fontWeight:500,textTransform:"uppercase",letterSpacing:"0.05em",margin:"8px 0 6px"}}>✓ Ya confirmadas</div>
            {fechasConf.map(fk=>{
              const vtsFecha=confirmadasPorFecha[fk];
              const totalFecha=vtsFecha.reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
              const open=!!abiertos[fk];
              return (
                <div key={fk} style={{...s.card,margin:"0 0 6px",background:"#0a2e1f",border:"0.5px solid #4dd9a0"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>toggleFecha(fk)}>
                    <div>
                      <div style={{fontSize:13,fontWeight:500,color:"#4dd9a0"}}>📅 {fk}</div>
                      <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:2}}>{vtsFecha.length} transferencia{vtsFecha.length!==1?"s":""}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:15,fontWeight:600,color:"#4dd9a0"}}>{fmt(totalFecha)}</div>
                      <div style={{fontSize:12,color:"var(--color-text-tertiary)",marginTop:2}}>{open?"▲":"▼"}</div>
                    </div>
                  </div>
                  {open&&<div style={{marginTop:10,borderTop:"0.5px solid rgba(77,217,160,0.2)",paddingTop:8}}>
                    {vtsFecha.map(v=>{
                      const c=clientes.find(x=>x.id===v.clienteId);
                      return (
                        <div key={v.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"0.5px solid rgba(77,217,160,0.15)"}}>
                          <div>
                            <div style={{fontSize:13,color:"var(--color-text-primary)"}}>{c?.nombre||"Cliente"}</div>
                            <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:1}}>{(v.detalle||[]).map(d=>`${d.nombre}×${d.cantidad}`).join(" · ")}</div>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                            <div style={{fontSize:13,fontWeight:500,color:"#4dd9a0"}}>{fmt(v.pagadoNum||v.neto||0)}</div>
                            <button style={{fontSize:10,color:"var(--color-text-tertiary)",background:"none",border:"none",cursor:"pointer",padding:"2px 0",textDecoration:"underline"}} onClick={()=>onConfirmar(v.id)}>desmarcar</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function MenuRepartos({repartos,clientes,ventas,onSeleccionar,onConfig,onResumen,onStock,onAgenda,onVolver,darkMode,onToggleDark,saveRepartos,onOperarReparto,onTodosClientes}) {
  const [modoNuevo, setModoNuevo] = React.useState(false);
  const [editandoId, setEditandoId] = React.useState(null);
  const [form, setForm] = React.useState({numero:"",repartidorNombre:"",codigo:""});

  const genCodigo = () => {
    const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join("");
  };

  const guardarReparto = () => {
    if(!form.numero||!form.repartidorNombre){alert("Completá número y nombre");return;}
    const codUpper=(form.codigo||genCodigo()).toUpperCase();
    if(editandoId){
      saveRepartos(repartos.map(r=>r.id===editandoId?{...r,...form,codigo:codUpper}:r));
    } else {
      const nuevo={id:Date.now(),numero:Number(form.numero),repartidorNombre:form.repartidorNombre.trim(),codigo:codUpper,nombre:`Reparto ${form.numero}`};
      saveRepartos([...repartos,nuevo].sort((a,b)=>a.numero-b.numero));
    }
    setModoNuevo(false);setEditandoId(null);setForm({numero:"",repartidorNombre:"",codigo:""});
  };

  const eliminarReparto = (id) => {
    if(!window.confirm("¿Eliminar este reparto?")) return;
    saveRepartos(repartos.filter(r=>r.id!==id));
  };

  const clientesPorReparto = (repId) => clientes.filter(c=>c.repartoId===repId);
  const deudaPorReparto = (repId) => clientes.filter(c=>c.repartoId===repId&&c.saldo<0).reduce((a,c)=>a+Math.abs(c.saldo),0);
  const deudoresCount = (repId) => clientes.filter(c=>c.repartoId===repId&&c.saldo<0).length;

  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Sistema de Reparto Multi</span>
        <button style={{...s.btn,padding:"5px 10px",fontSize:18,lineHeight:1}} onClick={onToggleDark}>{darkMode?"☀":"🌙"}</button>
      </div>

      {/* Barra de acciones */}
      <div style={{padding:"10px 14px 6px",display:"flex",gap:8,alignItems:"center"}}>
        <span style={{fontSize:13,fontWeight:600,color:"var(--color-text-primary)",flex:1}}>
          📋 {repartos.length} reparto{repartos.length!==1?"s":""}
        </span>
        <button style={{...s.btn,padding:"7px 14px",fontSize:12,background:"#185FA5",color:"#e2eaf4",border:"none"}}
          onClick={()=>{setForm({numero:String(repartos.length+1),repartidorNombre:"",codigo:genCodigo()});setModoNuevo(true);setEditandoId(null);}}>
          + Nuevo reparto
        </button>
      </div>

      {/* Formulario nuevo/editar */}
      {(modoNuevo||editandoId)&&(
        <div style={{...s.card,margin:"0 14px 10px",borderLeft:"3px solid #185FA5"}}>
          <div style={{fontSize:14,fontWeight:600,color:"var(--color-text-primary)",marginBottom:12}}>
            {editandoId?"Editar reparto":"Nuevo reparto"}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:8,marginBottom:8}}>
            <div>
              <label style={s.label}>Número</label>
              <input style={s.input} type="number" min={1} placeholder="1" value={form.numero}
                onChange={e=>setForm(f=>({...f,numero:e.target.value}))}/>
            </div>
            <div>
              <label style={s.label}>Nombre del repartidor</label>
              <input style={s.input} placeholder="Ej: Juan Pérez" value={form.repartidorNombre}
                onChange={e=>setForm(f=>({...f,repartidorNombre:e.target.value}))}/>
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <label style={s.label}>Código de acceso del repartidor</label>
            <div style={{display:"flex",gap:8}}>
              <input style={{...s.input,fontFamily:"monospace",fontSize:18,fontWeight:700,letterSpacing:"0.15em",flex:1,textTransform:"uppercase"}}
                placeholder="XXXX" maxLength={6} value={form.codigo}
                onChange={e=>setForm(f=>({...f,codigo:e.target.value.toUpperCase()}))}/>
              <button style={{...s.btn,padding:"8px 12px",fontSize:12,whiteSpace:"nowrap"}}
                onClick={()=>setForm(f=>({...f,codigo:genCodigo()}))}>🎲 Generar</button>
            </div>
            <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:3}}>El repartidor usa este código para entrar</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={{...s.btn,flex:1}} onClick={()=>{setModoNuevo(false);setEditandoId(null);}}>Cancelar</button>
            <button style={{...s.btnPrimary,flex:2,padding:"10px"}} onClick={guardarReparto}>
              {editandoId?"Guardar cambios":"Crear reparto"}
            </button>
          </div>
        </div>
      )}

      {/* Lista de repartos */}
      {repartos.length===0&&!modoNuevo&&(
        <div style={{textAlign:"center",padding:"50px 20px",color:"var(--color-text-tertiary)"}}>
          <div style={{fontSize:48,marginBottom:12}}>🚚</div>
          <div style={{fontSize:16,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:6}}>Sin repartos aún</div>
          <div style={{fontSize:13}}>Tocá "+ Nuevo reparto" para empezar</div>
        </div>
      )}

      <div style={{padding:"0 14px"}}>
        {[...repartos].sort((a,b)=>a.numero-b.numero).map(rep=>{
          const nCli=clientesPorReparto(rep.id).length;
          const deuda=deudaPorReparto(rep.id);
          const nDeudores=deudoresCount(rep.id);
          return (
            <div key={rep.id} style={{marginBottom:10}}>
              {editandoId===rep.id ? null : (
                <button style={{...s.card,width:"100%",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:12,padding:"16px",margin:0,
                  background:"var(--color-background-secondary)"}}
                  onClick={()=>onSeleccionar(rep)}>
                  {/* Número del reparto */}
                  <div style={{width:52,height:52,borderRadius:14,background:"#185FA5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800,color:"#fff",flexShrink:0}}>
                    {rep.numero}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:16,fontWeight:700,color:"var(--color-text-primary)",marginBottom:3}}>
                      {rep.repartidorNombre}
                    </div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>{nCli} cliente{nCli!==1?"s":""}</span>
                      {nDeudores>0&&<span style={s.badge("danger")}>{nDeudores} deben {fmt(deuda)}</span>}
                      {nDeudores===0&&nCli>0&&<span style={s.badge("success")}>✓ Sin deudas</span>}
                    </div>
                    <div style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:3,fontFamily:"monospace",letterSpacing:"0.1em"}}>
                      Código: {rep.codigo}
                    </div>
                  </div>
                  <span style={{color:"var(--color-text-tertiary)",fontSize:20}}>→</span>
                </button>
              )}
              {/* Botones editar/eliminar/operar */}
              <div style={{display:"flex",gap:6,marginTop:4,justifyContent:"flex-end"}}>
                <button style={{...s.btn,fontSize:11,padding:"4px 10px",background:"rgba(24,95,165,0.2)",color:"#5daaff",border:"1px solid rgba(93,170,255,0.4)"}}
                  onClick={()=>onOperarReparto&&onOperarReparto(rep)}>
                  🚐 Operar
                </button>
                <button style={{...s.btn,fontSize:11,padding:"4px 10px"}}
                  onClick={e=>{e.stopPropagation();setForm({numero:String(rep.numero),repartidorNombre:rep.repartidorNombre,codigo:rep.codigo});setEditandoId(rep.id);setModoNuevo(false);}}>
                  ✏️ Editar
                </button>
                <button style={{...s.btn,fontSize:11,padding:"4px 10px",background:"rgba(220,38,38,0.15)",color:"var(--color-text-danger)"}}
                  onClick={()=>eliminarReparto(rep.id)}>
                  🗑 Eliminar
                </button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Botones del menú */}
      <div style={s.divider} />
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,padding:"0 14px 20px"}}>
        {[["📊","Resumen",onResumen],["📦","Stock",onStock],["📅","Agenda",onAgenda],["👥","Clientes",onTodosClientes],["⚙️","Config",onConfig]].map(([ico,lbl,fn])=>(
          <button key={lbl} onClick={fn} style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,padding:"14px 6px",borderRadius:12,cursor:"pointer",border:"2px solid transparent",background:"var(--color-background-tertiary)",boxShadow:"0 3px 6px rgba(0,0,0,0.3)",color:"var(--color-text-secondary)"}}>
            <span style={{fontSize:22}}>{ico}</span>
            <span style={{fontSize:11,fontWeight:500,color:"var(--color-text-primary)"}}>{lbl}</span>
          </button>
        ))}
      </div>
    </div>
  );
}


function MenuDias({dias,reparto,onDia,onResumen,onConfig,onGestionClientes,onPromocion,onStock,onAgenda,onVolver,darkMode,onToggleDark,transferenciasPendientes,recordatoriosActivos,onConfirmarRecordatorio,onVerConfirmaciones,clientes,ventas,stock,zonasReparto,onSetZona}) {
  const [editandoZona, setEditandoZona] = React.useState(null);
  return (
    <div style={s.screen}>
      <div style={s.header}>
        <button style={s.backBtn} onClick={onVolver}>← Volver</button>
        <span style={s.headerTitle}>Sistema de Reparto 2026 · Multi</span>
        <button style={{...s.btn,padding:"5px 10px",fontSize:18,lineHeight:1}} onClick={onToggleDark}>{darkMode?"☀":"🌙"}</button>
      </div>
      
      
      {recordatoriosActivos&&recordatoriosActivos.length>0&&(
        <div style={{margin:"8px 14px 4px"}}>
          <div style={{fontSize:11,fontWeight:500,color:"#5daaff",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>🔔 Recordatorios pendientes</div>
          {recordatoriosActivos.slice(0,5).map(r=>(
            <div key={r.id} style={{...s.card,margin:"0 0 6px",background:"#1e2e4a",border:"0.5px solid #5daaff",display:"flex",gap:8,alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:500,color:"#5daaff"}}>{r.clienteNombre} · {r.dia}</div>
                <div style={{fontSize:12,color:"var(--color-text-primary)",marginTop:2}}>{r.motivo}</div>
                <div style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:2}}>{r.fecha}{r.hora?` · ${r.hora}`:""}</div>
              </div>
              <button style={{background:"#4dd9a0",color:"#0a2e1f",border:"none",borderRadius:6,padding:"4px 8px",fontSize:11,fontWeight:600,cursor:"pointer",flexShrink:0,marginTop:2}}
                onClick={()=>onConfirmarRecordatorio&&onConfirmarRecordatorio(r.id)}>✓</button>
            </div>
          ))}
          {recordatoriosActivos.length>5&&<div style={{fontSize:11,color:"var(--color-text-tertiary)",textAlign:"center"}}>+{recordatoriosActivos.length-5} más</div>}
        </div>
      )}
      {transferenciasPendientes&&transferenciasPendientes.length>0&&(
        <div style={{margin:"8px 14px 4px"}}>
          <div style={{fontSize:11,fontWeight:500,color:"#f5b942",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>🔴 Transferencias sin confirmar</div>
          {transferenciasPendientes.map(({dia,fecha,count,monto,ventas:vts})=>(
            <button key={dia+fecha} style={{...s.card,width:"100%",margin:"0 0 6px",background:"#1e3a5f",border:"1px solid #f5b942",display:"flex",alignItems:"center",gap:10,cursor:"pointer",textAlign:"left"}}
              onClick={()=>onVerConfirmaciones&&onVerConfirmaciones(dia)}>
              <span style={{fontSize:18}}>🔴</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500,color:"#f5b942"}}>{dia} · {count} transfer. sin confirmar</div>
                <div style={{fontSize:11,color:"var(--color-text-secondary)",marginTop:2}}>{vts.slice(0,3).map(v=>v.cliente).join(", ")}{vts.length>3?` +${vts.length-3} más`:""}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:13,fontWeight:500,color:"#f5b942"}}>{fmt(monto)}</div>
                <div style={{fontSize:10,color:"var(--color-text-tertiary)"}}>{fecha}</div>
              </div>
            </button>
          ))}
        </div>
      )}
      <span style={s.sectionTitle}>Días de reparto</span>
      <div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:8}}>
        {dias.map((d,idx)=>{
          const deudas = (clientes||[]).filter(c=>c.dia===d&&c.saldo<0);
          const totalDeuda = deudas.reduce((a,c)=>a+Math.abs(c.saldo),0);
          const totalClientes = (clientes||[]).filter(c=>c.dia===d).length;
          const zona = (zonasReparto||{})[d] || "";
          return (<React.Fragment key={d}>
          <button style={{...s.card,margin:0,textAlign:"left",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px"}} onClick={()=>onDia(d)}>
            <div style={{flex:1,minWidth:0}}>
              {/* Línea 1: Día · Zona */}
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                <span style={{fontSize:15,fontWeight:500,color:"var(--color-text-primary)"}}>{d}</span>
                {zona&&<>
                  <span style={{fontSize:15,fontWeight:500,color:"var(--color-text-primary)"}}>·</span>
                  <span style={{fontSize:15,fontWeight:500,color:"var(--color-text-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{zona}</span>
                </>}
                {!zona&&<span style={{fontSize:12,color:"var(--color-text-tertiary)",fontStyle:"italic",cursor:"pointer"}} onClick={e=>{e.stopPropagation();setEditandoZona(d);}}>+ zona</span>}
              </div>
              {/* Línea 2: deuda a la izquierda, clientes a la derecha */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                {totalDeuda>0
                  ?<span style={{fontSize:12,color:"var(--color-text-danger)"}}>⚠ {deudas.length} cliente{deudas.length>1?"s":""} {deudas.length>1?"deben":"debe"} {fmt(totalDeuda)}</span>
                  :<span style={{fontSize:12,color:"var(--color-text-success)"}}>✓ Sin deudas</span>
                }
                <span style={{fontSize:12,color:"var(--color-text-tertiary)"}}>{totalClientes} cliente{totalClientes!==1?"s":""}</span>
              </div>
            </div>
            <span style={{color:"var(--color-text-tertiary)",fontSize:18,marginLeft:10}}>→</span>
          </button>
          {/* Modal inline editar zona */}
          {editandoZona===d&&(
            <div style={{background:"var(--color-background-secondary)",border:"0.5px solid var(--color-border-secondary)",borderRadius:10,padding:"10px 14px",marginTop:2}} onClick={e=>e.stopPropagation()}>
              <div style={{fontSize:12,color:"var(--color-text-secondary)",marginBottom:6}}>Zona de reparto del {d}</div>
              <div style={{display:"flex",gap:8}}>
                <input id={`zona-${d}`} style={s.input} defaultValue={zona} placeholder="Ej: Lomas de Tafí" autoFocus />
                <button style={{...s.btnPrimary,padding:"6px 14px",fontSize:13,whiteSpace:"nowrap"}} onClick={()=>{
                  const v=document.getElementById(`zona-${d}`).value.trim();
                  onSetZona(d,v);
                  setEditandoZona(null);
                }}>OK</button>
                <button style={{...s.btn,padding:"6px 10px",fontSize:13}} onClick={()=>setEditandoZona(null)}>✕</button>
              </div>
            </div>
          )}
          {zona&&editandoZona!==d&&(
            <div style={{textAlign:"right",marginTop:2,marginBottom:2}}>
              <span style={{fontSize:10,color:"var(--color-text-tertiary)",cursor:"pointer",textDecoration:"underline"}} onClick={e=>{e.stopPropagation();setEditandoZona(d);}}>editar zona</span>
            </div>
          )}
          {idx===dias.length-1&&stock&&(
            (()=>{
              const CAJON=6;
              const sCaj=Math.floor((stock.soderia?.sifon||0)/CAJON);
              const cCaj=Math.floor((stock.casa?.sifon||0)/CAJON);
              const sB10=stock.soderia?.bidon10||0, cB10=stock.casa?.bidon10||0;
              const sB20=stock.soderia?.bidon20||0, cB20=stock.casa?.bidon20||0;
              const envC={sifon:0,bidon10:0,bidon20:0};
              (clientes||[]).forEach(c=>{envC.sifon+=(c.sifon||0);envC.bidon10+=(c.bidon10||0);envC.bidon20+=(c.bidon20||0);});
              (ventas||[]).forEach(v=>{
                (v.envPrest||[]).forEach(e=>{const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;if(k)envC[k]+=Number(e.cant)||0;});
                (v.envDev||[]).forEach(e=>{const k=e.prod==="Sifón 1.5L"?"sifon":e.prod==="Bidón 10L"?"bidon10":e.prod==="Bidón 20L"?"bidon20":null;if(k)envC[k]-=Number(e.cant)||0;});
              });
              const envCCaj=Math.floor(envC.sifon/CAJON);
              const totCaj=sCaj+cCaj+envCCaj, totB10=sB10+cB10+envC.bidon10, totB20=sB20+cB20+envC.bidon20;
              const StockCard = ()=>{
                const [open,setOpen]=React.useState(false);
                return (
                  <div style={{...s.card,margin:"4px 0 0",background:"var(--color-background-secondary)",border:"0.5px solid var(--color-border-secondary)"}}>
                    {/* Header siempre visible — toca para desplegar */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setOpen(o=>!o)}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:13,fontWeight:500,color:"var(--color-text-primary)"}}>📦 Stock</span>
                        {/* Resumen compacto siempre visible */}
                        <div style={{display:"flex",gap:6}}>
                          {[[totCaj,"caj"],[totB10,"10L"],[totB20,"20L"]].map(([v,u],i)=>(
                            <span key={i} style={{fontSize:12,fontWeight:600,color:Number(v)<3?"var(--color-text-danger)":Number(v)<8?"var(--color-text-warning)":"var(--color-text-info)"}}>{v}<span style={{fontSize:10,fontWeight:400,color:"var(--color-text-tertiary)",marginLeft:1}}>{u}</span></span>
                          ))}
                        </div>
                      </div>
                      <span style={{fontSize:13,color:"var(--color-text-tertiary)",transition:"transform 0.2s",display:"inline-block",transform:open?"rotate(180deg)":"rotate(0deg)"}}>▾</span>
                    </div>
                    {/* Detalle desplegable */}
                    {open&&<div style={{marginTop:12}}>
                      {[["🏭 Sodería",[sCaj,sB10,sB20],"primary"],["👥 En clientes",[envCCaj,envC.bidon10,envC.bidon20],"info"],["📦 Total general",[totCaj,totB10,totB20],"info"]].map(([titulo,vals,color],gi)=>(
                        <div key={gi} style={{marginBottom:gi<2?10:0}}>
                          <div style={{fontSize:10,color:"var(--color-text-tertiary)",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>{titulo}</div>
                          <div style={{display:"flex",gap:6}}>
                            {vals.map((v,i)=>(
                              <div key={i} style={{textAlign:"center",flex:1,background:gi===2?"#1e3a5f":"var(--color-background-tertiary)",borderRadius:8,padding:"6px 4px",border:gi===2?"0.5px solid var(--color-border-info)":"none"}}>
                                <div style={{fontSize:18,fontWeight:gi===2?700:600,color:gi===0?(Number(v)<3?"var(--color-text-danger)":Number(v)<8?"var(--color-text-warning)":"var(--color-text-primary)"):`var(--color-text-${color})`}}>{v}</div>
                                <div style={{fontSize:10,color:"var(--color-text-tertiary)"}}>{["caj","10L","20L"][i]}</div>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                      <button style={{...s.btn,width:"100%",marginTop:10,fontSize:12,padding:"7px"}} onClick={e=>{e.stopPropagation();onStock();}}>Editar stock →</button>
                    </div>}
                  </div>
                );
              };
              return <StockCard/>;
            })()
          )}
          </React.Fragment>);
        })}
        <div style={s.divider} />
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,paddingBottom:8}}>
          {[
            ["👥","Clientes",onGestionClientes],
            ["📦","Stock",onStock],
            ["🚀","Promoción",onPromocion],
            ["📅","Agenda",onAgenda],
            ["📊","Resumen",onResumen],
            ["⚙️","Config",onConfig],
          ].map(([ico,lbl,fn])=>(
            <button key={lbl} onClick={fn} style={{
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,
              padding:"14px 6px",borderRadius:12,cursor:"pointer",
              border:"2px solid transparent",
              background:"var(--color-background-tertiary)",
              boxShadow:"0 3px 6px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.06) inset",
              color:"var(--color-text-secondary)",
              transition:"all 0.15s",
            }}>
              <span style={{fontSize:22}}>{ico}</span>
              <span style={{fontSize:11,fontWeight:500,color:"var(--color-text-primary)",textAlign:"center"}}>{lbl}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function PlanillaDelDia({dia,fecha,ventas,clientes,planilla,productos,stock,setStock,syncData,onGuardar,onVolver,onCerrarDia}) {
  // Separar ventas del día propio vs ventas de clientes de otro día
  const clientesDia = new Set((clientes||[]).filter(c=>c.dia===dia).map(c=>c.id));
  const ventasPropias  = ventas.filter(v=>clientesDia.has(v.clienteId));
  const ventasExtraDia = ventas.filter(v=>!clientesDia.has(v.clienteId));
  // Auto-calcular desde ventas del dia
  const CAJON_SODA = 6;
  const getProdCosto = (nombre) => { const p=(productos||[]).find(x=>x.nombre===nombre); return p?(p.costo||0):0; };
  const costSifon  = getProdCosto("Sifón 1.5L") || 133.33;
  const costB10    = getProdCosto("Bidón 10L")   || 800;
  const costB20    = getProdCosto("Bidón 20L")   || 1100;
  const COSTO_CAJON_SODA = costSifon * CAJON_SODA;
  const prodKey = {"Bidón 10L":"b10","Bidón 20L":"b20","Sifón 1.5L":"soda"};
  // Solo ventas de clientes propios del día
  const totalesPorProd = {b10:{vacios:0,plata:0,llenar:0},b20:{vacios:0,plata:0,llenar:0},soda:{vacios:0,plata:0,llenar:0,cajones:0}};
  ventasPropias.forEach(v=>{ v.detalle.forEach(d=>{ const k=prodKey[d.nombre]; if(!k) return; totalesPorProd[k].vacios+=d.cantidad; totalesPorProd[k].plata+=d.total; }); });
  const sodaCajones = Math.floor(totalesPorProd.soda.vacios/CAJON_SODA)||0;
  totalesPorProd.soda.cajones = sodaCajones;
  totalesPorProd.soda.llenar  = sodaCajones * COSTO_CAJON_SODA;
  totalesPorProd.b10.llenar   = totalesPorProd.b10.vacios * costB10;
  totalesPorProd.b20.llenar   = totalesPorProd.b20.vacios * costB20;
  const pesoAuto = Math.round(sodaCajones*10.8 + totalesPorProd.b10.vacios*10.5 + totalesPorProd.b20.vacios*20.5);
  const totalVentaPlata  = Object.values(totalesPorProd).reduce((a,p)=>a+p.plata,0);
  const totalVentaLlenar = Object.values(totalesPorProd).reduce((a,p)=>a+p.llenar,0);
  // Totales ventas de otros días
  const extraEfectivo = ventasExtraDia.filter(v=>v.pago==="contado").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
  const extraTrans    = ventasExtraDia.filter(v=>v.pago==="transferencia").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
  const extraFiado    = ventasExtraDia.filter(v=>v.pago==="fiado").reduce((a,v)=>a+(v.neto||0),0);
  const extraTotal    = extraEfectivo + extraTrans + extraFiado;
  // Cobranza — solo ventas propias del día
  const cobEfectivo   = ventasPropias.filter(v=>v.pago==="contado").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
  const cobTransBruto = ventasPropias.filter(v=>v.pago==="transferencia").reduce((a,v)=>a+(v.pagadoNum||v.neto||0),0);
  const cobTransDesc  = Math.round(cobTransBruto*0.025);
  const cobTransNeto  = cobTransBruto - cobTransDesc;
  const ventasPendTrans = ventas.filter(v=>v.pago==="transferencia"&&!v.transConfirmada);
  const cobFiado      = ventasPropias.filter(v=>v.pago==="fiado").reduce((a,v)=>a+(v.neto||0),0);
  const cobSaldosEfec  = ventasPropias.filter(v=>v.pago==="contado").reduce((a,v)=>{ const extra=(v.pagadoNum||0)-(v.neto||0); return a+(extra>0?extra:0); },0);
  const cobSaldosTrans = ventasPropias.filter(v=>v.pago==="transferencia").reduce((a,v)=>{ const extra=(v.pagadoNum||0)-(v.neto||0); return a+(extra>0?extra:0); },0);
  const cobSaldos      = cobSaldosEfec + cobSaldosTrans;
