  <script>
    if('serviceWorker' in navigator){
      const CACHE = 'sr2026-v22';
      const ASSETS = [
        'https://unpkg.com/react@18/umd/react.production.min.js',
        'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
        'https://unpkg.com/@babel/standalone@7.26.4/babel.min.js',
        'https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js',
        'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js',
        './','./index.html',
        './js/01-temas.js','./js/02-constantes.js','./js/03-utils.js','./js/04-pdf.js',
        './js/05-licencias.js','./js/06-portada.js','./js/07-stock.js','./js/08-menu.js',
        './js/09-clientes.js','./js/10-ventas.js','./js/11-promocion.js','./js/12-gestion.js',
        './js/13-resumen.js','./js/14-roles.js','./js/15-config.js','./js/16-extras.js','./js/17-app.js',
      ];
      const sw = `
const CACHE='${CACHE}';
const ASSETS=${JSON.stringify(ASSETS)};
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting()));
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>clients.claim()));
});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET') return;
  e.respondWith(
    caches.match(e.request).then(cached=>{
      const net = fetch(e.request).then(res=>{
        if(res.ok) caches.open(CACHE).then(c=>c.put(e.request,res.clone()));
        return res;
      }).catch(()=>cached);
      return cached||net;
    })
  );
});
self.addEventListener('push',e=>{
  const d=e.data?e.data.json():{};
  e.waitUntil(self.registration.showNotification(d.title||'Notificación',{
    body:d.body||'',tag:d.tag||'default',requireInteraction:!!d.requireInteraction
  }));
});
self.addEventListener('notificationclick',e=>{
  e.notification.close();
  e.waitUntil(clients.matchAll({type:'window'}).then(cs=>{
    if(cs.length>0){cs[0].focus();return;}
    clients.openWindow('/');
  }));
});`;
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    }

    // ── Helpers licencia ─────────────────────────────────────────────
    function getLicenciaRM() {
      try { return JSON.parse(localStorage.getItem("rm_licencia")||"null"); } catch { return null; }
    }
    window.getLicenciaRM = getLicenciaRM;

    const EMAIL_ENDPOINT = "https://script.google.com/macros/s/AKfycbzmNoGW8yrdtUTjGUhLym67rDfRc9-h4FtYqFWkOEojkIYnDGEy13gt1704S74YU9xj/exec";
    const EMAIL_TOKEN = "Emma131017";
    window.EMAIL_ENDPOINT = EMAIL_ENDPOINT;
    window.EMAIL_TOKEN = EMAIL_TOKEN;
    window.enviarEmailBrevoRM = async function({to, toName, subject, htmlContent}) {
      try {
        await fetch(EMAIL_ENDPOINT, {
          method:"POST",
          body:JSON.stringify({token:EMAIL_TOKEN, to, toName:toName||to, subject, htmlContent})
        });
        return true;
      } catch(e) { console.error("Email error:", e); return false; }

    function getUserProfile(uid) {
      if(!window.db) return Promise.resolve(null);
      return window.db.collection("users").doc(uid).get()
        .then(function(doc){ return doc.exists ? doc.data() : null; })
        .catch(function(){ return null; });
    }
    function saveUserProfile(uid, data) {
      if(!window.db) return Promise.resolve();
      return window.db.collection("users").doc(uid).set(data, {merge:true});
    }
    function crearNegocio(uid, nombre, email) {
      if(!window.db) return Promise.resolve(null);
      // ▶ Usar nombre limpio como ID para que sea legible en Firebase
      var idLimpio = nombre.toLowerCase()
        .normalize("NFD").replace(/[̀-ͯ]/g,"")
        .replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")
        .slice(0,40) || ("negocio-"+Date.now());
      var ref = window.db.collection("negocios").doc(idLimpio);
      return ref.set({ nombre:nombre, ownerId:uid, email:email||"", creadoEn:new Date().toISOString() })
        .then(function(){ return ref.id; });
    }

    function actualizarEmailNegocio(negocioId, email) {
      if(!window.db || !negocioId || !email) return Promise.resolve();
      return window.db.collection("negocios").doc(negocioId).update({email:email}).catch(function(){});
    }
    function crearInvitacion(negocioId, nombre, sectores, codigoParam) {
      if(!window.db) return Promise.resolve(null);
      var codigo = codigoParam || (function(){
        var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        return Array.from({length:6}, function(){ return chars[Math.floor(Math.random()*chars.length)]; }).join("");
      })();
      // ▶ Guardar DENTRO del negocio: negocios/{negocioId}/repartidores/{codigo}
      return window.db.collection("negocios").doc(negocioId)
        .collection("repartidores").doc(codigo).set({
          negocioId: negocioId, nombre: nombre, sectores: sectores||[],
          activo: true, activado: false, deviceId: "",
          creadoEn: new Date().toISOString()
        }).then(function(){ return {codigo: codigo}; });
    }
    function listarInvitaciones(negocioId) {

        .collection("repartidores").where("activo","==",true).get()
        .then(function(snap){
          var r=[];
          snap.forEach(function(d){ r.push({codigo:d.id,...d.data()}); });
          return r;
        })
        .catch(function(){ return []; });
    }
    function canjearInvitacion(uid, email, codigo) {
      if(!window.db) return Promise.resolve({ok:false, msg:"Sin conexión"});
      // ▶ Buscar el código en TODOS los negocios (búsqueda por collectionGroup)
      return window.db.collectionGroup("repartidores")
        .where(firebase.firestore.FieldPath.documentId(),"==",codigo).get()
        .then(function(snap){
          if(snap.empty) return {ok:false, msg:"Código inválido. Pedile al dueño que verifique tu código de 6 letras."};
          var doc = snap.docs[0];
          var d = doc.data();
          if(!d.activo) return {ok:false, msg:"Este acceso fue desactivado por el dueño."};
          return doc.ref.update({deviceId: uid, activado: true, usadoEn: new Date().toISOString()})
            .then(function(){
              return {ok:true, negocioId: d.negocioId, nombre: d.nombre||"Repartidor", sectores: d.sectores||[]};
            });
        }).catch(function(e){ return {ok:false, msg:"Error al verificar el código. Intentá de nuevo."}; });
    }
    function listarRepartidores(negocioId) {
      if(!window.db) return Promise.resolve([]);
      // ▶ Leer DENTRO del negocio: negocios/{negocioId}/repartidores/
      return window.db.collection("negocios").doc(negocioId)
        .collection("repartidores").where("activo","==",true).get()
        .then(function(snap){ var r=[]; snap.forEach(function(d){ r.push({uid:d.id,...d.data()}); }); return r; })
        .catch(function(){ return []; });
    }
    function eliminarRepartidor(uid) {
      if(!window.db) return Promise.resolve();
      return window.db.collection("users").doc(uid).delete();
    }
    // ── Almacenamiento por reparto ───────────────────────────────────
    // Cada reparto (cada repartidor) tiene su PROPIO documento en Firestore,
    // separado del resto. Lo que es del negocio entero (catálogo de
    // productos, lista de repartos, depósito compartido, etc.) vive en un
    // único documento "compartido". Así, guardar algo de un reparto nunca
    // puede tocar el documento de otro reparto — antes todo vivía junto en
    // un solo paquete grande y un guardado podía pisar datos ajenos.
    function negocioCol(negocioId) {
      // Colección vieja: se sigue usando SOLO para las notificaciones push
      // y el archivo histórico de ventas viejas (no tiene que ver con el
      // problema de mezcla entre repartidores).
      return window.db.collection("negocios").doc(negocioId).collection("datos");
    }
    function pathCompartido(negocioId) {
      return window.db.collection("negocios").doc(negocioId).collection("compartido").doc("general");
    }
    function pathReparto(negocioId, repartoId) {
      var rid = repartoId || "_sinreparto";
      return window.db.collection("negocios").doc(negocioId).collection("repartos").doc(rid).collection("datos").doc("info");
    }

    function cloudSave(data, uid, negocioId, codigoRepartidor) {
      if(!window.db || !negocioId) return Promise.resolve(false);

      var stockObj = data.stock || {};
      var compartido = {
        productos: data.productos || [],
        zonasReparto: data.zonasReparto || {},
        repartos: data.repartos || [],
        mantVeh: data.mantVeh || [],
        histPrecios: data.histPrecios || [],
        negocio: data.negocio || {},
        stockGeneral: {
          soderia: stockObj.soderia || {},
          soderia_vacios: stockObj.soderia_vacios || {},
          casa: stockObj.casa || {}
        }
      };
      if(data.horaAvisoCierre !== undefined)  compartido.horaAvisoCierre  = data.horaAvisoCierre;
      if(data.horasAvisoTrans !== undefined)  compartido.horasAvisoTrans  = data.horasAvisoTrans;
      if(data.diasAvisoMant !== undefined)    compartido.diasAvisoMant    = data.diasAvisoMant;

      // Mapa clienteId -> repartoId, para poder ubicar ventas y noVisitas
      // (no llevan repartoId propio, pero sí clienteId).
      var clientesPorId = {};
      (data.clientes||[]).forEach(function(c){ clientesPorId[c.id] = c; });

      // Los recordatorios llevan "paraRepartidor" (nombre, no id). Se
      // resuelve contra la lista de repartos; si no matchea a nadie es un
      // recordatorio del propio dueño → balde especial "_dueno".
      var repartoPorNombre = {};
      (data.repartos||[]).forEach(function(r){ if(r.repartidorNombre) repartoPorNombre[r.repartidorNombre] = r.id; });

      var porReparto = {};
      function bucket(rid) {
        var k = rid || "_sinreparto";
        if(!porReparto[k]) porReparto[k] = {clientes:[],ventas:[],noVisitas:[],recordatorios:[],prospectos:[],planillas:{},cargasDia:null,stockCamion:null};
        return porReparto[k];
      }

      (data.clientes||[]).forEach(function(c){ bucket(c.repartoId).clientes.push(c); });
      (data.ventas||[]).forEach(function(v){
        var cli = clientesPorId[v.clienteId];
        bucket(cli && cli.repartoId).ventas.push(v);
      });
      (data.noVisitas||[]).forEach(function(v){
        var cli = clientesPorId[v.clienteId];
        bucket(cli && cli.repartoId).noVisitas.push(v);
      });
      (data.prospectos||[]).forEach(function(p){ bucket(p.repartoId).prospectos.push(p); });
      (data.recordatorios||[]).forEach(function(r){
        var rid = r.paraRepartidor ? repartoPorNombre[r.paraRepartidor] : null;
        bucket(rid || "_dueno").recordatorios.push(r);
      });
      // La clave de cada planilla trae el repartoId incrustado: "dia_fecha_repartoId"
      Object.keys(data.planillas||{}).forEach(function(clave){
        var partes = clave.split("_");
        var rid = partes.length>2 ? partes.slice(2).join("_") : null;
        bucket(rid).planillas[clave] = data.planillas[clave];
      });
      // cargasDia: la clave del objeto YA es el repartoId
      Object.keys(data.cargasDia||{}).forEach(function(rid){
        bucket(rid).cargasDia = data.cargasDia[rid];
      });
      // Stock de camión: la clave dentro de stock.camiones YA es el repartoId
      Object.keys(stockObj.camiones||{}).forEach(function(rid){
        bucket(rid).stockCamion = stockObj.camiones[rid];
      });

      var writes = [ pathCompartido(negocioId).set(compartido, {merge:true}) ];
      Object.keys(porReparto).forEach(function(rid){
        var b = porReparto[rid];
        var payload = {
          clientes: b.clientes, ventas: b.ventas, noVisitas: b.noVisitas,
          recordatorios: b.recordatorios, prospectos: b.prospectos
        };
        if(Object.keys(b.planillas).length) payload.planillas = b.planillas;
        if(b.cargasDia) payload.cargasDia = b.cargasDia;
        if(b.stockCamion) payload.stockCamion = b.stockCamion;
        writes.push(pathReparto(negocioId, rid).set(payload, {merge:true}));
      });

      return Promise.all(writes).then(function(){return true;}).catch(function(e){console.error("Save err",e);return false;});
    }

    function cloudLoad(uid, negocioId, codigoRepartidor) {
      if(!window.db || !negocioId) return Promise.resolve(null);

      return pathCompartido(negocioId).get().then(function(compSnap){
        if(!compSnap.exists) return null;
        var comp = compSnap.data();
        var repartosLista = comp.repartos || [];

        var idsAConsultar;
        if(codigoRepartidor) {
          // Repartidor: SOLO pide su propio documento. Nunca lee (ni
          // siquiera de a uno) los documentos de sus compañeros.
          var miReparto = repartosLista.filter(function(r){ return r.codigo === codigoRepartidor; })[0];
          idsAConsultar = [ miReparto ? miReparto.id : "_sinreparto" ];
        } else {
          // Dueño: todos los repartos conocidos + los baldes especiales.
          idsAConsultar = repartosLista.map(function(r){ return r.id; });
          idsAConsultar.push("_sinreparto", "_dueno");
        }

        return Promise.all(idsAConsultar.map(function(rid){ return pathReparto(negocioId, rid).get(); }))
          .then(function(snaps){
            var clientes=[], ventas=[], noVisitas=[], recordatorios=[], prospectos=[];
            var planillas={}, cargasDia={}, stockCamiones={};
            snaps.forEach(function(snap, idx){
              if(!snap.exists) return;
              var d = snap.data();
              var rid = idsAConsultar[idx];
              clientes = clientes.concat(d.clientes||[]);
              ventas = ventas.concat(d.ventas||[]);
              noVisitas = noVisitas.concat(d.noVisitas||[]);
              recordatorios = recordatorios.concat(d.recordatorios||[]);
              prospectos = prospectos.concat(d.prospectos||[]);
              Object.assign(planillas, d.planillas||{});
              if(d.cargasDia) cargasDia[rid] = d.cargasDia;
              if(d.stockCamion) stockCamiones[rid] = d.stockCamion;
            });
            var stockGen = comp.stockGeneral || {};
            return {
              clientes: clientes, ventas: ventas, noVisitas: noVisitas,
              recordatorios: recordatorios, prospectos: prospectos,
              planillas: planillas, cargasDia: cargasDia,
              stock: { soderia: stockGen.soderia||{}, soderia_vacios: stockGen.soderia_vacios||{}, casa: stockGen.casa||{}, camiones: stockCamiones },
              productos: comp.productos || [],
              zonasReparto: comp.zonasReparto || {},
              repartos: repartosLista,
              mantVeh: comp.mantVeh || [],
              histPrecios: comp.histPrecios || [],
              negocio: comp.negocio || {},
              horaAvisoCierre: comp.horaAvisoCierre,
              horasAvisoTrans: comp.horasAvisoTrans,
              diasAvisoMant: comp.diasAvisoMant
            };
          });
      }).catch(function(e){console.error("Load err",e);return null;});
    }

  </script>

<script>
  // ── Push Notifications (dueño y repartidor) ──────────────────────────
  const VAPID_PUB_KEY = 'BHH2hWofIa095xI4jVYJ1qt9D-958m0PHaiSXePU073yY9xS9HIyg1YiM-BRELwexkpfzronSt2rjSnuyyRcHew';
  function urlB64ToUint8(b){
    const p='='.repeat((4-b.length%4)%4);
    const s=(b+p).replace(/-/g,'+').replace(/_/g,'/');
    const r=atob(s); const o=new Uint8Array(r.length);
    for(let i=0;i<r.length;i++) o[i]=r.charCodeAt(i); return o;
  }
  function getLic(){ try{return JSON.parse(localStorage.getItem('rm_licencia')||'{}');}catch{return {};} }
  // ID propio de ESTE navegador/dispositivo — para que el celu y la PC de la
  // misma persona no se pisen la suscripción entre sí.
  function getDeviceId(){
    let id = localStorage.getItem('rm_device_id');
    if(!id){ id = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,10); localStorage.setItem('rm_device_id', id); }
    return id;
  }
  async function guardarSub(token){
    if(!window.db) return;
    const lic=getLic();
    if(!lic.negocioId) return;
    const deviceId = getDeviceId();
    // Se etiqueta con rol y nombre — así el servidor sabe si mandarle avisos
    // de dueño (cierre, transferencias, mantenimiento) o de repartidor (agenda).
    const payload = {}; payload[deviceId] = { token: token, ts: Date.now(), rol: lic.rol||'dueño', nombre: lic.nombre||'' };
    await window.db.collection('negocios').doc(lic.negocioId).collection('datos').doc('push_subs').set(payload, {merge:true});
  }
  async function activarNotif(){
    if(!window.messagingLC){alert('Tu navegador no soporta notificaciones.');return false;}
    const p=await Notification.requestPermission();
    if(p!=='granted') return false;
    const reg=await navigator.serviceWorker.ready;
    const token=await window.messagingLC.getToken({vapidKey:VAPID_PUB_KEY, serviceWorkerRegistration:reg});
    await guardarSub(token); return true;
  }
  async function desactivarNotif(){
    if(window.messagingLC){ try{ await window.messagingLC.deleteToken(); }catch(e){} }
    if(window.db){
      const lic=getLic();
      if(lic.negocioId){
        const deviceId = getDeviceId();
        const upd = {}; upd[deviceId] = firebase.firestore.FieldValue.delete();
        await window.db.collection('negocios').doc(lic.negocioId).collection('datos').doc('push_subs').update(upd).catch(()=>{});
      }
    }
  }
  async function estadoNotif(){
    if(!window.messagingLC) return false;
    try {
      const reg=await navigator.serviceWorker.ready;
      const token=await window.messagingLC.getToken({vapidKey:VAPID_PUB_KEY, serviceWorkerRegistration:reg});
      return !!token;
    } catch(e){ return false; }
  }
  // El activar/desactivar/estado ahora se maneja desde Configuración
  // (NotifConfig en 15-config.js), no con un botón flotante acá.
  window.activarNotif = activarNotif;
  window.desactivarNotif = desactivarNotif;
  window.estadoNotif = estadoNotif;
  </script>
