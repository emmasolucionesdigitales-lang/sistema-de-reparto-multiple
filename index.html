  <script>
    if('serviceWorker' in navigator){
      const CACHE = 'sr2026-v20';
      const ASSETS = [
        'https://unpkg.com/react@18/umd/react.production.min.js',
        'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
        'https://unpkg.com/@babel/standalone/babel.min.js',

        'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js',
      ];
      const sw = `
const CACHE='${CACHE}';
const ASSETS=${JSON.stringify(ASSETS)};
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting()));
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>clients.claim()));
});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET') return;
  e.respondWith(
    caches.match(e.request).then(cached=>{
      const net = fetch(e.request).then(res=>{
        if(res.ok) caches.open(CACHE).then(c=>c.put(e.request,res.clone()));
        return res;
      }).catch(()=>cached);
      return cached||net;
    })
  );
});`;
      const blob = new Blob([sw],{type:'application/javascript'});
      const url = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).catch(()=>{});
    }

  <script>

      // ── LICENCIAS: conecta al proyecto del Panel Admin (app-reparto-65035) ──

      if(!licenciasApp) {
        licenciasApp = firebase.initializeApp({
          apiKey: "AIzaSyDV1i35MLw74hjnSg6rRZgQFIAI8hsJllI",

    } catch(e) { console.error("Firebase init error:", e); window.db = null; window.auth = null; }

    // ── Funciones multi-usuario ──────────────────────────────────────
    function getUserProfile(uid) {
      if(!window.db) return Promise.resolve(null);
      return window.db.collection("users").doc(uid).get()
        .then(function(doc){ return doc.exists ? doc.data() : null; })
        .catch(function(){ return null; });
    }
    function saveUserProfile(uid, data) {
      if(!window.db) return Promise.resolve();
      return window.db.collection("users").doc(uid).set(data, {merge:true});
    }
    function crearNegocio(uid, nombre) {
      if(!window.db) return Promise.resolve(null);
      var ref = window.db.collection("negocios").doc();
      return ref.set({ nombre:nombre, ownerId:uid, creadoEn:new Date().toISOString() })
        .then(function(){ return ref.id; });
    }
    function crearInvitacion(negocioId, nombre, sectores) {
      if(!window.db) return Promise.resolve(null);
      var codigo = Math.random().toString(36).slice(2,8).toUpperCase();
      return window.db.collection("negocios").doc(negocioId)
        .collection("invites").doc(codigo)
        .set({ nombre:nombre, sectores:sectores||[], usado:false, creadoEn:new Date().toISOString() })
        .then(function(){ return codigo; });
    }
    function canjearInvitacion(uid, email, codigo) {
      if(!window.db) return Promise.resolve({ok:false, msg:"Sin conexión"});
      return window.db.collectionGroup("invites").get().then(function(snap){
        var found = null;
        snap.forEach(function(doc){ if(doc.id===codigo && !doc.data().usado) found=doc; });
        if(!found) return {ok:false, msg:"Código inválido o ya usado"};
        var inv = found.data();
        var negocioId = found.ref.parent.parent.id;
        return found.ref.update({usado:true, uid:uid})
          .then(function(){
            return saveUserProfile(uid, { rol:"repartidor", negocioId:negocioId, nombre:inv.nombre, sectores:inv.sectores||[], email:email });
          })
          .then(function(){ return {ok:true, negocioId:negocioId, nombre:inv.nombre, sectores:inv.sectores||[]}; });
      }).catch(function(e){ return {ok:false, msg:"Error: "+e.message}; });
    }
    function listarRepartidores(negocioId) {
      if(!window.db) return Promise.resolve([]);
      return window.db.collection("users").where("negocioId","==",negocioId).where("rol","==","repartidor").get()
        .then(function(snap){ var r=[]; snap.forEach(function(d){ r.push({uid:d.id,...d.data()}); }); return r; })
        .catch(function(){ return []; });
    }
    function eliminarRepartidor(uid) {
      if(!window.db) return Promise.resolve();
      return window.db.collection("users").doc(uid).delete();
    }
    function negocioCol(negocioId) {
      return window.db.collection("negocios").doc(negocioId).collection("datos");
    }
    function cloudSave(data, uid, negocioId) {
      if(!window.db || !negocioId) return Promise.resolve(false);
      var col = negocioCol(negocioId);
      var saves = [
        col.doc("config").set({
          planillas: data.planillas || {},
          stock: data.stock || {},
          productos: data.productos || [],
          noVisitas: data.noVisitas || [],
          cargasDia: data.cargasDia || {},
          recordatorios: data.recordatorios || [],
          prospectos: data.prospectos || [],
          mantVeh: data.mantVeh || [],
          histPrecios: data.histPrecios || [],
          zonasReparto: data.zonasReparto || {},
          negocio: data.negocio || {},
          repartos: data.repartos || []
        })
      ];
      var cl = data.clientes || [];
      var nc = Math.ceil(cl.length/50)||1;
      saves.push(col.doc("clientes_meta").set({n:nc,total:cl.length}));
      for(var i=0;i<nc;i++) saves.push(col.doc("cl_"+i).set({d:cl.slice(i*50,i*50+50)}));
      var vt = data.ventas || [];
      var nv = Math.ceil(vt.length/80)||1;
      saves.push(col.doc("ventas_meta").set({n:nv,total:vt.length}));
      for(var j=0;j<nv;j++) saves.push(col.doc("vt_"+j).set({d:vt.slice(j*80,j*80+80)}));
      saves.push(col.doc("prospectos").set({d:data.prospectos||[]}));
      return Promise.all(saves).then(function(){return true;}).catch(function(e){console.error("Save err",e);return false;});
    }
    function cloudLoad(uid, negocioId) {
      if(!window.db || !negocioId) return Promise.resolve(null);
      var col = negocioCol(negocioId);
      return Promise.all([
        col.doc("config").get(),
        col.doc("clientes_meta").get(),
        col.doc("ventas_meta").get(),
        col.doc("prospectos").get()
      ]).then(function(results) {
        var cfg=results[0], cMeta=results[1], vMeta=results[2], prDoc=results[3];
        if(!cfg.exists) return null;
        var data = cfg.data();
        if(!data.recordatorios)  data.recordatorios = [];
        if(!data.prospectos)     data.prospectos = [];
        if(!data.mantVeh)        data.mantVeh = [];
        if(!data.histPrecios)    data.histPrecios = [];
        if(!data.zonasReparto)   data.zonasReparto = {};
        if(!data.negocio)        data.negocio = {};
        if(!data.repartos)       data.repartos = [];
        var nc = cMeta.exists ? (cMeta.data().n||0) : 0;
        var vn = vMeta.exists ? (vMeta.data().n||0) : 0;
        var cFetches = []; for(var i=0;i<nc;i++) cFetches.push(col.doc("cl_"+i).get());
        var vFetches = []; for(var j=0;j<vn;j++) vFetches.push(col.doc("vt_"+j).get());
        return Promise.all(cFetches.concat(vFetches)).then(function(docs) {
          data.clientes   = docs.slice(0,nc).reduce(function(a,d){return a.concat(d.exists?d.data().d:[]);}, []);
          data.ventas     = docs.slice(nc).reduce(function(a,d){return a.concat(d.exists?d.data().d:[]);}, []);
          data.prospectos = prDoc.exists ? (prDoc.data().d||[]) : [];
          return data;
        });
      }).catch(function(e){console.error("Load err",e);return null;});
    }

  </script>
