<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>

  <link rel="manifest" href="manifest.json"/>

  <link rel="apple-touch-icon" href="icon-192.png"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:#080f17;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none;}
    input,select,textarea,button{font-family:inherit;}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
    input[type=number]{-moz-appearance:textfield;}
    #root{min-height:100vh;}
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    // ═══════════════════════════════════════════
    // REEMPLAZÁ ESTOS VALORES CON TU FIREBASE CONFIG
    // ═══════════════════════════════════════════
    const firebaseConfig = {
      apiKey:            "AIzaSyDV1i35MLw74hjnSg6rRZgQFIAI8hsJllI",
      authDomain:        "app-reparto-65035.firebaseapp.com",
      projectId:         "app-reparto-65035",
      storageBucket:     "app-reparto-65035.firebasestorage.app",
      messagingSenderId: "162304851374",
      appId:             "1:162304851374:web:0a60847807c8fe9a7a1c3f"
    };
    firebase.initializeApp(firebaseConfig);
    window.db = firebase.firestore();
    window.db.enablePersistence().catch(()=>{});
    const db = window.db; // alias local para cloudSave/cloudLoad

    // Funciones de Firestore usadas por la app
    // cloudSave(data, id) — orden correcto: data primero, id segundo
    async function cloudSave(data, id) {
      if(!id || id === "") { console.warn("cloudSave: id vacío — configurá el código en Configuración"); return false; }
      try {
        await db.collection("users").doc(id).collection("datos").doc("main").set(data);
        return true;
      } catch(e) { console.error("cloudSave:", e); return false; }
    }
    async function cloudLoad(id) {
      if(!id || id === "") return null;
      try {
        const doc = await db.collection("users").doc(id).collection("datos").doc("main").get();
        return doc.exists ? doc.data() : null;
      } catch(e) { console.error("cloudLoad:", e); return null; }
    }

    // ── Brevo email ─────────────────────────────────────────────────────
    window.enviarEmailBrevoRM = async function({to, toName, subject, htmlContent}) {
      const resp = await fetch("https://api.brevo.com/v3/smtp/email", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "api-key": "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"
        },
        body: JSON.stringify({
          sender: { name: "Sistema de Reparto", email: "carabajalponce1980@gmail.com" },
          to: [{ email: to, name: toName || "" }],
          subject: subject,
          htmlContent: htmlContent
        })
      });
      if(!resp.ok) { const t = await resp.text(); throw new Error("Brevo " + resp.status + ": " + t); }
      return true;
    };
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Render -->
  <script type="text/babel">
    const rootEl = document.getElementById("root");
    const root = ReactDOM.createRoot ? ReactDOM.createRoot(rootEl) : null;
    if(root) root.render(<App />);
    else ReactDOM.render(<App />, rootEl);
  </script>
</body>
